  {id:411,label:"Decca (2-disc)",composers:["Robert Schumann"],artist:"Mitsuko Uchida (piano)",title:"Schumann: Fantasie in C major Op. 17 · Davidsbündlertänze Op. 6",description:"478 2280 · Decca · 2-disc set",format:"2-disc set",catNo:"478 2280",usedGBP:14.00,newGBP:null,notes:"Decca. Mitsuko Uchida in two of Schumann's greatest piano works. The Fantasie in C major (1836) is one of the supreme achievements in Romantic piano music — passionate, lyrical and architecturally visionary, originally conceived as a tribute to Beethoven. The Davidsbündlertänze (1837) are 18 character pieces embodying the two sides of Schumann's creative personality: the impulsive Florestan and the introspective Eusebius. Uchida brings her characteristic intelligence and tonal beauty to both works."},
  {id:412,label:"Decca",composers:["Robert Schumann"],artist:"Radu Lupu (piano)",title:"Schumann: Kinderszenen Op. 15 · Kreisleriana Op. 16 · Humoreske Op. 20",description:"440 496-2 · Decca Digital",format:"Single CD",catNo:"440 496-2",usedGBP:12.00,newGBP:null,notes:"Decca. Radu Lupu in three of Schumann's most beloved piano works. Kinderszenen (Scenes from Childhood, 1838) is the most intimate, its thirteen miniatures including the famous 'Träumerei'; Kreisleriana (1838) is wilder and more rhapsodic, inspired by E.T.A. Hoffmann's eccentric musical character Johannes Kreisler; the Humoreske (1839) is one of Schumann's most original and complex works, running continuously for half an hour. Lupu's playing is characterised by a warm, singing tone and deep musical intelligence."},
  {id:413,label:"Hyperion",composers:["Robert Schumann"],artist:"The Nash Ensemble",title:"Schumann: Chamber Music",description:"CDA67923 · Hyperion",format:"Single CD",catNo:"CDA67923",usedGBP:14.00,newGBP:null,notes:"Hyperion. The Nash Ensemble in a programme of Schumann's chamber music for various combinations — works including the Phantasiestücke Op. 73, Adagio and Allegro Op. 70, Three Romances Op. 94, MärchenErzählungen (Fairy Tales) Op. 132, and Violin Sonata No. 1. Schumann's chamber music represents some of his most intimate and original writing. The Nash Ensemble, one of Britain's finest chamber groups, are distinguished advocates for this repertoire."},
  {id:414,label:"Philips (2-disc)",composers:["Robert Schumann"],artist:"Monteverdi Choir · Orchestre Révolutionnaire et Romantique / John Eliot Gardiner",title:"Schumann: Das Paradies und die Peri Op. 50 · Requiem für Mignon Op. 98b · Nachtlied Op. 108",description:"457 660-2 · Philips · 2-disc set",format:"2-disc set",catNo:"457 660-2",usedGBP:16.00,newGBP:null,notes:"Philips. Gardiner and his forces in one of Schumann's most ambitious and underrated choral works. Das Paradies und die Peri (1843) — based on a poem from Thomas Moore's 'Lalla Rookh' — was the work with which Schumann made his name as a composer of large-scale choral music. The soprano role, representing the Peri seeking re-entry to Paradise, requires a singer of exceptional gifts. Gardiner brings his characteristic energy and period-instrument transparency to this neglected masterpiece."},
  {id:415,label:"JVC Victor (Japanese pressing)",composers:["Robert Schumann","Johannes Brahms"],artist:"Svjatoslav Richter (piano)",title:"Schumann: Bunte Blätter Op. 99 · Brahms: Klavierstücke Op. 118",description:"VDC-1027 · JVC Victor Digital · Japanese pressing",format:"Single CD",catNo:"VDC-1027",usedGBP:12.00,newGBP:null,notes:"JVC Victor Digital — Japanese pressing. Svjatoslav Richter (1915-1997) was one of the supreme pianists of the 20th century, particularly celebrated for his interpretations of German Romantic repertoire. Schumann's Bunte Blätter (Coloured Leaves) Op. 99 is a collection of 14 character pieces; Brahms's Klavierstücke Op. 118 are six late miniatures of extraordinary concentration and beauty. Japanese pressings from the VDC series are among the finest early CD pressings made."},
  {id:416,label:"RCA Victor",composers:["Robert Schumann"],artist:"Steven Isserlis (cello) · Felicity Lott (soprano) · Deutsche Kammerphilharmonie / Christoph Eschenbach",title:"Schumann: Cello Concerto in A minor Op. 129 · Songs and chamber works",description:"09026 68800 2 · RCA Victor",format:"Single CD",catNo:"09026 68800 2",usedGBP:12.00,newGBP:null,notes:"RCA Victor. Steven Isserlis in the Schumann Cello Concerto — one of the most poetic and introspective of all concertos, written in a remarkable creative surge in 1850. Felicity Lott joins for Schumann songs and vocal works. Christoph Eschenbach and the Deutsche Kammerphilharmonie bring chamber-music intimacy to the orchestral accompaniment. Isserlis is one of the most thoughtful and searching cellists of his generation, with a particular affinity for Schumann's music."},
  {id:417,label:"EMI",composers:["Robert Schumann"],artist:"Staatskapelle Dresden / Wolfgang Sawallisch",title:"Schumann: Symphonies Nos. 2 in C major Op. 61 & 3 in E-flat major Op. 97 'Rhenish'",description:"CDZ 4 79517 2 · EMI",format:"Single CD",catNo:"CDZ 4 79517 2",usedGBP:10.00,newGBP:null,notes:"EMI. Wolfgang Sawallisch and the Staatskapelle Dresden in two of Schumann's four symphonies — part of their celebrated complete cycle. The Second Symphony (1846) is the most intellectually complex, born out of Schumann's struggle with depression; the Third 'Rhenish' (1850) is his most openly joyful and extrovert, inspired by the Rhine valley landscape. Sawallisch was one of the most authoritative Schumann conductors of his generation, and the Staatskapelle Dresden brings characteristic warm-toned precision."},
  {id:418,label:"Naxos",composers:["Robert Schumann"],artist:"Jenő Jandó (piano)",title:"Schumann: Carnaval Op. 9 · Papillons Op. 2 · Kinderszenen Op. 15",description:"8.550076 · Naxos · rec. 1987",format:"Single CD",catNo:"8.550076",usedGBP:8.00,newGBP:null,notes:"Naxos. One of the very earliest Naxos releases — recorded 1987. Jenő Jandó in three beloved Schumann piano works. Carnaval (1835) is a brilliant sequence of masked ball character pieces, many representing real people including Chopin, Paganini and Clara Wieck; Papillons (1831) was his Op. 2; Kinderszenen the intimate set of childhood memories. Jandó was one of the Hungarian pianists who helped establish Naxos's early reputation for excellent value."},
  {id:419,label:"Chandos",composers:["Dmitri Shostakovich"],artist:"Scottish National Orchestra / Neeme Järvi",title:"Shostakovich: Symphony No. 4 in C minor Op. 43",description:"CHAN 8640 · Chandos",format:"Single CD",catNo:"CHAN 8640",usedGBP:12.00,newGBP:null,notes:"Chandos. Neeme Järvi and the Scottish National Orchestra in Shostakovich's most turbulent and uncompromising symphony. Dmitri Shostakovich (1906-1975) is the towering figure of Soviet-era music, writing 15 symphonies of extraordinary range and power. The Fourth (1936) was suppressed by Shostakovich himself after the Pravda attacks on his opera Lady Macbeth of Mtsensk — it was not performed until 1961. A vast, dark, expressionist work of enormous scale and originality, it shows Shostakovich at his most unguarded. Järvi's Chandos Shostakovich cycle is consistently admired."},
  {id:420,label:"Chandos",composers:["Dmitri Shostakovich"],artist:"Elizabeth Holleque (soprano) · Nikita Storojev (bass) · Musici de Montréal / Yuli Turovsky",title:"Shostakovich: Symphony No. 14 Op. 135",description:"CHAN 8607 · Chandos",format:"Single CD",catNo:"CHAN 8607",usedGBP:12.00,newGBP:null,notes:"Chandos. Shostakovich's Fourteenth Symphony (1969) is one of the most searingly original works in the repertoire — a song symphony for soprano, bass and chamber orchestra setting eleven poems about death by Lorca, Apollinaire, Küchelbecker and Rilke. Shostakovich was 63 and in poor health when he composed it; it is a deeply personal meditation on mortality. The chamber forces (strings and percussion only) create a stark, haunting sound world. Yuli Turovsky and the Musici de Montréal are eloquent advocates."},
  {id:421,label:"HMV Classics",composers:["Dmitri Shostakovich"],artist:"Cristina Ortiz (piano) · Paavo Berglund · André Previn",title:"Shostakovich: Piano Concerto No. 2 in F major Op. 102 · Symphony No. 5 in D minor Op. 47",description:"HMV 7 67637 2 · HMV Classics · budget reissue",format:"Single CD",catNo:"HMV 7 67637 2",usedGBP:10.00,newGBP:null,notes:"HMV Classics. Two of Shostakovich's most approachable works on one budget disc. The Piano Concerto No. 2 (1957), written for his son Maxim's piano debut, is one of his most charming and witty works — Cristina Ortiz with Paavo Berglund. The Symphony No. 5 (1937) was Shostakovich's famous 'creative reply to just criticism' after the Pravda attacks — outwardly triumphant but with a deeply ambiguous final movement. André Previn conducts."},
  {id:422,label:"Naxos",composers:["Dmitri Shostakovich"],artist:"Éder Quartet",title:"Shostakovich: String Quartets (Complete) Vol. 1 · Nos. 4, 6 & 7",description:"8.550972 · Naxos",format:"Single CD",catNo:"8.550972",usedGBP:8.00,newGBP:null,notes:"Naxos. Volume 1 of 6 in the Éder Quartet's complete Shostakovich string quartet cycle. Shostakovich's 15 string quartets, composed between 1938 and 1974, form one of the most important cycles in the chamber music repertoire — a musical diary spanning virtually his entire creative life, often more candid and personal than his symphonies. The Éder Quartet is a distinguished Hungarian ensemble; Naxos's budget price makes the complete cycle highly accessible. See also CDs 423-427."},
  {id:423,label:"Naxos",composers:["Dmitri Shostakovich"],artist:"Éder Quartet",title:"Shostakovich: String Quartets (Complete) Vol. 2 · Nos. 1, 8 & 9",description:"8.550973 · Naxos",format:"Single CD",catNo:"8.550973",usedGBP:8.00,newGBP:null,notes:"Naxos. Volume 2 of 6. Includes the Eighth Quartet in C minor Op. 110 (1960) — perhaps the most famous and harrowing of all, composed in three days in Dresden immediately after visiting the bombed city. Shostakovich embedded his own musical monogram (D-S-C-H) throughout. He said he wrote it 'in memory of the victims of fascism and war' but many believe it is also a deeply personal self-portrait, composed when he was at his most psychologically vulnerable."},
  {id:424,label:"Naxos",composers:["Dmitri Shostakovich"],artist:"Éder Quartet",title:"Shostakovich: String Quartets (Complete) Vol. 3 · Nos. 3 & 5",description:"8.550974 · Naxos",format:"Single CD",catNo:"8.550974",usedGBP:8.00,newGBP:null,notes:"Naxos. Volume 3 of 6. The Third Quartet (1946) is one of the most substantial, a five-movement work of great emotional range; the Fifth (1952) is more compact and concentrated. Together they represent Shostakovich at his most ambivalent towards the Soviet regime — outwardly acceptable but inwardly subversive."},
  {id:425,label:"Naxos",composers:["Dmitri Shostakovich"],artist:"Éder Quartet",title:"Shostakovich: String Quartets (Complete) Vol. 4 · Nos. 2 & 12",description:"8.550975 · Naxos",format:"Single CD",catNo:"8.550975",usedGBP:8.00,newGBP:null,notes:"Naxos. Volume 4 of 6. The Second Quartet (1944) is one of his most lyrical and folk-influenced; the Twelfth (1968) marks a stylistic turning point towards a more introspective, 12-tone influenced language. The gulf between these two works illustrates the remarkable evolution of Shostakovich's quartet writing across three decades."},
  {id:426,label:"Naxos",composers:["Dmitri Shostakovich"],artist:"Éder Quartet",title:"Shostakovich: String Quartets (Complete) Vol. 5 · Nos. 14 & 15",description:"8.550976 · Naxos",format:"Single CD",catNo:"8.550976",usedGBP:8.00,newGBP:null,notes:"Naxos. Volume 5 of 6. The Fourteenth (1973) and Fifteenth (1974) quartets are among his last works, composed as his health was failing. The Fifteenth, in six adagio movements, is one of the most extraordinary leave-takings in all music — a work of extreme stillness and resignation. Shostakovich died in 1975, just a year after completing it."},
  {id:427,label:"Naxos",composers:["Dmitri Shostakovich"],artist:"Éder Quartet",title:"Shostakovich: String Quartets (Complete) Vol. 6 · Nos. 10, 11 & 13",description:"8.550977 · Naxos",format:"Single CD",catNo:"8.550977",usedGBP:8.00,newGBP:null,notes:"Naxos. Volume 6 of 6, completing the Éder Quartet's cycle. Nos. 10 (1964), 11 (1966) and 13 (1970) show Shostakovich at his most concentrated and economical in the middle-to-late period of the cycle. Together all six Naxos volumes (CDs 422-427) provide a complete and economical survey of one of the supreme chamber cycles of the 20th century."},
  {id:428,label:"Regis (5-disc)",composers:["Dmitri Shostakovich"],artist:"The Shostakovich Quartet",title:"Shostakovich: Complete String Quartets",description:"RRC 5001 · Regis · 5-disc box set",format:"5-disc set",catNo:"RRC 5001",usedGBP:20.00,newGBP:null,notes:"Regis. The complete Shostakovich string quartets played by The Shostakovich Quartet — an ensemble with a uniquely intimate connection to this music, having worked directly with the composer. Their interpretations carry an authority and authenticity impossible to replicate: they knew how Shostakovich wanted this music to sound. The Regis label issued this 5-disc box at exceptional budget price, making it one of the most important sets in the collection."},
  {id:429,label:"Teldec",composers:["Dmitri Shostakovich"],artist:"Borodin Quartet",title:"Shostakovich: String Quartet No. 1 in C major Op. 49 · String Quartet No. 15 in E flat minor Op. 144",description:"4509-98417-2 · Teldec Classics · rec. 1996 · 52 min",format:"Single CD",catNo:"4509-98417-2",usedGBP:10.00,newGBP:null,notes:"Teldec Classics. © 1996. The Borodin Quartet in a telling pairing: the First Quartet (1938), Shostakovich's earliest and most direct, alongside the Fifteenth (1974), his last — six adagio movements (Elegy, Serenade, Intermezzo, Nocturne, Funeral March, Epilogue) of extreme stillness and resignation. No other composer's first and last quartets are so revealing of a lifetime's creative journey. The Borodin Quartet (founded 1945) worked closely with Shostakovich and gave premieres of several of his quartets; their interpretations carry unique authority."},
  {id:430,label:"Melodiya (USSR)",composers:["Dmitri Shostakovich"],artist:"Taneyev Quartet",title:"Shostakovich: String Quartets Nos. 11 Op. 122, 12 Op. 133 & 13 Op. 138",description:"SUCD 11-00312 · Melodiya · Made in USSR · rec. 1981",format:"Single CD",catNo:"SUCD 11-00312",usedGBP:12.00,newGBP:null,notes:"Melodiya. Recorded 1981, © Melodiya Record Company USSR, Made in USSR. Shostakovich's Quartets Nos. 11 (Op.122, 1966), 12 (Op.133, 1968) and 13 (Op.138, 1970) — three of the most concentrated of the middle-to-late period, running to approximately 60 minutes in total. Performed by the Taneyev Quartet — one of the leading Soviet-era string quartets, based in Leningrad (St Petersburg), founded in 1946 and named after the Russian composer Sergei Taneyev. They were distinguished interpreters of Soviet chamber music and recorded extensively for Melodiya. Soviet Melodiya pressings are prized collectors' items."},
  {id:431,label:"Audite (SACD)",composers:["Dmitri Shostakovich"],artist:"Mandelring Quartett",title:"Shostakovich: Complete String Quartets Vol. II",description:"audite 92.527 · Audite · SACD + portrait DVD · Vol. II only",format:"SACD",catNo:"audite 92.527",usedGBP:16.00,newGBP:null,notes:"Audite. Volume II only of the Mandelring Quartett's complete Shostakovich cycle on Audite. Each volume in this series came as an SACD paired with a portrait DVD about the ensemble and the music. The Mandelring Quartett is one of Germany's most admired ensembles. Audite's SACD sound quality is exceptional. The series has been widely praised as one of the finest modern Shostakovich quartet cycles. Please check the disc label for the specific quartet numbers in this volume."},
  {id:432,label:"Tring",composers:["Dmitri Shostakovich"],artist:"Various",title:"Shostakovich: The Two Chamber Symphonies",description:"TRXCD 110 · Tring Records · budget",format:"Single CD",catNo:"TRXCD 110",usedGBP:8.00,newGBP:null,notes:"Tring Records. Shostakovich's Two Chamber Symphonies — string orchestra arrangements of two of his string quartets made by conductor Rudolf Barshai, who worked closely with the composer. The Chamber Symphony Op. 110a (from Quartet No. 8) and Op. 73a (from Quartet No. 3) gain a new grandeur in their orchestral guise. These arrangements have become concert favourites in their own right. Tring Records was a British budget label. Please check the disc label for the specific orchestra and conductor."},
  {id:433,label:"Mariinsky (SACD)",composers:["Dmitri Shostakovich"],artist:"Mariinsky Orchestra / Valery Gergiev",title:"Shostakovich: Symphonies Nos. 1 in F minor Op. 10 & 15 in A major Op. 141",description:"MAR0502 · Mariinsky label · SACD",format:"SACD",catNo:"MAR0502",usedGBP:14.00,newGBP:null,notes:"Mariinsky. Gergiev and the Mariinsky Orchestra on their own label in two of the most contrasted Shostakovich symphonies. The First (1925), composed when he was 19, announced a major new voice; the Fifteenth (1971), his last symphony, is one of his most enigmatic — full of quotations (Rossini's William Tell overture, Wagner's Ring) whose meaning remains elusive. Together they frame the entire symphonic arc. Mariinsky SACD pressings provide exceptional sound quality."},
  {id:434,label:"Regis (3-disc)",composers:["Dmitri Shostakovich"],artist:"Tatiana Nikolayeva (piano)",title:"Shostakovich: 24 Preludes and Fugues Op. 87",description:"RRC3005 · Regis · 3-disc set",format:"3-disc set",catNo:"RRC3005",usedGBP:18.00,newGBP:null,notes:"Regis. Tatiana Nikolayeva (1924-1993) in Shostakovich's monumental cycle of 24 Preludes and Fugues Op. 87 (1950-51), written in direct response to attending the Bach tercentenary celebrations in Leipzig. Shostakovich composed one prelude and fugue in each major and minor key, just as Bach did in the Well-Tempered Clavier. The cycle is one of the supreme achievements of 20th-century piano music. Nikolayeva was its dedicatee and greatest interpreter — she premiered the work and performed it for 40 years; her identification with it is total. A 3-disc set at budget price."},
  {id:435,label:"Berlin Classics",composers:["Dmitri Shostakovich","Aribert Reimann"],artist:"Dietrich Fischer-Dieskau (bass-baritone) · Aribert Reimann (piano)",title:"Shostakovich: Suite nach Gedichten von Michelangelo Op. 145 · Reimann: Tre Poemi di Michelangelo",description:"243 714-2 · Berlin Classics",format:"Single CD",catNo:"243 714-2",usedGBP:12.00,newGBP:null,notes:"Berlin Classics. A remarkable disc pairing Shostakovich's last major work — the Suite on Verses of Michelangelo Buonarotti Op. 145 (1974), eleven songs for bass and piano — with settings of Michelangelo by Aribert Reimann (born 1936), one of Germany's foremost living composers. Fischer-Dieskau (1925-2012) was arguably the greatest baritone of the 20th century; Reimann was his close collaborator and composed several major works for him. Together they bring exceptional authority to this extraordinary repertoire."},
  {id:436,label:"BIS",composers:["Jean Sibelius"],artist:"Gothenburg Symphony Orchestra / Neeme Järvi",title:"Sibelius: Lemminkäinen Suite Op. 22 (Four Legends from the Kalevala)",description:"BIS CD-294 · BIS Records · stereo",format:"Single CD",catNo:"BIS CD-294",usedGBP:12.00,newGBP:null,notes:"BIS Records. Neeme Järvi and the Gothenburg Symphony Orchestra in one of Sibelius's most evocative orchestral works. Jean Sibelius (1865-1957) is the towering figure of Finnish music, whose output is inseparable from the Finnish landscape and its mythology. The Lemminkäinen Suite draws on the Kalevala — the Finnish national epic — and includes the celebrated 'Swan of Tuonela,' one of the most haunting pieces in the orchestral repertoire. Järvi's Gothenburg Sibelius series on BIS was among the most acclaimed Sibelius cycles of its era."},
  {id:437,label:"Supraphon",composers:["Bedřich Smetana"],artist:"Czech Philharmonic Orchestra / Rafael Kubeļík",title:"Smetana: Má Vlast",description:"11 1208-2 031 · Supraphon · live recording Prague Spring 1990",format:"Single CD",catNo:"11 1208-2 031",usedGBP:14.00,newGBP:null,notes:"Supraphon. One of the most emotionally charged recordings ever made. Rafael Kubeļík (1914-1996) had fled Czechoslovakia in 1948 after the Communist coup; he returned 42 years later to conduct the Czech Philharmonic at the opening of the first free Prague Spring Festival on 12 May 1990, just months after the Velvet Revolution. The work chosen was inevitably Smetana's Má Vlast (My Homeland) — six symphonic poems celebrating Czech landscape and legend. The second, Vltava (The Moldau), is the most famous piece of Czech music ever written. The audience response at the end was overwhelming."},
  {id:438,label:"Supraphon",composers:["Bedřich Smetana"],artist:"Pavel Haas Quartet",title:"Smetana: String Quartet No. 1 in E minor 'From my Life' · String Quartet No. 2 in D minor",description:"SU 4172-2 · Supraphon",format:"Single CD",catNo:"SU 4172-2",usedGBP:12.00,newGBP:null,notes:"Supraphon. The Pavel Haas Quartet (founded 2002, named after the Czech-Jewish composer Pavel Haas who died in Auschwitz in 1944) in Smetana's two autobiographical string quartets. The First (1876), subtitled 'From my Life,' ends with a sustained high E representing the tinnitus that heralded his deafness; the Second (1882-83) was written after he had gone completely deaf and is more fragmented and disturbing. Both are profoundly personal documents. The Pavel Haas Quartet are one of the finest young Czech ensembles; this recording has won multiple major prizes."},
  {id:439,label:"Hyperion",composers:["Louis Spohr"],artist:"Orchestra della Svizzera Italiana / Howard Shelley",title:"Spohr: Symphony No. 3 in C minor Op. 78 · Symphony No. 9 in B minor Op. 143 'The Seasons'",description:"CDA67788 · Hyperion",format:"Single CD",catNo:"CDA67788",usedGBP:14.00,newGBP:null,notes:"Hyperion. Howard Shelley and the Orchestra della Svizzera Italiana in two symphonies by Louis Spohr (1784-1859) — one of the most gifted and prolific composers of the early Romantic era, now almost entirely forgotten. In his own lifetime Spohr was considered a major figure, ranking alongside Beethoven and Weber. His 10 symphonies are finely crafted, often imaginative works that deserve to be heard far more often. Note: Symphony No. 3 also appears on CPO cpo 777 177-2 (CD 440), paired there with No. 10 and performed by different forces."},
  {id:440,label:"CPO (SACD)",composers:["Louis Spohr"],artist:"NDR Radiophilharmonie / Howard Griffiths",title:"Spohr: Symphony No. 3 in C minor Op. 78 · Symphony No. 10 in E-flat major Op. 156",description:"cpo 777 177-2 · CPO · Hybrid SACD · SEALED",format:"SACD",catNo:"cpo 777 177-2",usedGBP:14.00,newGBP:14.00,sealed:true,notes:"CPO. UNOPENED. Hybrid multichannel SACD. Howard Griffiths and the NDR Radiophilharmonie in two Spohr symphonies. CPO (Classic Produktion Osnabrück) has championed neglected repertoire for decades and their Spohr symphony series is one of the most comprehensive available. Note: Symphony No. 3 also appears on Hyperion CDA67788 (CD 439), paired there with No. 9 and performed by the Orchestra della Svizzera Italiana / Shelley."},
  {id:441,label:"Hyperion",composers:["Igor Stravinsky"],artist:"Marc-André Hamelin · Leif Ove Andsnes (pianos)",title:"Stravinsky: The Rite of Spring · Concerto for Two Pianos",description:"CDA68189 · Hyperion",format:"Single CD",catNo:"CDA68189",usedGBP:12.00,newGBP:null,notes:"Hyperion. Two of the greatest pianists of their generation — Marc-André Hamelin and Leif Ove Andsnes — in Stravinsky's own piano-duo arrangement of The Rite of Spring and the Concerto for Two Pianos. Igor Stravinsky (1882-1971) was arguably the most influential composer of the 20th century. The Rite of Spring (1913) caused a riot at its Paris premiere; in this four-hand piano version the savagery is distilled to its barest essentials. The Concerto for Two Pianos (1935) is a magnificent neoclassical work. An exceptional disc."},
  {id:442,label:"Deutsche Grammophon",composers:["Igor Stravinsky"],artist:"The Philadelphia Orchestra / Yannick Nézet-Séquin",title:"Stravinsky · Stokowski: The Rite of Spring · Stokowski Transcriptions",description:"479 1074 · DG",format:"Single CD",catNo:"479 1074",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. Yannick Nézet-Séquin and The Philadelphia Orchestra celebrating their unique connection to both Stravinsky and Leopold Stokowski (1882-1977), the legendary Philadelphia conductor for whom the orchestra's lush sound was created. Stokowski conducted the American premiere of The Rite of Spring with the Philadelphia Orchestra in 1922 and made famous his sumptuous orchestral transcriptions. Nézet-Séquin unites this history in a programme of Stravinsky alongside Stokowski transcriptions."},
  {id:443,label:"EMI Digital",composers:["Igor Stravinsky"],artist:"City of Birmingham Symphony Orchestra / Simon Rattle",title:"Stravinsky: Le Sacre du Printemps · Apollo",description:"CDC 7 49636 2 · EMI Digital · rec. c.1987",format:"Single CD",catNo:"CDC 7 49636 2",usedGBP:10.00,newGBP:null,notes:"EMI Digital. Simon Rattle and the CBSO in The Rite of Spring, one of Rattle's most celebrated recordings from his Birmingham years. Le Sacre du Printemps (1913) is the work that changed Western music forever; its violent rhythms, dissonant harmonies and savage energy still shock and exhilarate after more than a century. Apollo (Apollon musagète, 1928) makes an ideal coupling — the serene neoclassical counterpart to the Rite's primitivism. Rattle's Birmingham Stravinsky was widely praised for its clarity and rhythmic intensity."},
  {id:444,label:"Sony Classical",composers:["Igor Stravinsky"],artist:"Yvonne Kenny (soprano) · John Aler (tenor) · John Tomlinson (bass) · London Sinfonietta / Esa-Pekka Salonen",title:"Stravinsky: Pulcinella · Octet · Renard · Ragtime",description:"SK 45 965 · Sony Classical",format:"Single CD",catNo:"SK 45 965",usedGBP:12.00,newGBP:null,notes:"Sony Classical. Esa-Pekka Salonen and the London Sinfonietta in a programme of Stravinsky's neoclassical period works. Pulcinella (1920), based on music attributed to Pergolesi, launched Stravinsky's neoclassical style and remains one of his most charming works; the Octet (1923) is a perfectly crafted wind miniature; Renard (1916) is a witty burlesque fable; Ragtime (1918) shows his fascination with jazz. Vocalists Yvonne Kenny, John Aler and John Tomlinson complete a beautifully varied programme. Salonen was a pre-eminent Stravinsky interpreter."},
  {id:445,label:"EMI Classics (Originals)",composers:["Richard Strauss"],artist:"Mstislav Rostropovich (cello) · Berliner Philharmoniker / Herbert von Karajan",title:"Richard Strauss: Don Quixote Op. 35",description:"CDC 7 49308 2 · EMI Originals",format:"Single CD",catNo:"CDC 7 49308 2",usedGBP:12.00,newGBP:null,notes:"EMI Originals. One of the supreme recordings of Strauss's greatest tone poem. Don Quixote Op. 35 (1897) is a set of fantastical variations in which solo cello represents the deluded knight and solo viola his earthy squire Sancho Panza. Richard Strauss (1864-1949) was the last great master of the German Romantic tradition, his orchestral writing of extraordinary opulence and technical mastery. Rostropovich as Don Quixote brings his characteristic combination of heroism and pathos; Karajan and the Berlin Philharmonic surround him with sumptuous sound."},
  {id:446,label:"Decca",composers:["Richard Strauss"],artist:"Renée Fleming (soprano) · Münchner Philharmoniker / Christian Thielemann",title:"Richard Strauss: Four Last Songs · Songs & Arias",description:"478 0647 · Decca",format:"Single CD",catNo:"478 0647",usedGBP:14.00,newGBP:null,notes:"Decca. Renée Fleming in the Four Last Songs (Vier letzte Lieder, 1948) — the most sublime farewell in all music, composed when Strauss was 84, setting poems by Hesse and Eichendorff about the end of life and the peace of evening. With Christian Thielemann, one of the finest Strauss conductors of our time, and the Münchner Philharmoniker. Fleming's warm, lustrous soprano is perfectly suited to this music. Additional Strauss songs and arias complete a disc of exceptional beauty."},
  {id:447,label:"Denon (Japanese pressing)",composers:["Georg Philipp Telemann"],artist:"Heinz Holliger (oboe) · Klaus Thunemann (bassoon) · Christiane Jaccottet (harpsichord)",title:"Telemann: Sonatas, Suites & Small Ensemble Works",description:"38C37-7052 · Denon · Japanese pressing",format:"Single CD",catNo:"38C37-7052",usedGBP:12.00,newGBP:null,notes:"Denon. Georg Philipp Telemann (1681-1767) was the most prolific composer in the history of Western music — he composed more works than Bach and Handel combined. His chamber music is elegant, witty and technically inventive, written for an enormous variety of combinations. Three distinguished soloists: Heinz Holliger (Switzerland's greatest oboist), Klaus Thunemann (Germany's pre-eminent bassoonist) and harpsichordist Christiane Jaccottet. A Japanese Denon pressing of high quality."},
  {id:448,label:"JVC (Japanese pressing)",composers:["Pyotr Ilyich Tchaikovsky"],artist:"Moscow Radio Symphony Orchestra / Vladimir Fedoseyev",title:"Tchaikovsky: Symphony No. 4 in F minor Op. 36",description:"VDC-1018 · JVC Victor Digital · Japanese pressing",format:"Single CD",catNo:"VDC-1018",usedGBP:12.00,newGBP:null,notes:"JVC Victor Digital — Japanese pressing. Vladimir Fedoseyev and the Moscow Radio Symphony Orchestra in the Fourth Symphony — one of the great Tchaikovsky symphony recordings in the Russian tradition. Fedoseyev has an unrivalled feel for this music from inside the culture; his tempi are natural and idiomatic, never inflated. The Moscow Radio Symphony Orchestra brings authentic Russian warmth and fire. Japanese VDC pressings are among the finest early CDs ever made."},
  {id:449,label:"Decca",composers:["Pyotr Ilyich Tchaikovsky","Felix Mendelssohn"],artist:"Kyung Wha Chung (violin) · Montréal Symphony Orchestra / Charles Dutoit",title:"Tchaikovsky: Violin Concerto in D major Op. 35 · Mendelssohn: Violin Concerto in E minor Op. 64",description:"410 011-2 · Decca Digital · early digital pressing",format:"Single CD",catNo:"410 011-2",usedGBP:12.00,newGBP:null,notes:"Decca. Kyung Wha Chung and Charles Dutoit in what many consider the finest recording of the Tchaikovsky Violin Concerto — technically immaculate, deeply felt, and perfectly partnered by Dutoit and the Montréal Symphony. The Mendelssohn Concerto makes an ideal coupling. Kyung Wha Chung (born 1948) is one of the most admired violinists of her generation, her playing distinguished by intensity of expression and tonal beauty. An early digital Decca pressing from 1983."},
  {id:450,label:"Deutsche Grammophon",composers:["Pyotr Ilyich Tchaikovsky"],artist:"Martha Argerich (piano) · Berliner Philharmoniker / Claudio Abbado · Nicolas Economou (piano)",title:"Tchaikovsky: Piano Concerto No. 1 in B-flat minor Op. 23 · The Nutcracker Suite (for two pianos)",description:"449 816-2 · DG · live 1982",format:"Single CD",catNo:"449 816-2",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. Argerich's legendary 1982 live recording of the Tchaikovsky First Concerto with Abbado and the Berlin Philharmonic — one of the most electrifying performances ever committed to disc. Argerich's combination of phenomenal technique, animal energy and poetic sensitivity is overwhelming. The Nutcracker Suite arranged for two pianos (with Nicolas Economou) makes a charming companion. This recording is simply irreplaceable."},
  {id:451,label:"EMI (2-disc)",composers:["Pyotr Ilyich Tchaikovsky"],artist:"London Symphony Orchestra / André Previn",title:"Tchaikovsky: Swan Lake Op. 20 (complete)",description:"50999 9 67684 2 6 · EMI · 2-disc set",format:"2-disc set",catNo:"50999 9 67684 2 6",usedGBP:14.00,newGBP:null,notes:"EMI. André Previn and the London Symphony Orchestra in the complete Swan Lake — Tchaikovsky's first great ballet (1875-76), which established the template for the classical ballet score. Previn's gift for idiomatic, naturally phrased Tchaikovsky is evident throughout. The complete score, spread across two discs, includes many episodes rarely heard in the concert hall. Previn's long association with the LSO produced some of their finest recordings."},
  {id:452,label:"Chandos",composers:["Pyotr Ilyich Tchaikovsky"],artist:"Oslo Philharmonic Orchestra / Mariss Jansons",title:"Tchaikovsky: Symphony No. 5 in E minor Op. 64",description:"CHAN 8351 · Chandos Digital",format:"Single CD",catNo:"CHAN 8351",usedGBP:12.00,newGBP:null,notes:"Chandos. Mariss Jansons and the Oslo Philharmonic in their celebrated Tchaikovsky series for Chandos. Jansons (1943-2019) was one of the finest Tchaikovsky conductors of his generation, combining Slavic temperament with impeccable structural control. The Fifth Symphony (1888) is perhaps the most tightly constructed of the cycle, with its motto theme pervading all four movements and reaching a blazing apotheosis in the finale. See also CD 453 for the Sixth in the same series."},
  {id:453,label:"Chandos",composers:["Pyotr Ilyich Tchaikovsky"],artist:"Oslo Philharmonic Orchestra / Mariss Jansons",title:"Tchaikovsky: Symphony No. 6 in B minor Op. 74 'Pathétique'",description:"CHAN 8446 · Chandos Digital · Penguin Guide ★★★",format:"Single CD",catNo:"CHAN 8446",usedGBP:12.00,newGBP:null,notes:"Chandos. Penguin Guide three-star recommendation. Jansons and the Oslo Philharmonic in what many consider the finest of their Chandos Tchaikovsky cycle. The Pathétique (1893) is Tchaikovsky's last symphony, premiered nine days before his death; its shattering final Adagio lamentoso, fading to nothing, is one of the most devastating endings in the symphonic repertoire. Compare with the Karajan/VPO account (CD 454) for a fascinating contrast of approaches."},
  {id:454,label:"Deutsche Grammophon",composers:["Pyotr Ilyich Tchaikovsky"],artist:"Wiener Philharmoniker / Herbert von Karajan",title:"Tchaikovsky: Symphony No. 6 in B minor Op. 74 'Pathétique'",description:"415 095-2 · DG · rec. 1984",format:"Single CD",catNo:"415 095-2",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. Karajan's 1984 Vienna Philharmonic recording of the Pathétique — his fourth and final account of this symphony. By this point Karajan was 76, and there is a valedictory quality to the performance, especially the final Adagio. The Vienna Philharmonic's darker, more opulent string sound contrasts fascinatingly with the Oslo Philharmonic's leaner approach under Jansons (CD 453). Two great conductors, two great orchestras, the same devastating work."},
  {id:455,label:"Hyperion (2-disc)",composers:["Pyotr Ilyich Tchaikovsky"],artist:"Stephen Hough (piano) · Minnesota Orchestra / Osmo Vänskä",title:"Tchaikovsky: Piano Concertos Nos. 1, 2 & 3 · Concert Fantasia Op. 56",description:"CDA67711/2 · Hyperion · 2-disc set · The Romantic Piano Concerto Vol. 50 · rec. live Minneapolis 2009 · SEALED",format:"2-disc set",catNo:"CDA67711/2",usedGBP:22.00,newGBP:22.00,sealed:true,notes:"Hyperion. UNOPENED. The landmark 50th volume of Hyperion's Romantic Piano Concerto series (begun 1991). Disc 1 [65 min]: Piano Concerto No. 1 in B-flat minor Op. 23, Concert Fantasia in G major Op. 56, plus two solo piano transcriptions by Hough: Solitude Op. 73/6 and None but the Lonely Heart Op. 6/6. Disc 2 [75 min]: Piano Concerto No. 2 in G major Op. 44, Piano Concerto No. 3 in E-flat major Op. 75, plus two versions of the Concerto No. 2 slow movement (ed. Siloti and ed. Hough). Recorded live in Orchestra Hall, Minneapolis, 2009. Total duration 141 min. The first 50 volumes of the series contain 131 works for piano and orchestra, 59 of them premiere recordings. Stephen Hough described by The Sunday Times as Britain's finest pianist."},
  {id:456,label:"Gimell Records",composers:["Thomas Tallis"],artist:"The Tallis Scholars / Peter Phillips",title:"Thomas Tallis: Spem in Alium · Motets and Sacred Works",description:"CDGIM 006 · Gimell Records",format:"Single CD",catNo:"CDGIM 006",usedGBP:12.00,newGBP:null,notes:"Gimell Records. The Tallis Scholars' celebrated recording of Thomas Tallis's supreme masterpiece. Spem in Alium is a 40-part motet for eight choirs of five voices — one of the most extraordinary feats of compositional imagination in the history of music. Thomas Tallis (c.1505-1585) was the greatest English composer of the 16th century. The Tallis Scholars, founded by Peter Phillips in 1973, are the ensemble most closely identified with this music; their recording on Gimell is considered the benchmark. The disc also includes other Tallis sacred works."},
  {id:457,label:"Signum Classics (SACD single)",composers:["Thomas Tallis"],artist:"The King's Singers",title:"Thomas Tallis: Spem in Alium",description:"SIGCD071 · Signum Classics · SACD single · approx. 15 min",format:"SACD",catNo:"SIGCD071",usedGBP:8.00,newGBP:null,notes:"Signum Classics. A single-work SACD release of approximately 15 minutes — just the Spem in Alium, performed by the King's Singers. An interesting contrast with the Tallis Scholars account (CD 456): the King's Singers bring their characteristic blend of polished ensemble singing and careful balance to this 40-part motet, representing an entirely different approach. Their SACD sound captures the choral texture with exceptional clarity. A rare short-form classical release."},
  {id:458,label:"CPO",composers:["Georg Philipp Telemann"],artist:"Solo violinist · L'Orfeo Barockorchester",title:"Telemann: Complete Violin Concertos Vol. 1",description:"cpo 999 900-2 · CPO",format:"Single CD",catNo:"cpo 999 900-2",usedGBP:12.00,newGBP:null,notes:"CPO. Volume 1 of CPO's complete Telemann violin concerto cycle with the Austrian period-instrument ensemble L'Orfeo Barockorchester. Telemann composed an enormous number of concertos for violin and orchestra of remarkable variety and invention. CPO has been the most committed label in recording the complete works of Telemann. Please check the disc label for the soloist's name, which was not clearly legible in the photo."},
  {id:459,label:"Harmonia Mundi (2-disc)",composers:["Georg Philipp Telemann"],artist:"Rias Kammerchor · Akademie für Alte Musik Berlin / René Jacobs",title:"Telemann: Brockes-Passion",description:"HMC 902013.14 · Harmonia Mundi · 2-disc set",format:"2-disc set",catNo:"HMC 902013.14",usedGBP:16.00,newGBP:null,notes:"Harmonia Mundi. René Jacobs and his forces in Telemann's magnificent Brockes-Passion (1716), setting the famous text by Barthold Heinrich Brockes that attracted settings from Handel, Keiser, Mattheson and others. Telemann's version is among the finest — dramatic, inventive and deeply expressive. With the RIAS Kammerchor and Akademie für Alte Musik Berlin, two of Europe's finest early music ensembles. René Jacobs is among the greatest interpreters of Baroque vocal music. A landmark recording of a neglected masterwork."},
  {id:460,label:"PentaTone (SACD)",composers:["Pyotr Ilyich Tchaikovsky","Igor Stravinsky"],artist:"Russian National Orchestra / Vladimir Jurowski",title:"Tchaikovsky: Suite No. 3 in G major Op. 55 · Stravinsky: Divertimento (from 'Le Baiser de la fée')",description:"PTC 5186 061 · PentaTone · Hybrid Multichannel SACD",format:"SACD",catNo:"PTC 5186 061",usedGBP:12.00,newGBP:null,notes:"PentaTone Hybrid Multichannel SACD. Vladimir Jurowski and the Russian National Orchestra in a beautifully paired programme. Tchaikovsky's Suite No. 3 (1884) is one of his most inventive orchestral works, ending with a dazzling set of variations. Stravinsky's Divertimento, drawn from his ballet 'Le Baiser de la fée' (The Fairy's Kiss, 1928) — itself a homage to Tchaikovsky — makes a perfect complement, completing a circle of musical homage. Jurowski is one of the most searching interpreters of Russian repertoire of his generation."},
  {id:461,label:"Deutsche Grammophon",composers:["Pyotr Ilyich Tchaikovsky"],artist:"Ivo Pogorelich (piano) · London Symphony Orchestra / Claudio Abbado",title:"Tchaikovsky: Piano Concerto No. 1 in B-flat minor Op. 23",description:"415 122-2 · DG · rec. 1985",format:"Single CD",catNo:"415 122-2",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. Pogorelich's controversial recording of the Tchaikovsky First Concerto with Abbado and the LSO — the second time Abbado recorded this concerto for DG, having previously done it with Argerich (CD 450). Ivo Pogorelich (born 1958) became famous after his elimination from the 1980 Chopin Competition prompted Martha Argerich to resign from the jury in protest. His Tchaikovsky is characteristically individual — slow, probing tempi and extreme dynamic contrasts that divide opinion sharply but compel attention."},
  {id:462,label:"Deutsche Grammophon",composers:["Pyotr Ilyich Tchaikovsky","Antonín Dvořák"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Tchaikovsky: Serenade for Strings in C major Op. 48 · Dvořák: Serenade for Strings in E major Op. 22",description:"400 038-2 · DG · very early CD pressing · rec. 1966",format:"Single CD",catNo:"400 038-2",usedGBP:14.00,newGBP:null,notes:"Deutsche Grammophon. One of the earliest DG CDs ever pressed (the 400 series dates from 1982-83), transferring Karajan's famous 1966 recording of these two beloved string serenades. Both works show the string orchestra at its most eloquent: Tchaikovsky's Op. 48 moves from a stately Pezzo in forma di sonatina through a dazzling Valse to a touching final Tema russo; Dvořák's Op. 22 is pure Czech warmth and melody. The Berlin Philharmonic strings under Karajan are simply magnificent."},

function normaliseLabel(label){
  if(!label)return'';
  // Strip parenthetical suffix e.g. "(2-disc)", "(SACD)", "(Great Recordings...)"
  let b=label.replace(/\s*\(.*$/,'').trim();
  // Collapse known label families
  if(/^Deutsche Grammophon/i.test(b))return'Deutsche Grammophon';
  if(/^Archiv/i.test(b))return'Archiv Produktion';
  if(/^Philips/i.test(b))return'Philips';
  if(/^Decca/i.test(b))return'Decca';
  if(/^EMI/i.test(b))return'EMI';
  if(/^Harmonia Mundi/i.test(b))return'Harmonia Mundi';
  if(/^Naxos/i.test(b))return'Naxos';
  if(/^Chandos/i.test(b))return'Chandos';
  if(/^Hyperion/i.test(b))return'Hyperion';
  if(/^Sony/i.test(b))return'Sony';
  if(/^CBS/i.test(b))return'CBS Masterworks';
  if(/^RCA/i.test(b))return'RCA';
  if(/^Warner/i.test(b))return'Warner Classics';
  if(/^Virgin/i.test(b))return'Virgin Classics';
  if(/^Coro/i.test(b))return'Coro';
  if(/^BIS/i.test(b))return'BIS';
  if(/^LSO Live/i.test(b))return'LSO Live';
  if(/^Brilliant/i.test(b))return'Brilliant Classics';
  if(/^Pentatone/i.test(b))return'Pentatone';
  if(/^Linn/i.test(b))return'Linn Records';
  if(/^Testament/i.test(b))return'Testament';
  if(/^BBC/i.test(b))return'BBC Legends';
  if(/^Vox/i.test(b))return'Vox Box';
  return b;
}

}
function lastNameFirst(name){
  const parts=name.trim().split(' ');
  if(parts.length<=1)return name;
  const last=parts[parts.length-1];
  const rest=parts.slice(0,-1).join(' ');
  return last+', '+rest;
}
function getComposerList(){
  const s=new Set();
  catalogue.forEach(cd=>cd.composers.forEach(c=>s.add(c)));
  return [...s]

    .sort((a,b)=>a.display.localeCompare(b.display));
}
function getArtistList(){

  catalogue.filter(cd=>!del.includes(cd.id)).forEach(cd=>{

      if(clean.length>2) s.add(clean);
    });
  });
  return [...s].sort((a,b)=>a.localeCompare(b));
}

let pendingImport=null;
function importData(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.version||!data.exported) throw new Error('Invalid file');
      const counts=[
        (data.favourites||[]).length+' favourite(s)',
        (data.deleted||[]).length+' deletion(s)',
        Object.keys(data.catnos||{}).length+' cat.no. edit(s)',
        Object.keys(data.locations||{}).length+' location(s)',
        Object.keys(data.notes||{}).length+' note(s)'
      ].filter(s=>!s.startsWith('0')).join(', ');
      const saved=new Date(data.exported).toLocaleDateString();
      pendingImport=data;
      document.getElementById('import-msg').textContent=
        'Restore data from '+saved+'? ('+counts+') This will overwrite your current personal data.';
      document.getElementById('import-confirm').style.display='block';
      document.getElementById('import-confirm').scrollIntoView({behavior:'smooth',block:'center'});
    }catch(err){
      alert("Could not read file — please select a valid export file.");
    }
    e.target.value='';
  };
  reader.readAsText(file);
}

async function showTracks(id, e){
  e.stopPropagation();
  const cd=catalogue.find(c=>c.id===id);
  const panel=document.getElementById('tracks-panel-'+id);
  const btn=panel.previousElementSibling;

  // Toggle off if already showing
  if(panel.style.display==='block'){
    panel.style.display='none';
    btn.textContent='\u266B Show tracks on MusicBrainz';
    return;
  }

  const catNo=(getCatNoStore()[id]||cd.catNo||'').trim();
  if(!catNo||catNo==='—'){
    panel.style.display='block';
    panel.innerHTML='<div class="tracks-error">No catalogue number — cannot look up tracks.</div>';
    return;
  }

  panel.style.display='block';
  btn.textContent='Loading…';
  panel.innerHTML='<div class="tracks-loading">⏳ Searching MusicBrainz…</div>';

  try{
    // Step 1: search by catalogue number (quoted, then unquoted, then barcode)
    const catNoStripped=catNo.replace(/\s/g,'');
    let releases=[];

    const attempts=[
      'https://musicbrainz.org/ws/2/release/?query='+encodeURIComponent('catno:"'+catNo+'"')+'&limit=5&fmt=json',
      'https://musicbrainz.org/ws/2/release/?query='+encodeURIComponent('catno:'+catNoStripped)+'&limit=5&fmt=json',
      'https://musicbrainz.org/ws/2/release/?query='+encodeURIComponent('barcode:'+catNoStripped)+'&limit=5&fmt=json',
    ];

    for(const url of attempts){
      if(releases.length) break;
      try{
        const r=await fetch(url,{headers:{'Accept':'application/json'}});
        const d=await r.json();
        releases=(d.releases||[]);
        await new Promise(res=>setTimeout(res,1100));
      }catch(e){ break; }
    }

    if(!releases.length){
      panel.innerHTML='<div class="tracks-error">Not found on MusicBrainz for cat. no. '+catNo+'.</div>';
      btn.textContent='\u266B Show tracks on MusicBrainz';
      return;
    }

    // Step 2: fetch full release with tracks
    const mbid=releases[0].id;
    const r2=await fetch('https://musicbrainz.org/ws/2/release/'+mbid+'?inc=recordings&fmt=json',
      {headers:{'Accept':'application/json'}});
    const rel=await r2.json();
    const media=rel.media||[];

    let trackHtml='';
    for(let m=0;m<media.length;m++){
      if(media.length>1) trackHtml+='<div class="tracks-disc">Disc '+(m+1)+'</div>';
      (media[m].tracks||[]).forEach(t=>{
        const ms=t.length;
        const time=ms?Math.floor(ms/60000)+':'+String(Math.floor((ms%60000)/1000)).padStart(2,'0'):'';
        trackHtml+='<div class="track-item"><span class="track-num">'+t.number+'.</span><span class="track-title">'+t.title+'</span><span class="track-time">'+time+'</span></div>';
      });
    }
    panel.innerHTML=trackHtml||'<div class="tracks-error">No track data available.</div>';
    btn.textContent='\u266B Hide tracks';
  }catch(err){
    panel.innerHTML='<div class="tracks-error">Could not reach MusicBrainz — check your connection.</div>';
    btn.textContent='\u266B Show tracks on MusicBrainz';
  }
}

function clearSearch(){document.getElementById('search').value='';search()}
function toggleSort(){sortMode=(sortMode+1)%sortModes.length;document.getElementById('sort-label').textContent=sortModes[sortMode].label;search()}

function search(){
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  document.getElementById('clear-search').classList.toggle('visible',q.length>0);
  const deleted=getDeleted();
  const catnos=getCatNoStore();
  filtered=catalogue.filter(cd=>{
    if(deleted.includes(cd.id))return false;
    if(activeFilter==='sealed')return cd.sealed===true;
    if(activeFilter==='favourites')return getFavourites().includes(cd.id);
    if(activeFilter==='duplicate'){
      return cd.duplicate===true&&cd.duplicateGroup&&
        catalogue.some(o=>o.id!==cd.id&&o.duplicateGroup===cd.duplicateGroup&&!deleted.includes(o.id));
    }
    if(activeFilter==='SACD'&&!(cd.format&&cd.format.includes('SACD')))return false;
    if(activeFilter&&activeFilter!=='SACD'&&cd.format!==activeFilter)return false;
    if(activeComposer&&!cd.composers.includes(activeComposer))return false;
    if(activeArtist&&!cd.artist.includes(activeArtist))return false;
    if(activeLabel&&normaliseLabel(cd.label)!==activeLabel)return false;
    if(!q)return true;
    const liveCatNo=catnos[cd.id]||cd.catNo||'';
    if(notesSearchMode){
      const notesHay=[cd.notes||'',getCliveNote(cd.id)].join(' ').toLowerCase();
      return notesHay.includes(q);
    }
    const hay=[cd.artist,cd.label,...cd.composers,liveCatNo].join(' ').toLowerCase();
    return hay.includes(q);
  });
  const sm=sortModes[sortMode];
  filtered.sort((a,b)=>{
    if(sm.key==='id')return a.id-b.id;
    if(sm.key==='title')return a.title.localeCompare(b.title);
    if(sm.key==='usedGBP')return a.usedGBP-b.usedGBP;
    if(sm.key==='usedGBPd')return b.usedGBP-a.usedGBP;
    return 0;
  });
  render(q);
}

function render(q){
  const container=document.getElementById('cards');
  const noRes=document.getElementById('no-results');
  const notFound=document.getElementById('not-found-msg');
  const resCount=document.getElementById('results-count');
  const deleted=getDeleted();
  const total=catalogue.length-deleted.length;

  if(!filtered.length){
    container.innerHTML='';
    noRes.style.display='block';
    notFound.classList.add('visible');
  } else {
    noRes.style.display='none';
    notFound.classList.remove('visible');
  }

  const isFiltered=q||activeFilter||activeComposer||activeArtist||activeLabel;
  resCount.textContent=isFiltered?filtered.length+' of '+total:total+' CDs';
  

  container.innerHTML=filtered.map(cd=>{
    const isActiveDupe=cd.duplicate&&cd.duplicateGroup&&
      catalogue.some(o=>o.id!==cd.id&&o.duplicateGroup===cd.duplicateGroup&&!deleted.includes(o.id));
    const dupeBadge=isActiveDupe?'<span class="pill pill-dupe">&#9888; Duplicate</span>':'';
    const cardClass=isActiveDupe?' duplicate':'';
    const composers=cd.composers.map(c=>'<span class="pill pill-composer">'+c+'</span>').join('');
    const priceDisplay=cd.usedGBP>0?'&#163;'+cd.usedGBP.toFixed(2):'TBC';
    return '<div class="card'+cardClass+'" id="card-'+cd.id+'">'+
      '<div class="card-main" onclick="toggle('+cd.id+')">'+
        '<div class="card-num">'+cd.id+'</div>'+
        '<div class="card-body">'+
          '<div class="card-title">'+cd.title+'</div>'+
          '<div class="card-artist">'+cd.artist+'</div>'+
          '<div class="card-meta">'+composers+
            '<span class="pill pill-label">'+cd.label+'</span>'+
            '<span class="pill pill-format">'+cd.format+'</span>'+
            dupeBadge+
          '</div>'+
        '</div>'+
        '<div class="card-price">'+
          '<button class="star-btn'+(getFavourites().includes(cd.id)?' active':'')+'" onclick="toggleFavourite('+cd.id+',event)" title="Mark as favourite">&#9733;</button>'+
          '<div class="price-label" style="'+(cd.sealed?'color:#2a7a2a;font-weight:700':'')+'">'+(cd.sealed?'New':'Used')+'</div>'+
          '<div class="price-used">'+priceDisplay+'</div>'+
          '<div class="expand-icon">&#8964;</div>'+
        '</div>'+
      '</div>'+
      '<div class="card-detail">'+
        '<div class="detail-prices">'+
          '<div class="detail-price-item"><div class="detail-price-val">'+priceDisplay+'</div><div class="detail-price-lbl">Used (median)</div></div>'+
          (cd.newGBP?'<div class="detail-price-item"><div class="detail-price-val">&#163;'+cd.newGBP.toFixed(2)+'</div><div class="detail-price-lbl">New</div></div>':'')+
        '</div>'+
        '<div class="detail-section">'+
          '<div class="catno-loc-row">'+
            '<div style="flex:1;min-width:0">'+
              '<div class="detail-label">Catalogue No.</div>'+
              '<div class="catno-row" id="catno-row-'+cd.id+'">'+
                '<span class="detail-text catno-val" id="catno-val-'+cd.id+'">'+getCatNo(cd.id,cd.catNo)+'</span>'+
                '<button class="catno-edit-btn" onclick="editCatNo('+cd.id+',event)">&#9999;&#65039;</button>'+
              '</div>'+
              '<div class="catno-edit-wrap" id="catno-edit-'+cd.id+'" style="display:none">'+
                '<input type="text" class="catno-input" id="catno-input-'+cd.id+'" placeholder="Enter catalogue number...">'+
                '<div style="display:flex;gap:0.5rem;margin-top:0.4rem">'+
                  '<button class="btn-yes" onclick="saveCatNo('+cd.id+',event)">Save</button>'+
                  '<button class="btn-no" onclick="cancelCatNo('+cd.id+',event)">Cancel</button>'+
                '</div>'+
              '</div>'+
            '</div>'+
            '<div class="loc-wrap">'+
              '<div class="detail-label">Loc</div>'+
              '<div class="loc-row" id="loc-row-'+cd.id+'">'+
                '<span class="loc-val" id="loc-val-'+cd.id+'">'+(getLoc(cd.id)||'<span style="color:var(--text-light)">&#8212;</span>')+'</span>'+
                '<button class="catno-edit-btn" onclick="editLoc('+cd.id+',event)">&#9999;&#65039;</button>'+
              '</div>'+
              '<div id="loc-edit-'+cd.id+'" style="display:none;margin-top:0.35rem">'+
                '<input type="text" class="loc-input" id="loc-input-'+cd.id+'" maxlength="4" placeholder="A1">'+
                '<div style="display:flex;gap:0.4rem;margin-top:0.35rem">'+
                  '<button class="btn-yes" onclick="saveLoc('+cd.id+',event)">&#10003;</button>'+
                  '<button class="btn-no" onclick="cancelLoc('+cd.id+',event)">&#10005;</button>'+
                '</div>'+
              '</div>'+
            '</div>'+
          '</div>'+
        '</div>'+
        (cd.description?'<div class="detail-section"><div class="detail-label">Details</div><div class="detail-text">'+cd.description+'</div></div>':'')+
        '<div class="detail-section"><div class="detail-label">Notes</div><div class="detail-text">'+cd.notes+'</div></div>'+
        '<div class="detail-section">'+
          '<div class="detail-label">Clive\'s Notes</div>'+
          '<div class="clive-note-row">'+
            '<div class="clive-note-display" id="clive-note-val-'+cd.id+'">'+(getCliveNote(cd.id)||'<span class="clive-note-placeholder">Add your notes…</span>')+'</div>'+
            '<button class="catno-edit-btn" onclick="editCliveNote('+cd.id+',event)">&#9999;&#65039;</button>'+
          '</div>'+
          '<div id="clive-note-edit-'+cd.id+'" style="display:none">'+
            '<textarea class="clive-note-input" id="clive-note-input-'+cd.id+'" placeholder="Your personal notes about this CD…"></textarea>'+
            '<div style="display:flex;gap:0.5rem;margin-top:0.4rem">'+
              '<button class="btn-yes" onclick="saveCliveNote('+cd.id+',event)">Save</button>'+
              '<button class="btn-no" onclick="cancelCliveNote('+cd.id+',event)">Cancel</button>'+
            '</div>'+
          '</div>'+
        '</div>'+
        '<button class="tracks-btn" onclick="showTracks('+cd.id+',event)">&#127925; Show tracks on MusicBrainz</button>'+
        '<div class="tracks-panel" id="tracks-panel-'+cd.id+'"></div>'+
        '<button class="delete-btn" onclick="showConfirm('+cd.id+',event)">Remove from collection</button>'+
        '<div class="delete-confirm" id="confirm-'+cd.id+'">'+
          '<p>Remove this CD?<br><strong>'+cd.title+'</strong></p>'+
          '<div class="delete-confirm-btns">'+
            '<button class="btn-no" onclick="hideConfirm('+cd.id+',event)">Cancel</button>'+
            '<button class="btn-yes" onclick="deleteCD('+cd.id+')">Yes, remove it</button>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');

  updateStats();
}

function updateStats(){
  const deleted=getDeleted();
  // Footer always shows TOTAL collection (not filtered view)
  const all=catalogue.filter(c=>!deleted.includes(c.id));
  const total=all.length;
  const val=all.reduce((s,c)=>s+(c.usedGBP||0),0);
  const avg=total?val/total:0;
  const comps=new Set(all.flatMap(c=>c.composers)).size;
  document.getElementById('s-total').innerHTML=total;
  document.getElementById('s-value').innerHTML='£'+val.toFixed(2);
  document.getElementById('s-avg').innerHTML='£'+avg.toFixed(2);
  document.getElementById('s-comp').innerHTML=comps;
}

document.querySelectorAll('.filter-chip[data-filter]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const isActive=btn.classList.contains('active');
    const isAll=btn.dataset.filter==='';
    // Toggle off if already active (and not the All chip)
    const newFilter=(isActive&&!isAll)?'':btn.dataset.filter||'';
    document.querySelectorAll('.filter-chip[data-filter]').forEach(b=>b.classList.remove('active'));
    // Highlight All chip if resetting, otherwise highlight clicked chip
    if(newFilter===''){
      document.querySelector('.filter-chip[data-filter=""]').classList.add('active');
    } else {
      btn.classList.add('active');
    }
    activeFilter=newFilter;
    if(activeFilter===''){
      activeComposer=''; activeArtist=''; activeLabel='';
      notesSearchMode=false;
      const nb=document.getElementById('notes-search-btn'); if(nb) nb.classList.remove('active');
      const sb=document.getElementById('search-box'); if(sb) sb.placeholder='Search by title, composer, artist, catalogue no…';
      document.getElementById('composer-label').textContent='Composer';
      document.getElementById('artist-label').textContent='Artist';
      document.getElementById('label-label').textContent='Label';
      document.getElementById('composer-btn').classList.remove('active');
      document.getElementById('artist-btn').classList.remove('active');
      document.getElementById('label-btn').classList.remove('active');
    }
    closeDropdown();
    search();
  });
});
document.addEventListener('click', closeDropdown);
document.getElementById('search').addEventListener('input',search);

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/CD-Catalogue/sw.js').catch(()=>{});
  });
}

updateRestoreBtn();
search();

// Keep filter bar stuck just below header
function setHeaderHeight(){
  const h = document.querySelector('header');
  if(h) document.documentElement.style.setProperty('--header-h', h.offsetHeight+'px');
}
setHeaderHeight();
window.addEventListener('resize', setHeaderHeight);
</script>
</body>
