<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Clive's Classical CD Collection</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CD Catalogue">
<meta name="theme-color" content="#1B2B5B">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1B2B5B;--navy-mid:#2d4080;--navy-light:#e8edf8;--navy-xlight:#f0f4fc;
  --cream:#FAF7F2;--cream-dark:#f0ebe0;
  --gold:#C4972A;--gold-light:#fdf3da;
  --text:#1a1a2e;--text-mid:#4a4a6a;--text-light:#8888aa;
  --border:#ddd8cc;--white:#fff;
  --green:#1e7a4a;--green-bg:#eaf7f0;
  --red:#b83232;--red-bg:#fdf0f0;
  --radius:10px;--radius-lg:14px;
}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
header{background:var(--navy);padding:1.2rem 1rem 1rem;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,0.25)}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem}
header h1{color:var(--white);font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:500;letter-spacing:0.02em}
header h1 span{color:var(--gold);font-style:italic}
.header-count{color:rgba(255,255,255,0.5);font-size:0.75rem;white-space:nowrap}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--text-light);fill:none;stroke-width:2.5;pointer-events:none}
#search{width:100%;padding:0.85rem 3rem 0.85rem 2.75rem;border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:1rem;background:rgba(255,255,255,0.12);color:var(--white);outline:none;-webkit-appearance:none}
#search::placeholder{color:rgba(255,255,255,0.45)}
#search:focus{background:rgba(255,255,255,0.2)}
#clear-search{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.2);border:none;border-radius:50%;width:24px;height:24px;color:white;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
#clear-search.visible{display:flex}
.filter-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0.6rem 1rem;display:flex;gap:0.5rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:var(--header-h,0);z-index:100}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{padding:0.35rem 0.75rem;border:1px solid var(--border);border-radius:20px;font-size:0.78rem;white-space:nowrap;background:var(--white);color:var(--text-mid);cursor:pointer;font-family:'DM Sans',sans-serif}
.filter-chip.active{background:var(--navy);color:var(--white);border-color:var(--navy)}
.filter-chip-sacd{border-color:#1a7a6e;color:#1a5a50}
.filter-chip-sacd.active{background:#1a7a6e;border-color:#1a7a6e;color:white}
.filter-chip-dd{padding-right:0.6rem}
.dd-item{padding:0.75rem 1.25rem;font-size:0.85rem;color:var(--text);border-bottom:1px solid var(--border);cursor:pointer;font-family:"DM Sans",sans-serif;line-height:1.4}
.dd-item:active{background:var(--cream)}
.dd-selected{background:var(--navy);color:white}
.filter-chip-star{border-color:#c4972a;color:#c4972a}
.filter-chip-star.active{background:#c4972a;border-color:#c4972a;color:white}
.star-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:0;line-height:1;opacity:0.4;transition:opacity 0.15s}
.star-btn.active{opacity:1;color:#c4972a}
.star-btn:active{transform:scale(1.2)}
.clive-note-row{display:flex;align-items:flex-start;gap:0.5rem;margin-top:0.15rem}
.clive-note-display{font-size:0.82rem;color:var(--text-mid);line-height:1.6;flex:1}
.clive-note-placeholder{color:var(--text-light);font-style:italic}
.clive-note-input{width:100%;padding:0.5rem 0.65rem;border:1.5px solid var(--navy);border-radius:var(--radius);font-family:"DM Sans",sans-serif;font-size:0.85rem;margin-top:0.35rem;outline:none;min-height:80px;resize:vertical}
.restore-item{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0;border-bottom:1px solid #eedfa0;gap:0.75rem}
.restore-item:last-child{border-bottom:none}
.restore-item-info{flex:1;min-width:0}
.restore-item-title{font-size:0.82rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.restore-item-artist{font-size:0.73rem;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.restore-one-btn{padding:0.3rem 0.65rem;background:#c4972a;color:white;border:none;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:0.75rem;cursor:pointer;white-space:nowrap;flex-shrink:0}
.filter-chip-dupe{border-color:#c4972a;color:#7a5a0a}
.filter-chip-dupe.active{background:#c4972a;border-color:#c4972a;color:white}
.filter-chip-restore{border-color:#b83232;color:#b83232;font-size:0.75rem}
.results-bar{padding:0.6rem 1rem;display:flex;justify-content:space-between;align-items:center}
.results-count{font-size:0.92rem;font-weight:500;color:var(--navy)}
.sort-btn{font-size:0.78rem;color:var(--navy);background:none;font-family:'DM Sans',sans-serif;cursor:pointer;padding:0.2rem 0.5rem;border:1px solid var(--border);border-radius:20px}
.cards{padding:0 0.75rem 2rem;display:flex;flex-direction:column;gap:0.6rem}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.card:active{box-shadow:0 2px 8px rgba(27,43,91,0.15)}
.card.duplicate{border-left:3px solid var(--gold)}
.card-main{padding:0.9rem 1rem;cursor:pointer;display:flex;gap:0.75rem;align-items:flex-start}
.card-num{min-width:28px;height:28px;background:var(--navy-xlight);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.72rem;color:var(--navy-mid);font-weight:500;flex-shrink:0;margin-top:1px}
.card-body{flex:1;min-width:0}
.card-title{font-weight:500;font-size:0.95rem;line-height:1.3;color:var(--text);margin-bottom:0.2rem;word-break:break-word}
.card-artist{font-size:0.8rem;color:var(--text-mid);margin-bottom:0.35rem;line-height:1.4}
.card-meta{display:flex;flex-wrap:wrap;gap:0.3rem;align-items:center}
.pill{display:inline-block;padding:0.15rem 0.5rem;border-radius:20px;font-size:0.7rem;line-height:1.4}
.pill-composer{background:var(--navy-xlight);color:var(--navy-mid)}
.pill-label{background:var(--cream-dark);color:var(--text-mid)}
.pill-format{background:var(--gold-light);color:#7a5a0a}
.pill-dupe{background:#fff3cd;color:#7a5a0a}
.card-price{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:0.25rem}
.price-used{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:500;color:var(--navy);white-space:nowrap}
.price-label{font-size:0.65rem;color:var(--text-light);text-transform:uppercase;letter-spacing:0.05em}
.expand-icon{font-size:1rem;color:var(--text-light);margin-top:0.25rem;transition:transform 0.2s}
.card.open .expand-icon{transform:rotate(180deg)}
.card-detail{display:none;padding:0 1rem 1rem 1rem;border-top:1px solid var(--border)}
.card.open .card-detail{display:block}
.detail-section{margin-top:0.75rem}
.detail-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-light);margin-bottom:0.25rem}
.detail-text{font-size:0.82rem;color:var(--text-mid);line-height:1.6;font-style:italic}
.detail-prices{display:flex;gap:1.5rem;margin-top:0.75rem;padding:0.65rem 0.75rem;background:var(--navy-xlight);border-radius:var(--radius)}
.detail-price-item{display:flex;flex-direction:column}
.detail-price-val{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:500;color:var(--navy)}
.detail-price-lbl{font-size:0.68rem;color:var(--text-light);text-transform:uppercase;letter-spacing:0.05em}
.catno-row{display:flex;align-items:center;gap:0.5rem}
.catno-edit-btn{background:none;border:none;font-size:0.8rem;cursor:pointer;padding:0;opacity:0.6;line-height:1}
.catno-input{width:100%;padding:0.5rem 0.65rem;border:1.5px solid var(--navy);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:0.85rem;margin-top:0.35rem;outline:none}
.tracks-btn{width:100%;margin-top:0.6rem;padding:0.6rem;background:none;border:1.5px solid var(--navy-mid);border-radius:var(--radius);color:var(--navy-mid);font-family:"DM Sans",sans-serif;font-size:0.82rem;cursor:pointer}
.tracks-btn:active{background:var(--navy-xlight)}
.tracks-panel{margin-top:0.5rem;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:none}
.tracks-loading{padding:0.75rem 1rem;font-size:0.8rem;color:var(--text-light);font-style:italic}
.tracks-error{padding:0.75rem 1rem;font-size:0.8rem;color:var(--text-light)}
.tracks-disc{padding:0.4rem 1rem;background:var(--navy);color:white;font-size:0.72rem;font-weight:500;letter-spacing:0.05em;text-transform:uppercase}
.track-item{display:flex;align-items:baseline;gap:0.4rem;padding:0.35rem 1rem;border-bottom:1px solid var(--border);font-size:0.78rem}
.track-item:last-child{border-bottom:none}
.track-num{color:var(--text-light);min-width:1.5rem;flex-shrink:0;font-size:0.72rem}
.track-title{flex:1;color:var(--text)}
.track-time{color:var(--text-light);font-size:0.72rem;flex-shrink:0}
.delete-btn{width:100%;margin-top:0.9rem;padding:0.7rem;background:none;border:1.5px solid #b83232;border-radius:var(--radius);color:#b83232;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer}
.delete-confirm{display:none;margin-top:0.6rem;padding:0.75rem;background:#fdf0f0;border-radius:var(--radius);text-align:center}
.delete-confirm.visible{display:block}
.delete-confirm p{font-size:0.82rem;color:#b83232;margin-bottom:0.6rem}
.delete-confirm-btns{display:flex;gap:0.5rem;justify-content:center}
.btn-yes{padding:0.45rem 1.2rem;background:#b83232;color:white;border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer}
.btn-no{padding:0.45rem 1.2rem;background:none;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;color:var(--text-mid)}
.no-results{text-align:center;padding:3rem 1.5rem}
.no-results-icon{font-size:2.5rem;margin-bottom:0.75rem}
.no-results h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--text-mid);margin-bottom:0.5rem}
.no-results p{font-size:0.85rem;color:var(--text-light)}
.not-found-msg{display:none;text-align:center;margin:0.5rem 1rem;padding:0.75rem;background:var(--red-bg);border-radius:var(--radius);color:var(--red);font-size:0.85rem;font-weight:500}
.not-found-msg.visible{display:block}
.stats-footer{background:var(--navy);color:rgba(255,255,255,0.7);font-size:0.75rem;padding:1rem;display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.stat-item{display:flex;flex-direction:column;gap:0.1rem}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:var(--white)}
.stat-val.gold{color:var(--gold)}
@media(min-width:640px){
  .cards{display:grid;grid-template-columns:1fr 1fr;padding:1rem;gap:0.75rem}
  .stats-footer{grid-template-columns:repeat(4,1fr)}
  header{padding:1.2rem 1.5rem 1rem}
  header h1{font-size:1.7rem}
  .filter-bar{padding:0.6rem 1.5rem}
  .results-bar{padding:0.6rem 1.5rem}
}
@media(min-width:1024px){
  .cards{grid-template-columns:1fr 1fr 1fr;padding:1rem 1.5rem}
}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <h1>Clive's Classical <span>CD</span> Collection</h1>
    
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="search" placeholder="Search composer, artist, title, cat. no…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="clear-search" onclick="clearSearch()" aria-label="Clear search">&#x2715;</button>
  </div>
</header>

<div class="filter-bar" id="filter-bar">
  <button class="filter-chip active" data-filter="">All</button>
  <button class="filter-chip filter-chip-dd" id="composer-btn" onclick="toggleDropdown('composer',event)"><span id="composer-label">Composer</span> &#9662;</button>
  <button class="filter-chip filter-chip-dd" id="artist-btn" onclick="toggleDropdown('artist',event)"><span id="artist-label">Artist</span> &#9662;</button>
  <button class="filter-chip" data-filter="Single CD">Single CD</button>
  <button class="filter-chip" data-filter="2-disc set">2-disc sets</button>
  <button class="filter-chip" data-filter="4-disc set">4-disc sets</button>
  <button class="filter-chip filter-chip-sacd" data-filter="SACD">SACD</button>
  <button class="filter-chip filter-chip-star" data-filter="favourites">&#9733; Favourites</button>
  <button class="filter-chip filter-chip-dupe" data-filter="duplicate">&#9888; Duplicates</button>
  <button class="filter-chip filter-chip-restore" id="restore-btn" onclick="showRestoreConfirm()" style="display:none">&#x21A9; Restore deleted (<span id="restore-count">0</span>)</button>
</div>

<div id="dd-panel" style="display:none;position:fixed;left:0;right:0;background:var(--white);border-bottom:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.18);z-index:150;max-height:50vh;overflow-y:auto" onclick="event.stopPropagation()">
  <div id="dd-list"></div>
</div>
<div class="results-bar">
  <span class="results-count" id="results-count"></span>
  <button class="sort-btn" onclick="toggleSort()">Sort: <span id="sort-label">&#8470;</span></button>
</div>

<div id="restore-confirm" style="display:none;margin:0.5rem 1rem;padding:0.85rem;background:#fff3cd;border-radius:10px;border:1px solid #c4972a">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem">
    <p style="font-size:0.85rem;color:#7a5a0a;font-weight:500">Deleted CDs</p>
    <button onclick="hideRestoreConfirm()" style="background:none;border:none;font-size:1rem;cursor:pointer;color:#7a5a0a;padding:0">&#x2715;</button>
  </div>
  <div id="restore-list"></div>
</div>

<div class="not-found-msg" id="not-found-msg">Not in your collection &#8212; safe to buy!</div>

<div class="cards" id="cards"></div>

<div class="no-results" id="no-results" style="display:none">
  <div class="no-results-icon">&#127925;</div>
  <h3>Not in your collection</h3>
  <p>Safe to buy!</p>
</div>

<div class="stats-footer">
  <div class="stat-item"><div class="stat-val" id="s-total"></div><div>Total CDs</div></div>
  <div class="stat-item"><div class="stat-val gold" id="s-value"></div><div>Collection value (used)</div></div>
  <div class="stat-item"><div class="stat-val" id="s-avg"></div><div>Average used price</div></div>
  <div class="stat-item"><div class="stat-val" id="s-comp"></div><div>Composers</div></div>
</div>

<script>
const catalogue = [
  {id:1,label:"RCA Victor Red Seal",composers:["Enrique Granados","Isaac Albéniz"],artist:"Julian Bream (guitar)",title:"Julian Bream Edition – Music of Spain",description:"Granados & Albéniz",format:"Single CD",catNo:"09026 61600-2",usedGBP:7.0,newGBP:null,notes:"RCA Red Seal. Bream was the defining interpreter of Spanish guitar repertoire for a generation. Part of the acclaimed 28-disc Julian Bream Edition."},
  {id:2,label:"Philips",composers:["Juan Crisóstomo de Arriaga"],artist:"Guarneri Quartet",title:"Arriaga: The String Quartets (Nos. 1–3)",description:"",format:"Single CD",catNo:"446 092-2",usedGBP:41.00,newGBP:null,notes:"Philips. A recognised collector's item — the Guarneri Quartet's recording has become so sought-after that unused copies command very high prices. Arriaga, who died aged 19, has been called the Spanish Mozart."},
  {id:3,label:"Deutsche Grammophon",composers:["Tomaso Albinoni","Johann Pachelbel","J.S. Bach","Antonio Vivaldi","W.A. Mozart","C.W. Gluck"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Albinoni: Adagio · Pachelbel: Canon",description:"+ Bach Air · Vivaldi La Notte · Mozart Serenata notturna · Gluck Dance of Blessed Spirits",format:"Single CD",catNo:"413 309-2",usedGBP:9.0,newGBP:19.0,notes:"Deutsche Grammophon. One of DG's bestselling classical compilations ever. Karajan's 1973–74 recordings with the Berlin Philharmonic remain a popular benchmark for Baroque orchestral favourites."},
  {id:4,label:"Philips (Gold Double)",composers:["Tomaso Albinoni"],artist:"I Musici · Maurice André · Heinz Holliger",title:"Adagio and Allegro – Albinoni Concertos",description:"Compilation spanning recordings 1960–93",format:"Single CD",catNo:"454 418-2",usedGBP:6.0,newGBP:null,notes:"Philips Gold Double. I Musici were the ensemble that brought Vivaldi's Four Seasons to mass audiences. This compilation draws on their landmark Albinoni sessions for Philips spanning 1960–93."},
  {id:5,label:"Decca (L'Oiseau-Lyre)",composers:["Tomaso Albinoni"],artist:"Andrew Manze · Academy of Ancient Music / Christopher Hogwood",title:"Albinoni: 12 Concertos, Op. 9",description:"First recording on period instruments · 2-disc set",format:"2-disc set",catNo:"458 129-2",usedGBP:22.0,newGBP:null,notes:"Decca / L'Oiseau-Lyre. First complete recording of Op.9 on period instruments. Praised for spectacular performances — Manze's violin described as incomparable."},
  {id:6,label:"Zig Zag Territoires / Alpha",composers:["Tomaso Albinoni"],artist:"Ensemble 415 / Chiara Banchini (violin & direction)",title:"Albinoni: Sinfonie a Cinque, Op. 2",description:"rec. Église Évangélique Allemande, Paris, 2008",format:"Single CD",catNo:"ZZT090202",usedGBP:11.0,newGBP:null,notes:"Zig Zag Territoires / Alpha. Ensemble 415 isolates the sonatas from Op.2 in an unmistakably chamber-oriented setting. Praised for appealing simplicity and charming sophistication (The Strad, Jan 2009)."},
  {id:7,label:"Hyperion",composers:["J.S. Bach"],artist:"Angela Hewitt (piano)",title:"Bach: The Well-Tempered Clavier (Books 1 & 2)",description:"CDA67741/4 · 2008 recording · 4-disc set",format:"4-disc set",catNo:"CDA67741/4",usedGBP:27.0,newGBP:null,notes:"Hyperion CDA67741/4. Hewitt's second recording of the 48, made fresh from her 58-city Bach World Tour. Gramophone: 'digs deeper, with more personalised poetry.' BBC Music Magazine: 'Her best Bach yet.'"},
  {id:8,label:"Decca",composers:["J.S. Bach"],artist:"András Schiff (piano)",title:"Bach: The Well-Tempered Clavier, Book I",description:"BWV 846–869 · 2-disc set · rec. Walthamstow, 1984",format:"2-disc set",catNo:"414 388-2",usedGBP:9.0,newGBP:16.0,notes:"Decca. Schiff's 1984 Walthamstow recording remains a touchstone of modern piano Bach. The New York Times described Schiff as a phenomenon — he doesn't so much perform Bach as emit, breathe it."},
  {id:9,label:"Decca",composers:["J.S. Bach"],artist:"András Schiff (piano)",title:"Bach: The Well-Tempered Clavier, Book II",description:"BWV 870–893 · 2-disc set · rec. 1985",format:"2-disc set",catNo:"417 236-2",usedGBP:9.0,newGBP:16.0,notes:"Decca. Companion volume to Book I; recorded 1985. Both Schiff WTC volumes praised as phenomenon performances."},
  {id:10,label:"RCA Victor Red Seal",composers:["J.S. Bach"],artist:"Sviatoslav Richter (piano)",title:"Bach: The Well-Tempered Clavier (Complete)",description:"Books I & II · live, Innsbruck 1973 · 4-disc set",format:"4-disc set",catNo:"GD 60949",usedGBP:17.0,newGBP:18.0,notes:"RCA Victor Red Seal. Live Innsbruck 1973. One of the most celebrated WTC recordings ever made. Richter's fierce concentration and architectural sweep are considered unsurpassed by many critics."},
  {id:11,label:"Sony Classical",composers:["J.S. Bach"],artist:"Glenn Gould (piano)",title:"A State of Wonder – The Complete Goldberg Variations",description:"1955 & 1981 recordings · 2-disc set",format:"2-disc set",catNo:"SM3K 87703",usedGBP:10.0,newGBP:null,notes:"Sony Classical. Combines Gould's electrifying 1955 debut with his final 1981 recording, made just days before his death. Both are among the most influential piano recordings of the 20th century."},
  {id:12,label:"Warner Classics",composers:["J.S. Bach"],artist:"Beatrice Rana (piano)",title:"Bach: Goldberg Variations BWV 988",description:"2017 recording",format:"Single CD",catNo:"0190295880187",usedGBP:13.0,newGBP:16.0,notes:"Warner Classics. Gramophone praised Rana's calm maturity and sense of architecture. Le Monde: she had nothing left to prove technically. Universal critical acclaim on release in 2017."},
  {id:13,label:"Decca (Penguin Classics)",composers:["J.S. Bach"],artist:"András Schiff (piano)",title:"Bach: Goldberg Variations BWV 988",description:"Penguin Classics reissue · rec. 1982",format:"Single CD",catNo:"466 214-2",usedGBP:6.0,newGBP:null,notes:"Decca Penguin Classics reissue. Budget reissue of Schiff's celebrated 1982 Goldberg recording, selected by Penguin Classics as a canonical recording."},
  {id:14,label:"Decca",composers:["J.S. Bach"],artist:"András Schiff (piano)",title:"Bach: Goldberg Variations BWV 988",description:"Goldberg Variationen · rec. 1982",format:"Single CD",catNo:"417 116-2",usedGBP:7.0,newGBP:null,notes:"Decca. Schiff's 1982 studio recording — his first Goldberg — recorded in his early thirties. Still regarded as one of the finest modern piano accounts of this work."},
  {id:15,label:"Sony Classical",composers:["J.S. Bach"],artist:"Murray Perahia (piano)",title:"Bach: Goldberg Variations BWV 988",description:"rec. La Chaux-de-Fonds, July 2000 · Gramophone Recording of the Month",format:"Single CD",catNo:"SK 89243",usedGBP:7.0,newGBP:null,notes:"Sony Classical. Gramophone Recording of the Month. Perahia overcame a career-threatening hand injury to make this recording. Widely regarded as one of the great modern Goldberg Variations."},
  {id:16,label:"Hyperion",composers:["J.S. Bach"],artist:"Angela Hewitt (piano)",title:"Bach: Goldberg Variations BWV 988",description:"CDA68146 · rec. 2015 re-recording · Hyperion",format:"Single CD",catNo:"CDA68146",usedGBP:13.0,newGBP:14.0,notes:"Hyperion CDA67305. Gramophone: 'she has never made a better CD.' The Guardian: 'Bach on the piano of the highest quality imaginable.'"},
  {id:17,label:"Virgin Veritas",composers:["J.S. Bach"],artist:"Monica Huggett (baroque violin)",title:"Bach: Sonatas & Partitas BWV 1001–1006",description:"2-disc set · rec. on 1618 Amati violin, 1995–96",format:"2-disc set",catNo:"5452052 5",usedGBP:13.0,newGBP:null,notes:"Virgin Veritas. Gramophone Award winner 1997. Huggett plays on a 1618 Amati violin. Praised for purity of sound and historically informed articulation."},
  {id:18,label:"Dynamic",composers:["J.S. Bach"],artist:"Andrea Bacchetti (piano)",title:"Bacchetti plays Bach: Two-Part Inventions & Sinfonias",description:"and other keyboard works · CDS 629/1-2 · 2-disc set",format:"2-disc set",catNo:"CDS 629/1-2",usedGBP:14.0,newGBP:null,notes:"Dynamic CDS 629/1-2. Bacchetti's approach praised as genuinely new post-Gould. Classical Music: 'two discs without a dull moment.'"},
  {id:19,label:"Sony Classical",composers:["J.S. Bach"],artist:"Murray Perahia (piano)",title:"Bach: Partitas Nos. 2, 3 & 4",description:"rec. Nalepa Studios, Berlin, 2007",format:"Single CD",catNo:"8869740083-2",usedGBP:10.0,newGBP:16.0,notes:"Sony Classical. Echo Klassik Award 2010, Best Solo Recording (17th–18th century). Die Zeit: 'wonderfully floating, free and cantabile.'"},
  {id:20,label:"Sony Classical",composers:["J.S. Bach"],artist:"Murray Perahia (piano)",title:"Bach: Partitas Nos. 1, 5 & 6",description:"rec. Rundfunkzentrum Berlin, 2008–09",format:"Single CD",catNo:"88697443612",usedGBP:11.0,newGBP:16.0,notes:"Sony Classical. Second volume of Perahia's Partita cycle. Die Welt praised 'a ravishing sense of rhythm.'"},
  {id:21,label:"Hyperion",composers:["J.S. Bach"],artist:"Angela Hewitt (piano)",title:"Bach: The Six Partitas BWV 825–830",description:"CDA67191/2 · 2-disc set · rec. Hannover, 1996–97",format:"2-disc set",catNo:"CDA67191/2",usedGBP:17.0,newGBP:23.0,notes:"Hyperion CDA67191/2. Gramophone: 'effortlessly eclipsing all competition.' The Sunday Times: 'formidably equipped… discs to play again and again.'"},
  {id:22,label:"EMI Classics",composers:["J.S. Bach","Rodion Shchedrin","Eugène Ysaÿe"],artist:"Maxim Vengerov (violin)",title:"Vengerov plays Bach, Shchedrin, Ysaÿe",description:"Works for solo violin · rec. Potton Hall, 2002",format:"Single CD",catNo:"5 57384 2 4",usedGBP:8.0,newGBP:null,notes:"EMI Classics. Dazzling solo recital linking three composers inspired by Bach. Vengerov's Ysaÿe sonatas — fiendishly difficult — brought alive with innate musicality."},
  {id:23,label:"EMI Classics",composers:["J.S. Bach"],artist:"Mstislav Rostropovich (cello)",title:"Bach: Cello Suites Nos. 1–6 BWV 1007–1012",description:"2-disc set · rec. Basilique Ste-Madeleine, Vézelay, 1991",format:"2-disc set",catNo:"5 61609 2 7",usedGBP:9.0,newGBP:null,duplicate:true,duplicateGroup:"rostropovich-emi",notes:"EMI Classics. Rostropovich prefaces each suite with spoken commentary. Recorded at Vézelay — its natural resonance perfectly suits the music. ⚠ Two copies in collection."},
  {id:24,label:"Sony Classical",composers:["J.S. Bach"],artist:"Murray Perahia (piano)",title:"Bach: The Complete English Suites Nos. 1–6",description:"BWV 806–811 · 2-disc digipak · rec. La Chaux-de-Fonds, 1997–98",format:"2-disc set",catNo:"88697310502",usedGBP:12.0,newGBP:null,notes:"Sony Classical. Grammy Award winner (English Suites Nos. 1, 3 & 6). Part of Perahia's acclaimed decade-long Bach project for Sony (1997–2009)."},
  {id:25,label:"Sony Classical",composers:["J.S. Bach"],artist:"Murray Perahia · Academy of St Martin in the Fields",title:"Bach: Keyboard Concertos Nos. 3, 5, 6 & 7",description:"SK89690 · rec. Air Studios, Lyndhurst Hall, London, 2000",format:"Single CD",catNo:"SK 89690",usedGBP:8.0,newGBP:null,notes:"Sony Classical SK89690. Vol. 2 of Perahia's Bach concerto series. Praised as reference versions for those who desire these works on the concert grand."},
  {id:26,label:"EMI Classics",composers:["J.S. Bach"],artist:"Heinrich Schiff (cello)",title:"Bach: Cello Suites Nos. 1–6 BWV 1007–1012",description:"2-disc set · rec. Evangelische Kirche, Seeon, 1984",format:"2-disc set",catNo:"574179 2 1",usedGBP:6.0,newGBP:null,notes:"EMI Classics. ClassicsToday Reference Recording. 'Arrestingly individual, musically profound and sonically sumptuous.' Originally deleted; revived for EMI's Double Forte budget series."},
  {id:27,label:"EMI Classics (Digital)",composers:["J.S. Bach","W.A. Mozart","Domenico Scarlatti","Franz Schubert"],artist:"Dinu Lipatti (piano)",title:"Lipatti: Bach · Mozart · Scarlatti · Schubert",description:"rec. Radio-Genève & Abbey Road, 1947 & 1950",format:"Single CD",catNo:"CDC 7 47517 2",usedGBP:7.0,newGBP:null,notes:"EMI Digital. Legendary recordings from 1947 and 1950 — Lipatti died of leukaemia aged 33. Never out of catalogue since his death. Producer Walter Legge called them beyond criticism."},
  {id:28,label:"Deutsche Grammophon",composers:["J.S. Bach"],artist:"Nathan Milstein (violin)",title:"Bach: Sonatas & Partitas for Solo Violin BWV 1001–1006",description:"457 701-2 · 2-disc set · rec. Conway Hall, London, 1973",format:"2-disc set",catNo:"457 701-2",usedGBP:11.0,newGBP:null,notes:"Deutsche Grammophon 457 701-2. Milstein's playing — constantly flawless, aristocratic and elegant. His special affinity for the Bach unaccompanied works is abundantly clear. Now out of print."},
  {id:29,label:"Deutsche Grammophon",composers:["J.S. Bach"],artist:"Mischa Maisky (cello) · Martha Argerich (piano)",title:"Bach: Cello Sonatas BWV 1027–1029",description:"rec. Munich, Residenz, 1985",format:"Single CD",catNo:"415 471-2",usedGBP:8.00,newGBP:null,duplicate:true,duplicateGroup:"maisky-argerich",notes:"Deutsche Grammophon. One of the great chamber partnerships on record. Maisky's warm tone and Argerich's mercurial pianism make this enduringly compelling. ⚠ Two copies in collection."},
  {id:30,label:"Decca",composers:["J.S. Bach"],artist:"Julia Fischer (violin) · Academy of St Martin in the Fields",title:"Bach: Violin Concertos",description:"BWV 1041, 1042, 1043, 1060 · rec. St Paul's, Deptford, 2008",format:"Single CD",catNo:"478 0650",usedGBP:10.00,newGBP:14.0,notes:"Decca. Fischer's Decca debut. The Times: 'there is only Julia Fischer.' Gramophone 2008: 'technically awe-inspiring, wonderfully imaginative.' Fischer won the Bach prize at the Menuhin Competition aged eleven."},
  {id:31,label:"Deutsche Grammophon",composers:["J.S. Bach"],artist:"Hilary Hahn (violin) · Matthias Goerne (baritone) · Christine Schäfer (soprano)",title:"Bach: Violin and Voice",description:"rec. Himmelfahrtskirche, München-Sendling, 2008–09",format:"Single CD",catNo:"477 8092",usedGBP:10.00,newGBP:null,notes:"Deutsche Grammophon. Hahn records Bach violin obbligati exclusively — an act of devotion no other violinist had committed to disc. Works drawn from the St Matthew Passion and Mass in B minor."},
  {id:33,label:"Deutsche Grammophon (Panorama)",composers:["J.S. Bach"],artist:"Reinhard Goebel · Musica Antiqua Köln · Simon Standage · Trevor Pinnock",title:"Johann Sebastian Bach: Panorama",description:"Brandenburg Concertos · Violin Concertos · Harpsichord Concertos · 2-disc set",format:"2-disc set",catNo:"469 103-2",usedGBP:7.00,newGBP:null,notes:"DG Panorama budget series. Classical Music: 'no more thrilling survey of the Brandenburgs than Goebel's 1987 cycle — whirlwind performances, unfailingly polished and stylish.'"},
  {id:34,label:"Virgin Classics",composers:["J.S. Bach"],artist:"Ralph Kirshbaum (cello)",title:"Bach: Cello Suites Nos. 1–6 BWV 1007–1012",description:"2-disc set · rec. January 1993",format:"2-disc set",catNo:"VBD 5 61609 2",usedGBP:6.00,newGBP:null,notes:"Virgin Classics. ClassicsToday: 'first class release.' Kirshbaum observes all of Bach's repeats with tasteful, expressive embellishments. His slightly gruff yet compelling sonority is beautifully engineered."},
  {id:35,label:"Naxos",composers:["J.S. Bach"],artist:"Kolja Blacher · Christine Pichlmeier · Lisa Stewart · Cologne Chamber Orchestra / Helmut Müller-Brühl",title:"Bach: Violin Concertos",description:"BWV 1041, 1042, 1043, 1052 · Naxos 8.554603",format:"Single CD",catNo:"8.554603",usedGBP:5.00,newGBP:6.0,notes:"Naxos budget label. Solid, well-recorded performances at a fraction of mainstream prices. Müller-Brühl and the Cologne Chamber Orchestra were one of the label's most prolific early partnerships."},
  {id:36,label:"EMI Classics",composers:["J.S. Bach"],artist:"Itzhak Perlman & Pinchas Zukerman (violins) · English Chamber Orchestra / Daniel Barenboim",title:"Bach: Violin Concertos in A minor, E & G minor; Double Concerto in D minor",description:"rec. Abbey Road, London, 1971 & 1974",format:"Single CD",catNo:"CDC 7 47856 2",usedGBP:4.00,newGBP:null,notes:"EMI Classics. Cheap as chips (Discogs median under £2) yet star-studded — Perlman and Zukerman at their peak, Barenboim conducting the ECO. Recordings from 1971–74 now in the public domain."},
  {id:37,label:"Hyperion",composers:["Carl Philipp Emanuel Bach"],artist:"Rachel Brown (flute) · The Brandenburg Consort / Roy Goodman",title:"CPE Bach: Flute Concertos",description:"CDA67226 · Concertos in A, D minor & G · rec. August 2000",format:"Single CD",catNo:"CDA67226",usedGBP:11.00,newGBP:14.0,notes:"Hyperion CDA67226. BBC Music Magazine: 'performances it would be hard to better.' Gramophone: 'a recording to treasure.' Brown uses a Quantz-style baroque flute at A=392Hz with Bach's own cadenzas."},
  {id:38,label:"EMI Classics",composers:["J.S. Bach"],artist:"Mstislav Rostropovich (cello)",title:"Bach: Cello Suites Nos. 1–6 BWV 1007–1012",description:"2-disc set · rec. Basilique Ste-Madeleine, Vézelay, 1991 · Copy 2",format:"2-disc set",catNo:"7 54068 2",usedGBP:9.0,newGBP:null,duplicate:true,duplicateGroup:"rostropovich-emi",notes:"EMI Classics. Second copy. Rostropovich prefaces each suite with spoken commentary. Recorded at Vézelay — its natural resonance perfectly suits the music. ⚠ Two copies in collection."},
  {id:39,label:"Deutsche Grammophon",composers:["J.S. Bach"],artist:"Mischa Maisky (cello) · Martha Argerich (piano)",title:"Bach: Cello Sonatas BWV 1027–1029",description:"rec. Munich, Residenz, 1985 · Copy 2",format:"Single CD",catNo:"415 471-2",usedGBP:8.00,newGBP:null,duplicate:true,duplicateGroup:"maisky-argerich",notes:"Deutsche Grammophon. Second copy. One of the great chamber partnerships on record. Maisky's warm tone and Argerich's mercurial pianism make this enduringly compelling. ⚠ Two copies in collection."},
  {id:40,label:"Naxos",composers:["J.S. Bach"],artist:"Bournemouth Symphony Orchestra / José Serebrier",title:"Stokowski: Bach Transcriptions, Vol. 2",description:"Toccata & Fugue in D minor · Jesu Joy of Man's Desiring · Sleepers Awake! · Naxos 8.572050",format:"Single CD",catNo:"8.572050",usedGBP:5.00,newGBP:6.0,notes:"Naxos. Serebrier was one-time associate conductor to Stokowski himself. Time Out Chicago: 'piling the pathos onto Bach has made for one of the sexiest records of the year.' Stokowski arranged nearly 40 Bach works for modern symphony orchestra — trading the organ for a loaded Maserati."},
  {id:41,label:"Conifer Classics / BMG",composers:["J.S. Bach","Johann Bach","Johann Christoph Bach","Johann Michael Bach","Johann Ludwig Bach","Johann Christoph Friedrich Bach"],artist:"Choir of Trinity College, Cambridge / Richard Marlow",title:"Bach Family Motets",description:"75605513062 · rec. 1995–97",format:"Single CD",catNo:"75605513062",usedGBP:5.00,newGBP:null,notes:"Conifer Classics / BMG. Gramophone: 'Several generations of Bachs gathered by Richard Marlow.' Covers motets by five members of the Bach family alongside J.S. Bach — a fascinating survey of the musical dynasty. Trinity College Choir's discography is considered one of the finest in British choral music."},
  {id:42,label:"Philips (Duo, 2-disc)",composers:["J.S. Bach"],artist:"Marshall · Töpper · Pears · Borg · Chor & Symphonie-Orchester des Bayerischen Rundfunks / Eugen Jochum Giebel · Litz · Prey · Pro Arte Chorus & Orchestra / Kurt Redel",title:"Bach: Mass in B minor BWV 232 + Mass in F",description:"438 739-2 · Philips Duo budget reissue · rec. 1958 & 1965",format:"2-disc set",catNo:"438 739-2",usedGBP:8.00,newGBP:null,notes:"Philips Duo. Jochum's 1958 Mass in B minor with the Bavarian Radio Symphony Orchestra is one of the classic recordings of this towering work — richly romantic yet never inflated. The Philips Duo series brought great archive recordings to the mass market at budget prices."},
  {id:43,label:"Virgin Veritas (2-disc)",composers:["J.S. Bach"],artist:"Taverner Consort & Players / Andrew Parrott",title:"Bach: Magnificat BWV 243 + Easter Oratorio BWV 249",description:"7243 5 61647 2 7 · Disc 1 rec. Abbey Road, Apr 1989 · Disc 2 rec. St Jude's, Hampstead, Apr 1993",format:"2-disc set",catNo:"7243 5 61647 2 7",usedGBP:9.00,newGBP:null,notes:"Virgin Veritas. Andrew Parrott and the Taverner Consort were among the foremost pioneers of historically informed Bach performance. The Magnificat (Abbey Road, 1989) and Easter Oratorio (Hampstead, 1993) are paired on separate discs, each recorded in sympathetic acoustic settings. Parrott's Magnificat in particular is noted for its brisk tempi and transparent textures."},
  {id:44,label:"Decca / L'Oiseau-Lyre (2-disc)",composers:["J.S. Bach"],artist:"Academy of Ancient Music / Christopher Hogwood",title:"Bach: Brandenburg Concertos Nos. 1–6 BWV 1046–1051",description:"414 187-2 · rec. Walthamstow Town Hall, Mar–May 1984",format:"2-disc set",catNo:"414 187-2",usedGBP:10.00,newGBP:16.00,notes:"Decca / L'Oiseau-Lyre. A landmark period-instrument recording of the Brandenburgs. OLDIES.com $16.20 new. Personnel outstanding, showing the strength of the London early-music scene. Hogwood's AAM was one of the first ensembles to record Bach on instruments of the period to widespread acclaim."},
  {id:45,label:"Český Rozhlas (2-disc)",composers:["J.S. Bach"],artist:"Musica Florea / Marek Štryncl",title:"Bach: Brandenburg Concertos Complete BWV 1046–1051",description:"2-disc set",format:"2-disc set",catNo:"SU 3942-2",usedGBP:8.00,newGBP:null,notes:"Český Rozhlas (Czech Radio). Musica Florea is one of the leading Czech period-instrument ensembles, founded by Marek Štryncl in 1992. Their Brandenburg Concertos are praised for energy and historical awareness, and represent an interesting Central European perspective on this cornerstone repertoire."},
  {id:46,label:"Harmonia Mundi",composers:["J.S. Bach"],artist:"Nicholas McGegan (harpsichord & clavichord) · Lorraine Hunt (soprano) · David Bowles (baroque cello)",title:"Bach: Clavierbüchlein für Anna Magdalena Bach",description:"A selection · HMU 907042",format:"Single CD",catNo:"HMU 907042",usedGBP:8.00,newGBP:null,notes:"Harmonia Mundi. A charming and intimate selection from the Anna Magdalena Notebook — the little music book Bach compiled for his second wife containing arias, preludes and dances. Lorraine Hunt (later Lieberson) was one of the great American mezzo-sopranos of her generation; her recordings are now collector's items."},
  {id:47,label:"ABC Classics",composers:["J.S. Bach"],artist:"Richard Tognetti (violin) · Helena Rathbone (violin) · Diana Doherty (oboe) · Australian Chamber Orchestra",title:"Bach: Violin Concertos",description:"ABC Classics 4765691 · 2006",format:"Single CD",catNo:"ABC4765691",usedGBP:8.00,newGBP:null,notes:"ABC Classics. ARIA Award for Best Classical Recording 2007. Discogs median $10.39. The Daily Telegraph (UK): 'Tognetti is one of the most characterful, incisive and impassioned violinists to be heard today.' The ACO under Tognetti is one of the world's finest chamber orchestras."},
  {id:48,label:"EMI Classics (2-disc)",composers:["J.S. Bach"],artist:"Choir of King's College, Cambridge · Academy of Ancient Music / Stephen Cleobury",title:"Bach: Magnificat BWV 243 + Cantatas",description:"2-disc set · rec. King's College Chapel, Cambridge, 1999–2000",format:"2-disc set",catNo:"5 56994 2 8",usedGBP:8.00,newGBP:null,notes:"EMI Classics. Recorded in the legendary acoustic of King's College Chapel, Cambridge. Cleobury led the King's choir from 1982 until his death in 2019, making this one of his landmark recordings. The Academy of Ancient Music provide period-instrument support throughout."},
  {id:49,label:"Virgin Classics",composers:["J.S. Bach","George Frideric Handel"],artist:"Natalie Dessay · Karine Deshayes · Philippe Jaroussky · Toby Spence · Laurent Naouri · Le Concert d'Astrée / Emmanuelle Haïm",title:"Bach: Magnificat BWV 243 + Handel: Dixit Dominus HWV 232",description:"Virgin Classics 094639524129 · rec. Paris, Oct 2006",format:"Single CD",catNo:"094639524129",usedGBP:4.00,newGBP:null,notes:"Virgin Classics. Discogs copies from $1.69 — one of the cheaper CDs in the collection. Reviews divided: Dessay and Jaroussky praised warmly, but some critics found ensemble coordination uneven. Amazon.com: 'in heaven for a while — top soloists in an excellent combination.' Haïm unites Germanic and French Baroque schools in a distinctly personal way."},
  {id:50,label:"Teldec (Das Alte Werk, 3-disc enhanced box)",composers:["J.S. Bach"],artist:"Christoph Pregardien · Matthias Goerne · Christine Schafer · Dorothea Roschmann · Bernarda Fink · Arnold Schoenberg Chor · Wiener Sangerknaben · Concentus Musicus Wien / Nikolaus Harnoncourt",title:"Bach: Matthaus-Passion BWV 244",description:"Enhanced CD with full autograph score software · rec. Jesuitenkirche, Vienna, May 2000",format:"3-disc set",catNo:"8573-81036-2",usedGBP:22.00,newGBP:null,notes:"Teldec Das Alte Werk. Harnoncourt's third and final St Matthew Passion recording. Comes with CD-ROM software giving access to the complete autograph score. Gramophone: 'After 30 years Harnoncourt still has much to say.' His pioneering 1970 period performance seized the musical world by the scruff of the neck; this 2000 version reflects a lifetime of accumulated insight."},
  {id:51,label:"Harmonia Mundi (2-disc)",composers:["Carl Philipp Emanuel Bach"],artist:"Andreas Staier (harpsichord) · Freiburger Barockorchester / Petra Mullejans",title:"CPE Bach: Sei Concerti per il Cembalo Concertato WQ 43",description:"HMC 902083.84 · 2-disc set · rec. 2011",format:"2-disc set",catNo:"HMC 902083.84",usedGBP:16.00,newGBP:null,notes:"Harmonia Mundi. Six concertos for harpsichord and orchestra, among CPE Bach's most ambitious works in the genre. Staier and the Freiburger Barockorchester are ideal partners — this ensemble was founded in 1987 and is now one of Europe's most respected period-instrument groups."},
  {id:52,label:"Deutsche Grammophon (Archiv, 3-disc box)",composers:["J.S. Bach"],artist:"Peter Schreier (Evangelist) · Edith Mathis (soprano) · Janet Baker (alto) · Dietrich Fischer-Dieskau (baritone) · Munchener Bach-Chor · Regensburger Domspatzen · Munchener Bach-Orchester / Karl Richter",title:"Bach: Matthaus-Passion BWV 244",description:"3-disc box · rec. 1979 · Archiv 427 704-2",format:"3-disc set",catNo:"427 704-2",usedGBP:14.00,newGBP:null,notes:"Archiv / Deutsche Grammophon. Karl Richter's magnificent 1979 studio recording — his second and final account of the work. Fischer-Dieskau as the bass soloist and Schreier as the Evangelist are unsurpassed in their roles. A performance of deep gravity and spiritual weight; by today's standards broad in tempo, yet profoundly moving throughout."},
  {id:53,label:"Brilliant Classics (2-disc)",composers:["J.S. Bach"],artist:"Rogers Covey-Crump (Evangelist) · David James (countertenor) · Paul Agnew & Gordon Jones · Connor Burrowes (treble) · The Ring Ensemble of Finland · European Union Baroque Orchestra / Roy Goodman",title:"Bach: Markus-Passion BWV 247 (new reconstruction)",description:"Brilliant Classics 99049 · rec. New College Chapel, Oxford, March 1996 · Reconstruction by Dr Simon Heighes",format:"2-disc set",catNo:"99049",usedGBP:7.00,newGBP:null,notes:"Brilliant Classics budget reissue (cat. 99049) of the original Musica Obscura recording. Bach's original St Mark Passion score is lost — only Picander's libretto survives. Reconstruction by Simon Heighes draws on the Trauer Ode (BWV 198) and Funeral Music BWV 244a. Amazon review: 'Goodman and his forces give Heighes's edition a fine performance.' One of very few recordings of this speculative reconstruction."},
  {id:54,label:"Deutsche Grammophon (Archiv, 2-disc box)",composers:["J.S. Bach"],artist:"Anthony Rolfe Johnson · Nancy Argenta · Anne Sofie von Otter · Hans Peter Blochwitz · Olaf Bar · Monteverdi Choir · English Baroque Soloists / John Eliot Gardiner",title:"Bach: Christmas Oratorio BWV 248",description:"423 232-2 · rec. Abbey Road Studios, London, January 1987",format:"2-disc set",catNo:"423 232-2",usedGBP:15.00,newGBP:null,notes:"Archiv / Deutsche Grammophon. Recorded at Abbey Road, January 1987. Gardiner's Christmas Oratorio is the benchmark period-instrument recording of this work — razor-sharp ensemble, superb soloists, and an operatic storytelling energy that brings the six cantatas brilliantly to life. Includes a 78-page booklet with full libretto."},
  {id:55,label:"Harmonia Mundi (3-disc box)",composers:["J.S. Bach"],artist:"Howard Crook (Evangelist) · Barbara Schlick (soprano) · Rene Jacobs (countertenor) · Peter Kooy (bass) · Hans-Peter Blochwitz (tenor) · La Chapelle Royale, Paris · Collegium Vocale, Gent / Philippe Herreweghe",title:"Bach: Matthaus-Passion BWV 244",description:"HMC 901155.57 · 3-disc set · rec. 1985",format:"3-disc set",catNo:"HMC 901155.57",usedGBP:18.00,newGBP:null,notes:"Harmonia Mundi. Herreweghe's original 1985 recording — the most purely beautiful and devotional account of the St Matthew Passion on disc. ClassicsToday 10/10: 'the most purely beautiful performance of this great work.' CDandLP copies at EUR 23.99. Herreweghe's approach — hushed, quickish tempos, spiritually transparent — was a revelation when it appeared and has never been surpassed in its particular qualities."},
  {id:56,label:"Hyperion (2-disc)",composers:["J.S. Bach"],artist:"Choir of the King's Consort · Tolzer Knabenchor · The King's Consort / Robert King",title:"Bach: Mass in B minor BWV 232",description:"CDA67201/2 · rec. St Jude-on-the-Hill, London, Oct 1996",format:"2-disc set",catNo:"CDA67201/2",usedGBP:12.00,newGBP:null,notes:"Hyperion. The first recording of the Mass in B minor to use an all-male choir and soloists as envisaged by the composer — a historically pioneering approach. Gramophone: 'King has succeeded brilliantly in reclaiming the profundity and emotional commitment of traditional Bach performance.' The King's Consort have sold over one million recordings on Hyperion."},
  {id:57,label:"Coro (2-disc)",composers:["J.S. Bach"],artist:"Catherine Dubosc (soprano) · James Bowman (alto) · John Mark Ainsley (tenor) · Michael George (bass) · The Sixteen · Symphony of Harmony and Invention / Harry Christophers",title:"Bach: Mass in B minor BWV 232",description:"COR16044 · rec. St Augustine's, Kilburn, London, Apr 1994",format:"2-disc set",catNo:"COR16044",usedGBP:10.00,newGBP:null,notes:"Coro. Harry Christophers and The Sixteen bring their trademark blend of clarity and spiritual depth to this towering work. Christophers founded The Sixteen in 1977 and established the Coro label in 2001. BBC Music: 'demonstrates the breadth of compositional skills amassed during Bach's lifetime.'"},
  {id:58,label:"Decca (Double, 2-disc)",composers:["J.S. Bach"],artist:"Ameling · Minton · Watts · Krenn · Krause · Wiener Singakademie · Stuttgarter Kammerorchester / Karl Munchinger",title:"Bach: Mass in B minor BWV 232",description:"440 609-2 · Decca Double budget reissue · rec. Vienna, 1969",format:"2-disc set",catNo:"440 609-2",usedGBP:5.00,newGBP:null,notes:"Decca Double budget reissue. Munchinger's 1969 Vienna recording is a product of the pre-period-performance era — warm, broad and traditional. Elly Ameling leads a strong solo team. The Decca Double series brought important archive recordings to the mass market at budget prices."},
  {id:59,label:"Erato / Warner",composers:["J.S. Bach"],artist:"Marie-Claire Alain (organ)",title:"Bach: Complete Organ Works",description:"4509-96721-2 · Erato box set",format:"Box set",catNo:"4509-96721-2",usedGBP:15.00,newGBP:null,notes:"Erato / Warner. Marie-Claire Alain (1926-2013) was one of the great Bach organists of the 20th century, recording the complete organ works three times. This Erato set represents her definitive survey. She was awarded the Grand Prix du Disque and was sister of the composer Jehan Alain, killed in the Second World War."},
  {id:60,label:"Deutsche Grammophon (Archiv, 2-disc)",composers:["J.S. Bach"],artist:"Helmut Walcha (organ)",title:"Bach: Great Organ Works",description:"453 064-2 · rec. Cappel, Germany, 1960s",format:"2-disc set",catNo:"453 064-2",usedGBP:4.00,newGBP:null,notes:"DG Archiv. Helmut Walcha (1907-91) was blind from age 19, yet became one of the supreme Bach organists of the century. He learned each Bach work by having it read to him note by note. His recordings at the historic organ of the church in Cappel are legendary — described as the benchmark for Northern German Baroque organ style."},
  {id:61,label:"Deutsche Grammophon (3D Classics)",composers:["J.S. Bach"],artist:"Ton Koopman (organ)",title:"Bach: Toccata & Fuge — Organ Works",description:"427 801-2 · DG 3D Classics budget series",format:"Single CD",catNo:"427 801-2",usedGBP:5.00,newGBP:null,notes:"DG 3D Classics budget series. Ton Koopman's organ playing brings the same rhythmic energy and stylistic intelligence to Bach's organ works as his harpsichord and conducting. A well-priced introduction to Bach's organ music by a consummate musician."},
  {id:62,label:"Deutsche Grammophon",composers:["J.S. Bach"],artist:"Simon Preston (organ)",title:"Bach: Toccata & Fugue BWV 565 · Preludes & Fugues BWV 532 & 552 · Fantasia BWV 572 · Pastorale BWV 590",description:"427 668-2 · rec. Westminster Abbey, London",format:"Single CD",catNo:"427 668-2",usedGBP:5.00,newGBP:null,notes:"Deutsche Grammophon. Simon Preston's Bach organ recordings at Westminster Abbey are among the most celebrated of his generation. His Toccata & Fugue in D minor is a benchmark performance — grand, propulsive and supremely well-articulated. Preston served as organist of Westminster Abbey from 1981 to 1987."},
  {id:63,label:"Avie (2-disc deluxe digipack)",composers:["J.S. Bach"],artist:"European Brandenburg Ensemble / Trevor Pinnock (harpsichord/director)",title:"Bach: Six Concertos for the Margrave of Brandenburg BWV 1046-1051",description:"AV2119 · rec. Sheffield City Hall & Henry Wood Hall, 2006-07",format:"2-disc set",catNo:"AV2119",usedGBP:14.00,newGBP:20.0,notes:"Avie Records. Pinnock's second Brandenburg recording — a 60th-birthday present to himself, 25 years after his famous English Concert/Archiv version. BBC Music Magazine 5 stars: 'Pinnock's seemingly unassailable ability to choose an effective, just tempo for each movement.' Gramophone: 'relaxed expertise... communicate directly without technical hindrance.'"},
  {id:64,label:"Teldec / Antoine Marchand (3-disc)",composers:["J.S. Bach"],artist:"Various soloists · Amsterdam Baroque Orchestra & Choir / Ton Koopman",title:"Bach: Complete Cantatas, Volume 12",description:"8573-85845-2 · 3-disc set · chorale cantatas from Leipzig, 1724-25",format:"3-disc set",catNo:"8573-85845-2",usedGBP:10.00,newGBP:null,notes:"Teldec / Antoine Marchand. Koopman's complete cantata cycle (67 CDs, 1995-2005) was the first complete recording including all secular cantatas. This Vol. 12 covers chorale cantatas from Bach's second year in Leipzig. The project won the Deutsche Schallplattenpreis Echo Klassik, BBC Award and Hector Berlioz Prize."},
  {id:65,label:"Teldec (In Excelsis)",composers:["J.S. Bach"],artist:"Various soloists · Concentus Musicus Wien / Nikolaus Harnoncourt",title:"Bach: Cantatas BWV 140 & 147",description:"0630-17883-2 · Teldec 'In Excelsis' series",format:"Single CD",catNo:"0630-17883-2",usedGBP:5.00,newGBP:null,notes:"Teldec In Excelsis series. Two of Bach's most beloved cantatas: BWV 140 'Wachet auf' and BWV 147 'Herz und Mund und Tat und Leben' — the latter containing the famous 'Jesu, Joy of Man's Desiring.' Harnoncourt's complete Teldec cantata cycle with Leonhardt was the pioneering period-performance recording of these works."},
  {id:66,label:"Deutsche Grammophon (Archiv)",composers:["J.S. Bach"],artist:"Monteverdi Choir · English Baroque Soloists / John Eliot Gardiner",title:"Bach: Cantatas BWV 72, 73, 111, 156",description:"Bach Cantata Pilgrimage · 463 582-2 · rec. January 2000",format:"Single CD",catNo:"463 582-2",usedGBP:12.00,newGBP:null,notes:"Archiv / DG. Part of Gardiner's extraordinary Bach Cantata Pilgrimage — 56 CDs covering all of Bach's cantatas performed in the churches and cathedrals of Europe and the USA in the year 2000. These January cantatas were among the first to be released. The complete pilgrimage is now available on Gardiner's own SDG label."},
  {id:67,label:"Deutsche Grammophon (Archiv)",composers:["J.S. Bach"],artist:"Monteverdi Choir · English Baroque Soloists / John Eliot Gardiner",title:"Bach: Cantatas BWV 153, 154, 55, 58, 82",description:"Bach Cantata Pilgrimage · 463 587-2 · rec. Epiphany 2000",format:"Single CD",catNo:"463 587-2",usedGBP:12.00,newGBP:null,notes:"Archiv / DG. A second volume from Gardiner's Bach Cantata Pilgrimage 2000. Includes the beloved BWV 82 'Ich habe genug' — one of Bach's greatest bass arias. The Penguin Guide described Gardiner's pilgrimage as producing 'some of the most distinguished Bach singing on disc' and singled out his choice of soloists as unerring."},
  {id:68,label:"Soli Deo Gloria (SDG, 2-disc)",composers:["J.S. Bach"],artist:"Monteverdi Choir · English Baroque Soloists / John Eliot Gardiner",title:"Bach: Cantata Pilgrimage — SDG114",description:"SDG114 · 2-disc set · Gardiner's own label",format:"2-disc set",catNo:"SDG114",usedGBP:24.00,newGBP:null,notes:"Soli Deo Gloria — Gardiner's own label, founded to release the complete Bach Cantata Pilgrimage. The SDG volumes are increasingly sought-after and out of print, commanding higher prices than the original Archiv releases. Each 2-disc volume covers a specific church occasion from the Pilgrimage year 2000."},
  {id:69,label:"Soli Deo Gloria (SDG, 2-disc)",composers:["J.S. Bach"],artist:"Monteverdi Choir · English Baroque Soloists / John Eliot Gardiner",title:"Bach: Cantata Pilgrimage, Vol. 1 — City of London",description:"SDG101 · 2-disc set · Cantatas for the Feast of St John the Baptist",format:"2-disc set",catNo:"SDG101",usedGBP:28.00,newGBP:null,notes:"Soli Deo Gloria SDG101. Vol. 1 of the complete pilgrimage, recorded at St Giles Cripplegate, City of London. eBay Geneva dealer describes it as 'out of print and extremely rare.' The complete 56-CD SDG edition (released 2013 as a box) is now one of the most treasured sets in recorded music."},
  {id:70,label:"Soli Deo Gloria (SDG, 2-disc)",composers:["J.S. Bach"],artist:"Monteverdi Choir · English Baroque Soloists / John Eliot Gardiner",title:"Bach: Cantata Pilgrimage — SDG141",description:"SDG141 · 2-disc set · Gardiner's own label",format:"2-disc set",catNo:"SDG141",usedGBP:24.00,newGBP:null,notes:"Soli Deo Gloria — part of the complete Bach Cantata Pilgrimage series on Gardiner's own label. Individual SDG volumes are now out of print and difficult to find. The pilgrimage encompassed 198 cantatas performed in 60 concerts across Europe and America in the year 2000."},
  {id:71,label:"Soli Deo Gloria (SDG, 2-disc)",composers:["J.S. Bach"],artist:"Monteverdi Choir · English Baroque Soloists / John Eliot Gardiner",title:"Bach: Cantata Pilgrimage — SDG153",description:"SDG153 · 2-disc set · Gardiner's own label",format:"2-disc set",catNo:"SDG153",usedGBP:24.00,newGBP:null,notes:"Soli Deo Gloria — another volume from the pilgrimage series. Penguin Guide: 'Some of the most distinguished Bach singing on disc... Gardiner's choice of soloists is unerring.' The Monteverdi Choir and English Baroque Soloists were at the height of their powers throughout the pilgrimage year."},
  {id:72,label:"Ufficio Filatelico e Numismatico della Citta del Vaticano (UFN)",composers:["Domenico Bartolucci","Giovanni Pierluigi da Palestrina"],artist:"Statna Filharmonia Kosice / Walter Attanasi (orch.) · Coro della Fondazione Domenico Bartolucci / Domenico Bartolucci (choral)",title:"Centenario della Nascita del Card. Domenico Bartolucci",description:"Die Emissionis N.7 · F007-CD · Vatican philatelic issue with postage stamp · Bartolucci: Sinfonia Rustica in Fa 'Mugellana' · Palestrina: Exaltabo te, Sicut cervus, Stabat Mater · Bartolucci: choral works",format:"Single CD",catNo:"F007-CD",usedGBP:8.0,newGBP:null,notes:"Vatican UFN philatelic issue — released as the 7th Day of Issue stamp pack alongside a Vatican 0.95 euro postage stamp. Not commercially sold. Contains Bartolucci's Sinfonia Rustica 'Mugellana' (Statna Filharmonia Kosice, 1993), three Palestrina motets including the Stabat Mater a 8, and five of Bartolucci's own choral works conducted by the composer himself (2004-09). Bartolucci (1917-2013) was Director of the Sistine Chapel Choir for 30 years. Pope Benedict XVI made him a Cardinal in 2010."},
  {id:73,label:"EMI Studio",composers:["Ludwig van Beethoven"],artist:"Jacqueline du Pre (cello) · Stephen Bishop-Kovacevich (piano)",title:"Beethoven: Cello Sonatas Nos. 3 & 5",description:"CDM 7 69179 2 · rec. Abbey Road Studios, December 1965",format:"Single CD",catNo:"CDM 7 69179 2",usedGBP:16.00,newGBP:null,notes:"EMI Studio. Recorded at Abbey Road in 1965 when du Pre was just 20. First pressing West German copies sell for $29+. One of the most cherished recordings in the cello repertoire — du Pre's singing tone and natural expressiveness, and Bishop-Kovacevich's authoritative pianism, make this an enduring classic."},
  {id:74,label:"Decca Digital",composers:["Ludwig van Beethoven"],artist:"Vladimir Ashkenazy (piano) · Wiener Philharmoniker / Zubin Mehta",title:"Beethoven: Piano Concerto No. 3 in C minor Op. 37",description:"411 902-2 · rec. Sofiensaal, Vienna, 1982",format:"Single CD",catNo:"411 902-2",usedGBP:7.00,newGBP:null,notes:"Decca Digital. Part of Ashkenazy's complete Beethoven piano concerto cycle with the Vienna Philharmonic and Mehta, recorded in the 1980s. Gramophone praised the cycle for its 'lyrical warmth and nobility.' Ashkenazy also served as the VPO's principal conductor during this period."},
  {id:75,label:"Decca Digital",composers:["Ludwig van Beethoven"],artist:"Vladimir Ashkenazy (piano) · Wiener Philharmoniker / Zubin Mehta",title:"Beethoven: Piano Concerto No. 1 in C major Op. 15",description:"411 900-2 · rec. Sofiensaal, Vienna, 1982",format:"Single CD",catNo:"411 900-2",usedGBP:7.00,newGBP:null,notes:"Decca Digital. Companion to 411 902-2 in Ashkenazy's Beethoven concerto cycle. The First Concerto was composed in 1795 but numbered first because Beethoven considered it more mature than the Second. Ashkenazy's account combines technical brilliance with the warmth that characterises his best work."},
  {id:76,label:"Centaur Records",composers:["Ludwig van Beethoven"],artist:"Various performers",title:"The Youthful Beethoven",description:"CRC 2725 · early and rarely performed works",format:"Single CD",catNo:"CRC 2725",usedGBP:8.00,newGBP:null,notes:"Centaur Records (USA). An exploration of Beethoven's early and rarely heard works — the compositions that prefigure his mature genius. Centaur is a respected American independent classical label specialising in bringing lesser-known repertoire and artists to disc."},
  {id:77,label:"CBS/Sony Japan (2-disc)",composers:["Ludwig van Beethoven"],artist:"Lindsay String Quartet",title:"Beethoven: String Quartets Op. 59 (Razumovsky)",description:"CRCB-68 · Japanese pressing · 2-disc set",format:"2-disc set",catNo:"CRCB-68",usedGBP:18.00,newGBP:null,notes:"Japanese CBS/Sony pressing. The Lindsay String Quartet (formed 1967) made some of the most celebrated Beethoven quartet recordings of their era. Their Razumovsky set is prized for its combination of intellectual rigour and emotional directness. Japanese pressings are often sought after for superior audio quality."},
  {id:78,label:"Philips (Duo, 2-disc)",composers:["Ludwig van Beethoven"],artist:"Quartetto Italiano",title:"Beethoven: The Late String Quartets, Vol. 1",description:"454 711-2 · Philips Duo budget reissue · Op. 127, 130, 133 & 135 · rec. Switzerland, 1967-69",format:"2-disc set",catNo:"454 711-2",usedGBP:10.00,newGBP:null,notes:"Philips Duo. Quartetto Italiano's late Beethoven recordings from 1967-69 are among the most revered in the string quartet discography. The four players — Paolo Borciani, Elisa Pegreffi, Piero Farulli and Franco Rossi — had played together since 1945, and their collective understanding of this music is peerless."},
  {id:79,label:"Philips (Duo, 2-disc)",composers:["Ludwig van Beethoven"],artist:"Quartetto Italiano",title:"Beethoven: The Late String Quartets, Vol. 2",description:"454 712-2 · Philips Duo budget reissue · Op. 131 & 132 · rec. Switzerland, 1967-69",format:"2-disc set",catNo:"454 712-2",usedGBP:10.00,newGBP:null,notes:"Philips Duo. Companion to Vol. 1. Op. 131 and 132 are widely considered among the greatest music ever composed — Beethoven at his most inward and transcendent. The Quartetto Italiano's accounts remain reference versions after more than half a century: immaculate intonation and an almost unearthly blend of voices."},
  {id:80,label:"EMI",composers:["Ludwig van Beethoven"],artist:"Sinfonieorchester des Norddeutschen Rundfunks / Gunter Wand",title:"Beethoven: Symphony No. 6 in F major Op. 68 'Pastoral'",description:"CDC 7 47526 2 · rec. Hamburg, NDR, mid-1980s",format:"Single CD",catNo:"CDC 7 47526 2",usedGBP:7.00,newGBP:null,notes:"EMI. From Wand's complete Beethoven cycle with the NDR Symphony Orchestra. ClassicsToday: 'One of the most consistent of all modern Beethoven editions... The Pastoral captures the music's earthiness and rusticity with memorable fidelity.' Wand was known for letting the music breathe naturally without imposed effects — his Pastoral is earthy and unaffected, exactly as Beethoven intended."},
  {id:81,label:"EMI (Gemini, 2-disc)",composers:["Ludwig van Beethoven"],artist:"Royal Philharmonic Orchestra / Sir Thomas Beecham",title:"Beethoven: Symphonies Nos. 2 & 7 · Mass in C Op. 86",description:"5 86504 2 6 · EMI Gemini budget 2-disc · rec. Abbey Road, London, 1959",format:"2-disc set",catNo:"5 86504 2 6",usedGBP:10.00,newGBP:null,notes:"EMI Gemini. Abbey Road recordings from April-July 1959. Classical.net: 'Invigoratingly captivating and terrifically fresh... Beecham's Symphony No. 7 betrays the sheer joy he experienced conducting this absolute masterpiece. The reading is brisk and luminous with a wide dynamic range giving it majestic nobility.' A fitting monument to one of British music's great eccentrics."},
  {id:82,label:"Deutsche Grammophon",composers:["Ludwig van Beethoven"],artist:"Anna Tomowa-Sintow · Agnes Baltsa · Peter Schreier · Jose van Dam · Berliner Philharmoniker / Herbert von Karajan",title:"Beethoven: Symphony No. 9 in D minor Op. 125 'Choral'",description:"410 987-2 · rec. Berliner Philharmonie, September 1983 · DG digital",format:"Single CD",catNo:"410 987-2",usedGBP:6.00,newGBP:null,notes:"Deutsche Grammophon. Karajan's final recording of the Ninth, from his last complete Beethoven symphony cycle at 75 years old. One of the first major DG digital releases. Still among the grandest and most imposing accounts on disc — Karajan's tempos are broad but his control of the Berliner Philharmoniker is absolute."},
  {id:83,label:"EMI Digital (Reflexe)",composers:["Ludwig van Beethoven"],artist:"Yvonne Kenny · Sarah Walker · Patrick Power · Petteri Salomaa · Schutz Choir of London · London Classical Players / Roger Norrington",title:"Beethoven: Symphony No. 9 in D minor Op. 125 'Choral'",description:"CD 749221 2 · rec. Abbey Road Studio No. 1, London, February 1987",format:"Single CD",catNo:"CD 749221 2",usedGBP:7.00,newGBP:null,notes:"EMI Reflexe. Norrington's landmark period-instrument Ninth — recorded at Abbey Road 1987 in association with Logica. At the time profoundly controversial for its brisk tempos following Beethoven's own metronome markings. Now regarded as one of the most influential Beethoven symphony recordings of its era, opening the door to historically informed Beethoven performance."},
  {id:84,label:"Deutsche Grammophon",composers:["Ludwig van Beethoven"],artist:"Gidon Kremer (violin) · Martha Argerich (piano)",title:"Beethoven: Violin Sonatas Nos. 6, 7 & 8",description:"445 652-2 · Op. 30 Nos. 1, 2 & 3 · rec. 1994",format:"Single CD",catNo:"445 652-2",usedGBP:9.00,newGBP:null,notes:"Deutsche Grammophon. Kremer and Argerich make one of the most electrifying chamber partnerships in the catalogue — her mercurial, ferociously energetic pianism and his searching, mercurial tone create an atmosphere of barely controlled excitement. The Op. 30 sonatas here are among the most vividly characterised on disc."},
  {id:85,label:"Deutsche Grammophon",composers:["Ludwig van Beethoven"],artist:"Anne-Sophie Mutter (violin) · New York Philharmonic / Kurt Masur",title:"Beethoven: Violin Concerto Op. 61 · Romances Nos. 1 & 2",description:"471 349-2 · rec. Avery Fisher Hall, New York, 2001",format:"Single CD",catNo:"471 349-2",usedGBP:8.00,newGBP:null,notes:"Deutsche Grammophon. Mutter's second recording of the Beethoven Violin Concerto — her first was with Karajan in 1979. ClassicsToday: 'Mutter plays the Romances with all the stylish aplomb, proportioned phrasing, and taste these underrated gems require, and she's gorgeously supported by Masur.' Mutter's photograph appears 19 times in the booklet — DG marketing in full swing."},
  {id:86,label:"Deutsche Grammophon",composers:["J.S. Bach","Ludwig van Beethoven"],artist:"Helene Grimaud (piano) · Orchestra & Choir / Esa-Pekka Salonen",title:"Credo",description:"471 769-2 · themed album on faith",format:"Single CD",catNo:"471 769-2",usedGBP:9.00,newGBP:null,notes:"Deutsche Grammophon. A themed album exploring the concept of faith through music — pairing Bach and Beethoven. Grimaud's deeply personal approach to programme building and her partnership with Esa-Pekka Salonen make this one of the most distinctive DG releases of its era. Grimaud is as celebrated for her intellectual approach to music as for her technical command."},
  {id:87,label:"Camerata (Japan)",composers:["Ludwig van Beethoven","J.S. Bach"],artist:"Hiromi Okada (piano)",title:"Beethoven: Piano Sonata No. 29 Op. 106 'Hammerklavier' · Bach: Partita No. 2 BWV 826",description:"30CM-427 · Japanese Camerata label",format:"Single CD",catNo:"30CM-427",usedGBP:12.00,newGBP:null,notes:"Camerata Japan. Hiromi Okada (1956-) is one of Japan's most distinguished pianists — prizewinner at the Queen Elisabeth Competition. The pairing of the Hammerklavier with the Bach Partita No. 2 makes for a demanding but rewarding programme. Japanese Camerata pressings are prized for superior audio quality."},
  {id:88,label:"Deutsche Grammophon (Meisterpielen)",composers:["Ludwig van Beethoven"],artist:"Amadeus Quartet",title:"Beethoven: String Quartets Op. 130, Grosse Fuge Op. 133 & Op. 135",description:"447 920-2 · DG Meisterpielen budget series",format:"Single CD",catNo:"447 920-2",usedGBP:6.00,newGBP:null,notes:"DG Meisterpielen. The Amadeus Quartet (formed 1947, disbanded 1987 on the death of Peter Schidlof) made their Beethoven quartet recordings over two decades for DG. These late quartets — Op. 130 with the original Finale, the separate Grosse Fuge, and the valedictory Op. 135 — represent Beethoven's final thoughts in the medium."},
  {id:89,label:"Philips (Insignia)",composers:["Ludwig van Beethoven"],artist:"Alfred Brendel (piano)",title:"Beethoven: Piano Concerto No. 5 in E-flat major Op. 73 'Emperor'",description:"434 148-2 · Philips Insignia budget series",format:"Single CD",catNo:"434 148-2",usedGBP:6.00,newGBP:null,notes:"Philips Insignia budget reissue. Alfred Brendel's Beethoven Emperor is one of his most celebrated recordings — he recorded the concerto three times in total. Brendel's intellectual rigour and architectural sense are ideally suited to this monumental work. The Philips Insignia series brought important recordings to budget prices."},
  {id:90,label:"Sony Masterworks",composers:["Ludwig van Beethoven"],artist:"Murray Perahia (piano) · Royal Concertgebouw Orchestra / Bernard Haitink",title:"Beethoven: Piano Concertos Nos. 3 & 4",description:"MK 39814 · rec. Concertgebouw, Amsterdam, 1986",format:"Single CD",catNo:"MK 39814",usedGBP:7.00,newGBP:null,notes:"Sony Masterworks. ClassicsToday confirms: 'The first four concertos were superb... that disc (SK39814) received at least one international award.' Perahia's accounts are polished and neatly proportioned, with a particularly fine account of the introspective No. 4 — one of the great Beethoven piano recordings of the 1980s."},
  {id:91,label:"CBS Masterworks",composers:["W.A. Mozart","Ludwig van Beethoven"],artist:"Murray Perahia (piano) · Neil Black (oboe) · Thea King (clarinet) · Tony Halstead (horn) · Graham Sheen (bassoon) · Members of the English Chamber Orchestra",title:"Mozart: Piano Quintet K. 452 · Beethoven: Piano Quintet Op. 16",description:"MK 42099 · E-flat major · rec. 1986 · CBS Masterworks · produced by James Burnett",format:"Single CD",catNo:"MK 42099",usedGBP:7.00,newGBP:null,notes:"CBS Masterworks 1986. Two great quintets for piano and winds in the same key — Mozart's K. 452 (which he called 'the best work I have ever written') alongside Beethoven's Op. 16, directly modelled on it. Perahia is joined by four distinguished ECO principals: Neil Black, Thea King, Tony Halstead and Graham Sheen. Charming and beautifully balanced chamber music from a stellar lineup."},
  {id:92,label:"Harmonia Mundi",composers:["Ludwig van Beethoven"],artist:"Paul Lewis (piano)",title:"Beethoven: Diabelli Variations Op. 120",description:"HMC 902071 · rec. Teldex Studio, Berlin, December 2009",format:"Single CD",catNo:"HMC 902071",usedGBP:12.00,newGBP:15.0,notes:"Harmonia Mundi. The logical conclusion to Paul Lewis's acclaimed Beethoven cycle — complete sonatas, concertos, and now the greatest of all variation sets. Lewis is CBE, Royal Philharmonic Society Instrumentalist of the Year, and three-time Gramophone Award winner. ArkivMusic: 'Lewis's logical wrap-up to his critically acclaimed Beethoven concerto and sonata cycles.' First non-American to chair the Van Cliburn jury (2025)."},
  {id:93,label:"Hungaroton",composers:["Ludwig van Beethoven"],artist:"Andras Schiff (piano)",title:"Beethoven's Broadwood Piano in the Hungarian National Museum",description:"HCD 11885 · rec. 1977 · Beethoven's original Broadwood fortepiano",format:"Single CD",catNo:"HCD 11885",usedGBP:12.00,newGBP:null,notes:"Hungaroton. A unique historical document: Schiff plays Beethoven's own Broadwood grand piano, presented to the composer by the London firm of John Broadwood & Sons in 1817, and now housed in the Hungarian National Museum in Budapest. Beethoven was deaf when he received it. A poignant and irreplaceable recording — the sound of Beethoven's own instrument, played by one of his finest interpreters."},
  {id:94,label:"Deutsche Grammophon (Archiv)",composers:["Ludwig van Beethoven"],artist:"Orchestre Revolutionnaire et Romantique / John Eliot Gardiner",title:"Beethoven: Symphonies Nos. 7 & 8",description:"447 063-2 · Archiv Produktion · period instruments",format:"Single CD",catNo:"447 063-2",usedGBP:8.00,newGBP:null,notes:"Archiv Produktion. Part of Gardiner's complete Beethoven cycle on period instruments with the Orchestre Revolutionnaire et Romantique. Gardiner applies the same scholarly rigour he brought to Bach — following Beethoven's own metronome markings and using period instruments to recreate the soundworld Beethoven knew. The 7th in particular crackles with energy."},
  {id:95,label:"Deutsche Grammophon (Galleria)",composers:["Ludwig van Beethoven"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Beethoven: Symphonies Nos. 1 & 4 · Egmont Overture Op. 84",description:"419 048-2 · DG Galleria remaster · digitally remastered",format:"Single CD",catNo:"419 048-2",usedGBP:7.00,newGBP:null,notes:"DG Galleria. Part of Karajan's final Beethoven symphony cycle with the Berlin Philharmonic. The Fourth Symphony was always one of his most admired — Schumann famously called it 'a slender Greek maiden between two Norse giants.' The Egmont Overture receives Karajan's most imperious treatment."},
  {id:96,label:"Hyperion (5-disc box)",composers:["Ludwig van Beethoven"],artist:"Scottish Chamber Orchestra · Philharmonia Orchestra / Sir Charles Mackerras",title:"Beethoven: The Complete Symphonies",description:"CDS44301/5 · Live from the Edinburgh Festival, 2006 · 5-disc box",format:"Box set",catNo:"CDS44301/5",usedGBP:22.00,newGBP:35.0,notes:"Hyperion. Five-disc live set from the Edinburgh Festival 2006. Hyperion: 'If there has been a more thrilling and elemental Beethoven cycle in the last two decades, I certainly haven't heard it — this is a Beethoven red in tooth and claw.' ClassicsToday: 'A wonderful apt summation of one of the most inquisitive, intelligent, talented conductors of the 20th century.' Mackerras draws on historical knowledge without pedantry — urgent, earthy and completely alive."},
  {id:97,label:"EMI Classics",composers:["Ludwig van Beethoven"],artist:"Wiener Philharmoniker / Simon Rattle",title:"Beethoven: Symphonies Nos. 2 & 5",description:"5 57566 2 6 · rec. Vienna, 2002",format:"Single CD",catNo:"5 57566 2 6",usedGBP:8.00,newGBP:null,notes:"EMI Classics. Part of Simon Rattle's 2002-03 Beethoven cycle with the Vienna Philharmonic — his first cycle as Berlin Philharmonic chief conductor. Rattle's Beethoven is energetic and historically aware without being dogmatic. Reviewers praised the series for the Vienna Philharmonic's distinctive weight and warmth giving a different character from his later Berlin cycle."},
  {id:98,label:"Philips (Duo, 2-disc)",composers:["Ludwig van Beethoven"],artist:"Henryk Szeryng (violin) · Ingrid Haebler (piano) · Royal Concertgebouw Orchestra / Bernard Haitink",title:"Beethoven: Complete Violin Sonatas Vol. 1 · Violin Romances Nos. 1 & 2",description:"446 521-2 · Philips Duo · 2-disc set",format:"2-disc set",catNo:"446 521-2",usedGBP:10.00,newGBP:null,notes:"Philips Duo. Henryk Szeryng (1918-1988) was one of the towering violinists of the 20th century, with a noble tone and classical purity of style. Ingrid Haebler is one of the finest Mozart specialists on record. Together they bring great refinement to Beethoven's violin sonata cycle. The Romances are performed with the Concertgebouw and Haitink."},
  {id:99,label:"EMI (Gemini, 2-disc)",composers:["Ludwig van Beethoven"],artist:"Jacqueline du Pre (cello) · Daniel Barenboim (piano)",title:"Beethoven: Cello Sonatas Nos. 1-5 · Variations",description:"5 86242 2 9 · EMI Gemini · rec. Abbey Road, 1970",format:"2-disc set",catNo:"5 86242 2 9",usedGBP:12.00,newGBP:null,notes:"EMI Gemini. Recorded at Abbey Road in 1970 — one of du Pre's final major recording sessions before MS ended her performing career in 1973. These performances have an extraordinary intensity, as if she sensed the music was slipping away. Barenboim was her husband; their partnership was uniquely close. A deeply moving document of one of the great cellist-pianist partnerships."},
  {id:100,label:"Philips",composers:["Ludwig van Beethoven"],artist:"Beaux Arts Trio · Menahem Pressler (piano) · Gewandhausorchester Leipzig / Kurt Masur",title:"Beethoven: Triple Concerto Op. 56 · Choral Fantasy Op. 80",description:"438 005-2 · Philips Digital Classics",format:"Single CD",catNo:"438 005-2",usedGBP:10.00,newGBP:null,notes:"Philips. The Beaux Arts Trio bring their legendary ensemble playing to Beethoven's Triple Concerto — one of the great chamber-meets-orchestral works. Masur and the Gewandhaus provide a warm, authoritative backdrop. The Choral Fantasy, Beethoven's public rehearsal for the Ninth Symphony, makes an ideal coupling. Menahem Pressler (1923-2023) led the Beaux Arts Trio for 56 years."},
  {id:101,label:"Decca (Ovation)",composers:["Ludwig van Beethoven"],artist:"Itzhak Perlman (violin) · Vladimir Ashkenazy (piano)",title:"Beethoven: Violin Sonatas No. 9 'Kreutzer' Op. 47 & No. 10 Op. 96",description:"436 895-2 · Decca Ovation budget series",format:"Single CD",catNo:"436 895-2",usedGBP:8.00,newGBP:null,notes:"Decca Ovation. The Perlman/Ashkenazy Beethoven violin sonata cycle was one of the most celebrated partnerships of the 1970s-80s. The Kreutzer — Beethoven's most dramatic violin sonata, with its powerful opening movement — and the late, autumnal Op. 96 make a compelling pair. Perlman's singing tone and Ashkenazy's authoritative pianism complement each other perfectly."},
  {id:102,label:"Philips",composers:["Ludwig van Beethoven"],artist:"Thomas Zehetmair (violin) · Orchestra of the 18th Century / Frans Bruggen",title:"Beethoven: Violin Concerto Op. 61 · Romances Nos. 1 & 2",description:"462 123-2 · period instruments · rec. 1998",format:"Single CD",catNo:"462 123-2",usedGBP:10.00,newGBP:null,notes:"Philips. A period-instrument account of the Violin Concerto by the Austrian violinist Zehetmair with Bruggen's celebrated period ensemble. The Orchestra of the 18th Century (founded 1981) was a pioneer of period performance at the highest level. Zehetmair's lean, searching tone is well suited to the period-instrument textures — a thought-provoking alternative to the mainstream tradition."},
  {id:103,label:"Philips",composers:["Ludwig van Beethoven"],artist:"Claudio Arrau (piano) · Staatskapelle Dresden / Sir Colin Davis",title:"Beethoven: Piano Concerto No. 5 in E-flat major Op. 73 'Emperor'",description:"416 215-2 · rec. Dresden, 1985",format:"Single CD",catNo:"416 215-2",usedGBP:8.00,newGBP:null,notes:"Philips. Claudio Arrau (1903-1991) was one of the supreme Beethoven pianists of the 20th century, trained in the Liszt tradition. His 1985 Emperor with Colin Davis and the Staatskapelle Dresden is among his most admired — aristocratic in bearing, grand in scale, yet always singing. Arrau was 82 when this was recorded, bringing a lifetime of accumulated wisdom to the work."},
  {id:104,label:"ECM New Series (2-disc)",composers:["Ludwig van Beethoven"],artist:"Andras Schiff (piano) · Miklos Perenyi (cello)",title:"Beethoven: Complete Music for Piano and Violoncello",description:"ECM 1819/20 · 2-disc set · Sonatas Nos. 1-5 · Three sets of variations · rec. 2001-2002",format:"2-disc set",catNo:"ECM 1819/20",usedGBP:16.00,newGBP:null,notes:"ECM New Series. The complete Beethoven works for cello and piano — five sonatas plus three variation sets. Schiff plays a Bosendorfer, noting these are properly works for piano and cello (not the reverse). Amazon: 'As good as any in the catalogue — rhythmic accuracy and drive, wide dynamic range, virtuoso flair, and an improvisatory quality.' Two Hungarians with total stylistic rapport across Beethoven's whole career."},
  {id:105,label:"Melodram (2-disc, live)",composers:["Vincenzo Bellini"],artist:"Maria Callas (Norma) · Ebe Stignani (Adalgisa) · Mario Picchi (Pollione) · Giacomo Vaghi (Oroveso) · Joan Sutherland (Clotilde) · Coro e Orchestra del Covent Garden / Vittorio Gui",title:"Bellini: Norma",description:"CDM 26025 · Live · Covent Garden, London, 1952 · Melodram historical recording",format:"2-disc set",catNo:"CDM 26025",usedGBP:20.00,newGBP:null,notes:"Melodram live recording. Callas's Covent Garden debut in Norma, 1952 — and one of the most celebrated live opera recordings ever made. ClassicsToday: 'Close to the best of the seven Callas Normas — she is in magnificent voice, with almost none of the problems that would come later. True fury, true sadness, and true warmth when needed.' Crucially, this was an early Covent Garden appearance for Joan Sutherland (as Clotilde), five years before her international breakthrough. Stignani as Adalgisa is a legendary partnership."},
  {id:106,label:"LSO Live (SACD, 6-disc box)",composers:["Ludwig van Beethoven"],artist:"Twyla Robinson · Karen Cargill · John Mac Master · Gerald Finley · London Symphony Chorus · Gordan Nikolitch (violin) · Tim Hugh (cello) · Lars Vogt (piano) · London Symphony Orchestra / Bernard Haitink",title:"Beethoven: Symphonies Nos. 1-9 · Triple Concerto · Leonore Overture No. 2",description:"LSO0598 · Special Edition · 6 SACDs · Live, Barbican Hall, London, Nov 2005 & Apr 2006",format:"SACD (6-disc)",catNo:"LSO0598",usedGBP:35.00,newGBP:null,notes:"LSO Live. Six-SACD Special Edition in 5.0/5.1 multichannel surround and stereo. Audiophile Audition 5 stars: 'This is the Beethoven set for our time — even if you already have umpteen other recordings you really owe it to yourself to hear this new set... a towering achievement.' HRAudio: 'The most musical set of performances of Beethoven I have heard since first hearing Schnabel.' Recorded live at the Barbican, these performances crackle with urgency and authority."},
