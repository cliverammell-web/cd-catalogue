  {id:107,label:"Naxos (2-disc)",composers:["Hector Berlioz"],artist:"Lagrange · Viola · Paganini · Bernardi · Garcia · Vandier · Serre · Choeur Regional Vittoria de l'Ile de France · Maitrise de Radio-France · Orchestre National de Lille / Jean-Claude Casadesus",title:"Berlioz: L'Enfance du Christ Op. 25 (The Childhood of Christ)",description:"8.553630-51 · Naxos · 2-disc · rec. Lille",format:"2-disc set",catNo:"8.553650-51",usedGBP:6.00,newGBP:9.0,notes:"Naxos. Berlioz's most tender and intimate large-scale work — a sacred trilogy depicting the Flight into Egypt and the Holy Family's refuge in Sais. Casadesus and the Lille orchestra deliver a warmly idiomatic performance at budget price. An ideal introduction to one of Berlioz's most accessible and beautiful scores."},
  {id:108,label:"LSO Live (SACD)",composers:["Hector Berlioz"],artist:"Yann Beuron (tenor) · Karen Cargill (mezzo) · William Dazeley (baritone) · Matthew Rose & Peter Rose (basses) · Tenebrae · London Symphony Orchestra / Sir Colin Davis",title:"Berlioz: L'Enfance du Christ Op. 25",description:"LSO0606 · SACD stereo & 5.1 surround · Live, Barbican Hall, London",format:"SACD",catNo:"LSO0606",usedGBP:14.00,newGBP:null,notes:"LSO Live SACD. Sir Colin Davis was the pre-eminent Berlioz conductor of his generation — this LSO Live recording shows him at the height of his interpretative powers. The SACD format captures the Barbican acoustic with exceptional clarity in both stereo and 5.1 surround. Gramophone: 'Davis has the measure of this work as no other conductor.'"},
  {id:109,label:"Consonance Records",composers:["Alexander Borodin","Anatol Liadov","Sergei Prokofiev"],artist:"Tatiana Nikolayeva (piano)",title:"Borodin · Liadov · Prokofiev: Piano Works",description:"CR911026 · solo piano recital",format:"Single CD",catNo:"CR911026",usedGBP:10.00,newGBP:null,notes:"Tatiana Nikolayeva (1924-1993) was one of the great Russian pianists of the 20th century — she had a unique relationship with Shostakovich, who wrote his 24 Preludes and Fugues for her after hearing her play Bach at the 1950 Leipzig Bach Competition. This recital of Borodin, Liadov and Prokofiev showcases her aristocratic tone and profound musical intelligence."},
  {id:110,label:"Hyperion",composers:["William Sterndale Bennett","Francis Edward Bache"],artist:"Howard Shelley (piano/conductor) · BBC Scottish Symphony Orchestra",title:"The Romantic Piano Concerto, Vol. 43 — Sterndale Bennett & Bache",description:"CDA67595 · Bennett: Piano Concerto No. 4 Op. 19, Caprice Op. 22 · Bache: Piano Concerto in E minor Op. 18 · rec. 2007",format:"Single CD",catNo:"CDA67595",usedGBP:12.00,newGBP:14.0,notes:"Hyperion Romantic Piano Concerto series Vol. 43. The Bache concerto had possibly NEVER been performed — the manuscript lay forgotten in the Royal Academy of Music library until this recording. Bache (1833-1858) died of TB aged 25, acclaimed across Europe as a prodigious talent. Hyperion: 'A great discovery.' Bache was a pupil of Sterndale Bennett, who himself was championed by Mendelssohn."},
  {id:111,label:"Harmonia Mundi",composers:["Luigi Boccherini"],artist:"Ensemble Explorations · Roel Dieltiens (cello)",title:"Boccherini: String Quintets Op. 37 — G.347 & G.348",description:"HMC901894 · quintets with two violoncellos",format:"Single CD",catNo:"HMC901894",usedGBP:12.00,newGBP:null,notes:"Harmonia Mundi. Boccherini's quintets with two cellos (he himself played the second cello in many performances) are among the finest chamber music of the 18th century. Ensemble Explorations and Roel Dieltiens bring a natural, breathing ensemble quality to these sun-drenched works. Boccherini (1743-1805) spent much of his career in Spain and his music has a uniquely Iberian flavour."},
  {id:112,label:"Harmonia Mundi USA",composers:["William Byrd"],artist:"Emma Kirkby (soprano) · Fretwork (viol consort)",title:"Byrd: Consort Songs",description:"HMU907383 · 17 songs and instrumental pieces · rec. 2004",format:"Single CD",catNo:"HMU907383",usedGBP:12.00,newGBP:null,notes:"Harmonia Mundi USA. Songs of sundrie nature — secular and sacred consort songs for voice with viol accompaniment. Early Music Review: 'Emma Kirkby is one of the finest interpreters of this music around.' Amazon reviewer: 'Her delivery is so simple, so clean, so pure, and it so perfectly matches Byrd that you would think he wrote the music for her 350 years in advance.' Fretwork are the finest viol consort of their generation."},
  {id:113,label:"Hyperion",composers:["Benjamin Britten"],artist:"The Choir of Trinity College Cambridge · Holly Singers · City of London Sinfonia / Stephen Layton",title:"Britten: A Ceremony of Carols Op. 28 · Saint Nicolas Op. 42",description:"CDA67946 · rec. Trinity College Chapel, Cambridge, 2011",format:"Single CD",catNo:"CDA67946",usedGBP:12.00,newGBP:14.0,notes:"Hyperion. Two of Britten's most beloved choral works in ideal performances from Trinity College Cambridge under Stephen Layton. The Ceremony of Carols (1942) was written on a ship crossing the Atlantic. Saint Nicolas tells the life of the saint through nine movements including audience hymns. Layton was Director of Music at Trinity from 1997-2019 and made many acclaimed recordings there."},
  {id:114,label:"Philips (Duo, 2-disc)",composers:["Luigi Boccherini"],artist:"Quintetto Italiano · I Musici · Academy of St Martin in the Fields · Chamber Ensemble · Virtuosi di Roma · Solisti Veneti / Claudio Scimone · Pablo Casals · Raymond Leppard",title:"The Best of Boccherini including the Minuet",description:"438 377-2 · Philips Duo budget compilation · 2-disc",format:"2-disc set",catNo:"438 377-2",usedGBP:7.00,newGBP:null,notes:"Philips Duo budget compilation. A generous 2-disc introduction to Boccherini, including his most famous work — the Minuet from the String Quintet Op. 11 No. 5, universally recognisable. Boccherini's output was enormous (over 600 works) and these budget compilations offer the ideal starting point. Includes Pablo Casals in some tracks."},
  {id:115,label:"Deutsche Grammophon",composers:["J.S. Bach","Antonio Vivaldi","Luigi Boccherini","Arcangelo Corelli"],artist:"Jian Wang (cello) · Camerata Salzburg",title:"The Baroque Album",description:"474 236-2 · baroque cello works and transcriptions",format:"Single CD",catNo:"474 236-2",usedGBP:9.00,newGBP:null,notes:"Deutsche Grammophon. Jian Wang (born 1968 in Shanghai) is one of the outstanding cellists of his generation. His Baroque Album with the Camerata Salzburg draws on Bach, Vivaldi, Boccherini, Corelli and other baroque masters. Jian Wang won first prize at the International Rostropovich Cello Competition and has recorded for DG since 1995."},
  {id:116,label:"Philips",composers:["Johannes Brahms"],artist:"Alfred Brendel (piano) · Berliner Philharmoniker / Claudio Abbado",title:"Brahms: Piano Concerto No. 1 in D minor Op. 15",description:"420 071-2 · rec. Berlin, September 1986",format:"Single CD",catNo:"420 071-2",usedGBP:9.00,newGBP:null,notes:"Philips. Recorded live in Berlin 1986 — Brendel's second and finest account of this concerto. Gramophone praised his 'unsentimental yet fully engaged and powerfully expressed playing.' The pairing with Abbado and the Berliner Philharmoniker was one of the great partnerships of the era. Brendel recorded the complete Brahms concertos twice, with Abbado and later with Rattle."},
  {id:117,label:"CPO (SACD)",composers:["Johannes Brahms"],artist:"Anne Horsch (organ)",title:"Brahms: Complete Organ Works",description:"777 384-2 · SACD · chorale preludes, fugues and early works",format:"SACD",catNo:"777 384-2",usedGBP:14.00,newGBP:null,notes:"CPO SACD. Brahms's complete organ works — small in quantity but immense in quality, including the early Fugue in A flat minor, the Chorale Preludes Op. 122 (his final published works), and other pieces. Anne Horsch is a specialist in 19th-century organ repertoire. The SACD format captures the full range and depth of the instrument with exceptional clarity."},
  {id:118,label:"Naxos",composers:["Johannes Brahms"],artist:"London Philharmonic Orchestra / Marin Alsop",title:"Brahms: Symphony No. 4 in E minor Op. 98 · Hungarian Dances Nos. 2, 4-9",description:"8.570233 · rec. 2007",format:"Single CD",catNo:"8.570233",usedGBP:6.00,newGBP:8.99,notes:"Naxos. Part of Marin Alsop's Brahms symphony cycle with the London Philharmonic. ClassicsToday: 'Alsop's Brahms cycle has given us one truly outstanding performance (the Third), and three very good companions.' The Hungarian Dances are in new orchestrations by Naxos house arranger Peter Breiner. Alsop was the first woman to win the Koussevitzky Prize for conducting and the first conductor to receive a MacArthur Fellowship."},
  {id:119,label:"Decca",composers:["Johannes Brahms"],artist:"Leonidas Kavakos (violin) · Yuja Wang (piano)",title:"Brahms: Violin Sonatas Nos. 1-3 · Scherzo WoO 2 · Wiegenlied",description:"478 6442 · rec. 2013-2014",format:"Single CD",catNo:"478 6442",usedGBP:12.00,newGBP:null,notes:"Decca. Classical-Music.com: 'Kavakos and Wang approach the music in a generally understated manner, creating an intimacy that reinforces melodic connections with Brahms's Lieder — Wang is admirably discreet in the richer writing, achieving a miraculously delicate touch.' The Daily Mail called Kavakos 'exceptional' and The Guardian described Wang as 'a prodigious talent with astonishing technique.' Their 2013 Verbier partnership was a sensation."},
  {id:120,label:"Deutsche Grammophon (2-disc)",composers:["Johannes Brahms"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Brahms: The Complete Symphonies Nos. 1-4",description:"453 097-2 · 2-disc set · remastered · may be SACD edition",format:"2-disc set",catNo:"453 097-2",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. Karajan's Brahms symphony cycle with the Berlin Philharmonic — recorded across the late 1970s-80s. One of the grandest and most imposing Brahms cycles on disc, with the BPO in its most glorious form. Karajan shapes the slow movements with unerring, inevitable pacing. SACD text appears on the cover spine — may be a hybrid SACD edition."},
  {id:121,label:"Pentatone (SACD)",composers:["Johannes Brahms","Ludwig van Beethoven"],artist:"Misha Dichter (piano) · Gewandhausorchester Leipzig / Kurt Masur",title:"Brahms: Piano Concerto No. 2 Op. 83 · Beethoven: Piano Sonata No. 8 'Pathetique' Op. 13",description:"5186 125 · SACD hybrid multichannel · remastered classic recording",format:"SACD",catNo:"5186 125",usedGBP:14.00,newGBP:null,notes:"Pentatone SACD. Misha Dichter's Brahms Piano Concerto No. 2 with Masur and the Gewandhaus is one of the finest accounts of this most symphonic of concertos. Pentatone remastered it in multichannel SACD, enhancing the Leipzig Gewandhaus acoustic. Dichter (1945-2023) was an American pianist of great distinction, a Silver Medal winner at the 1966 Tchaikovsky Competition."},
  {id:122,label:"Sony Essential Classics",composers:["Johannes Brahms"],artist:"Cleveland Orchestra / George Szell",title:"Brahms: Symphony No. 4 in E minor Op. 98 · Academic Festival Overture · Tragic Overture",description:"SBK46330 · Sony Essential Classics budget reissue · rec. Cleveland, 1960s",format:"Single CD",catNo:"SBK46330",usedGBP:6.00,newGBP:null,notes:"Sony Essential Classics budget reissue. Szell's Cleveland Brahms recordings from the 1960s are among the most admired in the catalogue — lean, disciplined, rhythmically vital and architecturally impeccable. Gramophone: 'The clarity of texture and the rhythmic precision of Szell's Brahms are still unsurpassed.' An exceptional orchestra at the height of its powers under one of the great taskmaster conductors."},
  {id:123,label:"BIS (SACD)",composers:["Johannes Brahms","George Frideric Handel"],artist:"Jonathan Plowright (piano)",title:"Brahms: Piano Sonata No. 1 Op. 1 · Variations on a Theme by Handel Op. 24",description:"BIS-2047 · SACD · rec. 2013",format:"SACD",catNo:"BIS-2047",usedGBP:14.00,newGBP:null,notes:"BIS SACD. Jonathan Plowright is one of the finest British pianists of his generation, particularly associated with the Romantic repertoire. The Brahms First Sonata is a fiery, turbulent early work — extraordinary that the 19-year-old composer could produce something so ambitious. The Handel Variations are among Brahms's supreme achievements in keyboard writing — 25 variations of breathtaking variety and invention."},
  {id:124,label:"RCA Digital Classics",composers:["Johannes Brahms"],artist:"Yo-Yo Ma (cello) · Emanuel Ax (piano)",title:"Brahms: Cello Sonatas Op. 38 & Op. 99",description:"RD7022 · rec. 1984",format:"Single CD",catNo:"RD7022",usedGBP:10.00,newGBP:null,notes:"RCA Digital Classics. ClassicsToday: 'Time remains kind to Yo-Yo Ma and Emanuel Ax's 1984 Brahms cello sonatas — from RCA's warm, intimate sonics to each player's impeccable technique and sensitive musicianship.' One of the most cherished recordings in the cello repertoire. Ma and Ax made a second version for Sony, but many collectors prefer the RCA for its more natural, chamber-music atmosphere."},
  {id:125,label:"Telarc",composers:["Johannes Brahms"],artist:"Scottish Chamber Orchestra / Sir Charles Mackerras",title:"Brahms: Symphony No. 1 in C minor Op. 68 · Academic Festival Overture Op. 80",description:"CD-80463 · Telarc Digital · rec. 1994",format:"Single CD",catNo:"CD-80463",usedGBP:10.00,newGBP:null,notes:"Telarc. Sir Charles Mackerras brings his characteristic combination of scholarly rigour and natural spontaneity to the First Symphony. Telarc's engineering is demonstration quality. The Scottish Chamber Orchestra was the ideal size for Mackerras's historically informed but unstuffy approach — these are Brahms performances of great vitality and freshness. CD-80463 is a well-regarded budget recommendation in many reference guides."},
  {id:126,label:"CBS Masterworks",composers:["Johannes Brahms"],artist:"Isaac Stern (violin) · Yo-Yo Ma (cello) · Chicago Symphony Orchestra / Claudio Abbado · Emanuel Ax (piano) · Jaime Laredo (viola)",title:"Brahms: Double Concerto Op. 102 · Piano Quartet No. 3 Op. 60",description:"MK 42387 · DDD · rec. 1988 (Concerto) · Suntory Hall, Tokyo, 1986 (Piano Quartet)",format:"Single CD",catNo:"MK 42387",usedGBP:10.00,newGBP:null,notes:"CBS Masterworks. A supergroup double-bill: the Double Concerto paired with Stern, Yo-Yo Ma, Abbado and the Chicago Symphony Orchestra, coupled with the Piano Quartet No. 3 in C minor played by Ax, Stern, Laredo and Ma — recorded live at Suntory Hall, Tokyo 1986. Brahms’ Piano Quartet No. 3 was his most autobiographical chamber work — he identified personally with its desolate, passionate character. A collector’s disc combining two of the finest chamber ensembles of the era."},
  {id:127,label:"Deutsche Grammophon (4-disc box)",composers:["Johannes Brahms"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Brahms: 4 Symphonies",description:"427 602-2 · 4-disc box · rec. Philharmonie Berlin, 1986-88",format:"Box set",catNo:"427 602-2",usedGBP:20.00,newGBP:null,notes:"Deutsche Grammophon. Karajan's third and final Brahms symphony cycle — recorded in the 1980s and widely considered his finest. The Penguin Guide awarded it three stars and described it as 'interpretations that continue to set the standard.' Also in the collection as a 2-disc compilation (CD 120, 453 097-2). This is the complete 4-disc box edition."},
  {id:128,label:"Harmonia Mundi",composers:["Johannes Brahms"],artist:"RIAS-Kammerchor Berlin / Marcus Creed",title:"Brahms: Geistliche Chormusik (Sacred Choral Music)",description:"HMC 901 591 · rec. Berlin, 1994-95",format:"Single CD",catNo:"HMC 901 591",usedGBP:12.00,newGBP:null,notes:"Harmonia Mundi. Brahms's sacred choral music including the two great Motets Op. 74 and the Op. 29 Motets. Diapason: 'Le RIAS Kammerchor confirme son etonnante souplesse stylistique et son affinite particuliere avec l’univers brahmsien.' Repertoire: 'Jamais Brahms ne nous avait paru aussi enchanteur.' The RIAS Kammerchor is one of Europe's great professional chamber choirs, founded in 1948."},
  {id:129,label:"Decca",composers:["Franz Schubert","Robert Schumann","Claude Debussy"],artist:"Mstislav Rostropovich (cello) · Benjamin Britten (piano)",title:"Schubert: Arpeggione Sonata D.821 · Schumann: Funf Stucke im Volkston Op.102 · Debussy: Cello Sonata",description:"417 833-2 · rec. The Maltings, Snape, July 1968 (Schubert) · Kingsway Hall, London, 1961 (Schumann & Debussy) · remastered 96kHz/24-bit",format:"Single CD",catNo:"417 833-2",usedGBP:14.00,newGBP:null,notes:"Decca. One of the most legendary recordings in the entire cello repertoire. Rostropovich regarded as the greatest cellist of the second half of the 20th century, with Britten as his ideal piano partner — composer and executant in perfect accord. The Schubert Arpeggione Sonata here is miraculous in its bittersweet introspection. Classical-Music.com: 'Britten sets the unexpected tone by approaching it with the seriousness of Richter.' The original vinyl sells for over $2,000."},
  {id:130,label:"Decca",composers:["Benjamin Britten"],artist:"Various performers",title:"The World of Britten",description:"436 990-2 · Decca budget compilation · includes Young Person's Guide, Simple Symphony, Sea Interludes, Serenade",format:"Single CD",catNo:"436 990-2",usedGBP:7.00,newGBP:null,notes:"Decca. An ideal single-disc introduction to Britten's orchestral and vocal world, including the Young Person's Guide to the Orchestra, Simple Symphony, Four Sea Interludes from Peter Grimes, Serenade for Tenor Horn and Strings, and Lachrymae. A fine calling card for one of the 20th century's most distinctly personal voices."},
  {id:131,label:"Nimbus Records",composers:["Benjamin Britten"],artist:"English Symphony Orchestra / William Boughton",title:"Britten: Young Person's Guide to the Orchestra · Sea Interludes · Sinfonia da Requiem · English Folk Song Suite",description:"NI 5295 · rec. Elgar Concert Hall, Barber Institute, Birmingham",format:"Single CD",catNo:"NI 5295",usedGBP:10.00,newGBP:null,notes:"Nimbus Records. William Boughton and the English Symphony Orchestra in a well-filled disc of Britten's most accessible orchestral works. The Young Person's Guide to the Orchestra (Variations and Fugue on a Theme of Purcell) remains one of the best introductions to the symphony orchestra ever written. Nimbus was a pioneering independent UK label, early champions of ambient sound recording."},
  {id:132,label:"Deutsche Grammophon (2-disc)",composers:["Anton Bruckner"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Bruckner: Symphonies Nos. 1 & 5",description:"415 985-2 · 2-disc set · rec. Philharmonie, Berlin, 1981-82 · early digital",format:"2-disc set",catNo:"415 985-2",usedGBP:10.00,newGBP:null,notes:"Deutsche Grammophon. Symphonies 1 and 5 from Karajan's BPO Bruckner cycle. The early three symphonies (1-3) were recorded in early digital, which some critics find less flattering than the mid-1970s analogue recordings of Nos. 4-9. Nevertheless the BPO's playing is monumental throughout. Penguin Guide: 'Karajan has long been considered to be perhaps the best interpreter of Bruckner's symphonies.'"},
  {id:133,label:"Deutsche Grammophon (2-disc)",composers:["Anton Bruckner","Richard Wagner"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Bruckner: Symphony No. 8 in C minor · Wagner: Siegfried Idyll",description:"419 196-2 · 2-disc set · rec. Philharmonie, Berlin, January 1975 (Bruckner) · 1977 (Wagner) · analogue",format:"2-disc set",catNo:"419 196-2",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. Bruckner's colossal Eighth Symphony — his longest at around 80 minutes — coupled with the Wagner Siegfried Idyll. Recorded in January 1975 in the Philharmonie Berlin, one of the crown jewels of the Karajan/BPO analogue Bruckner cycle. The 8th is Bruckner's most complex and architecturally ambitious symphony, and Karajan shapes its vast spans with supreme command. The Siegfried Idyll — Wagner's intimate domestic birthday gift to Cosima — makes a perfect lyrical companion."},
  {id:134,label:"Brilliant Classics (3-disc)",composers:["Anton Bruckner"],artist:"Chamber Choir of Europe / Wurtt. Philharmonie Reutlingen / Nicol Matt (CD1) · Gachinger Kantorei Stuttgart / Bach-Collegium Stuttgart / Helmuth Rilling (CD2) · Radio-Sinfonieorchester Stuttgart / Helmuth Rilling (CD3) · Soloists incl. Matthias Goerne (bar)",title:"Bruckner: Masses Nos. 1-3 · Te Deum · Psalm 150",description:"92002 · Brilliant Classics · 3-disc set · licensed from Hanssler Classic · rec. 1992/1996/2003",format:"3-disc set",catNo:"92002",usedGBP:12.00,newGBP:null,notes:"Brilliant Classics. CD1: Mass No.1 in D minor (Nicol Matt / Chamber Choir of Europe / Wurttemberg Philharmonic, 2003). CD2: Te Deum (1884) + Psalm 150 + Mass No.2 in E minor (Rilling / Gachinger Kantorei / Bach-Collegium Stuttgart, 1996, Liederhalle Beethovensaal). CD3: Mass No.3 in F minor (Rilling / Gachinger Kantorei / Radio-SO Stuttgart, December 1992). CD3 features Matthias Goerne as baritone/bass soloist. Bruckner's three great masses span 1864-68 and represent his sacred choral writing at its finest. Budget Brilliant Classics edition licensed from Hanssler Classic."},
  {id:135,label:"EMI Classics",composers:["Anton Bruckner"],artist:"City of Birmingham Symphony Orchestra / Simon Rattle",title:"Bruckner: Symphony No. 7 in E major",description:"5 56425 2 3 · rec. Birmingham, 1994",format:"Single CD",catNo:"5 56425 2 3",usedGBP:9.00,newGBP:null,notes:"EMI Classics. Simon Rattle's Bruckner 7th with the CBSO in Birmingham — recorded at the height of their remarkable partnership. Rattle transformed the CBSO into one of Europe's leading orchestras during his 18 years as Chief Conductor. ClassicsToday praised this account for its 'natural pacing and unaffected warmth.' Bruckner's 7th is the symphony that finally brought him international fame during his own lifetime, after the premiere in Leipzig in 1884."},
  {id:136,label:"Conifer Classics",composers:["Frank Bridge"],artist:"Britten Sinfonia / Nicholas Cleobury",title:"Bridge: Suite for Strings · The Two Hunchbacks · There is a Willow grows · Tovarich · Other orchestral works",description:"75605 51327 2 · rec. All Saints Church, East Finchley, London",format:"Single CD",catNo:"75605 51327 2",usedGBP:10.00,newGBP:null,notes:"Conifer Classics. Frank Bridge (1879-1941) is best known as Benjamin Britten's teacher, but was a major composer in his own right. His music ranges from the romantic charm of the Suite for Strings to the increasingly bold modernism of his later works. The Britten Sinfonia, named in homage to Bridge's most famous pupil, are ideal interpreters of his music."},
  {id:137,label:"Deutsche Grammophon",composers:["Anton Bruckner"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Bruckner: Symphony No. 2 in C minor",description:"415 988-2 · rec. Philharmonie, Berlin, 1981 · early digital",format:"Single CD",catNo:"415 988-2",usedGBP:8.00,newGBP:null,notes:"Deutsche Grammophon. Symphony No. 2 from Karajan's BPO cycle, recorded in 1981 in early digital sound. The Second Symphony was initially rejected by the Vienna Philharmonic as unplayable, but Bruckner persisted. Karajan's traversal of the complete Bruckner symphonic cycle remains one of the most commanding on disc."},
  {id:138,label:"Deutsche Grammophon",composers:["Anton Bruckner"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Bruckner: Symphony No. 3 in D minor 'Wagner-Symphonie'",description:"413 362-2 · rec. Philharmonie, Berlin, 1980 · early digital",format:"Single CD",catNo:"413 362-2",usedGBP:8.00,newGBP:null,notes:"Deutsche Grammophon. Bruckner's Third Symphony, known as the 'Wagner Symphony' because it was originally dedicated to Wagner (who accepted). Recorded in 1980 in early digital sound. The premiere in Vienna in 1877 was a disaster, with most of the audience walking out; the Second is now recognised as one of his finest."},
  {id:139,label:"Deutsche Grammophon",composers:["Anton Bruckner"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Bruckner: Symphony No. 4 in E-flat major 'Romantic'",description:"415 277-2 · rec. Philharmonie, Berlin, 1975 · analogue",format:"Single CD",catNo:"415 277-2",usedGBP:10.00,newGBP:null,notes:"Deutsche Grammophon. Bruckner's most immediately appealing and popular symphony, the Romantic. Recorded in 1975 in warm analogue sound — part of the magnificent mid-1970s analogue recordings that are the crown jewels of the Karajan/BPO Bruckner cycle. Penguin Guide: 'Karajan has long been considered perhaps the best interpreter of Bruckner's symphonies.' The Romantic is Bruckner at his most accessible and nature-pictorial."},
  {id:140,label:"Deutsche Grammophon",composers:["Anton Bruckner"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Bruckner: Symphony No. 7 in E major",description:"419 195-2 · rec. Philharmonie, Berlin, April 1975 · analogue",format:"Single CD",catNo:"419 195-2",usedGBP:9.00,newGBP:null,notes:"Deutsche Grammophon. The Seventh Symphony in its standalone pressing — the same Karajan/BPO 1975 analogue recording also appears in CD 133 (419 196-2) coupled with the Wagner Siegfried Idyll. The 7th is widely considered Bruckner's greatest popular success — its premiere in Leipzig in 1884 finally brought him the international recognition he had long sought. Karajan's account is magisterial."},
  {id:141,label:"Deutsche Grammophon",composers:["Anton Bruckner"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Bruckner: Symphony No. 9 in D minor (unfinished)",description:"419 083-2 · rec. Philharmonie, Berlin, September 1975 · analogue",format:"Single CD",catNo:"419 083-2",usedGBP:9.00,newGBP:null,notes:"Deutsche Grammophon. Bruckner's last and unfinished symphony, left incomplete at his death in 1896. Recorded September 1975 in warm analogue. Bruckner dedicated the 9th 'to the dear Lord' and instructed that if he died before finishing it, the Te Deum should serve as a finale. Karajan's account of the three completed movements is one of the most overwhelming on disc — vast in scale, profound in feeling."},
  {id:142,label:"Decca Digital",composers:["Anton Bruckner"],artist:"Radio-Symphonie-Orchester Berlin / Riccardo Chailly",title:"Bruckner: Symphony No. 0 in D minor 'Die Nullte'",description:"421 593-2 · rec. 1987",format:"Single CD",catNo:"421 593-2",usedGBP:10.00,newGBP:null,notes:"Decca. Bruckner's pre-symphonic 'Symphony No. 0' — written in 1863-64 but withdrawn by the composer who dismissed it as 'nix' (nothing). Rediscovered and premiered posthumously in 1924, it is now recognised as a substantial and fascinating work. Riccardo Chailly with the RSO Berlin gives a committed performance of this rarity. An essential disc for Bruckner completists."},
  {id:143,label:"Philips",composers:["Anton Bruckner"],artist:"Karita Mattila (soprano) · Marjana Lipovšek (alto) · Thomas Moser (tenor) · Kurt Moll (bass) · Symphonieorchester & Chor des Bayerischen Rundfunks / Sir Colin Davis",title:"Bruckner: Mass No. 3 in F minor (Grosse Messe)",description:"422 358-2 · rec. Munich, 1988",format:"Single CD",catNo:"422 358-2",usedGBP:12.00,newGBP:null,notes:"Philips. A superlative cast for Bruckner's greatest mass: Mattila at her luminous best, Lipovšek in magnificent form, the bass Kurt Moll providing deep resonance and authority. Colin Davis was among the finest Bruckner conductors of his generation. The F minor Mass is Bruckner's most ambitious sacred work, incorporating the full orchestral and choral forces of his mature style."},
  {id:144,label:"Warner Classics",composers:["Antonín Dvořák","Franz Schubert"],artist:"Sviatoslav Richter (piano) · Bavarian State Orchestra / Carlos Kleiber",title:"Dvořák: Piano Concerto in G minor Op. 33 · Schubert: Wanderer Fantasy D.760",description:"0724356689527 · rec. Munich, June 1976 (Dvořák) · Paris, February 1963 (Schubert) · Warner Classics reissue",format:"Single CD",catNo:"0724356689527",usedGBP:12.00,newGBP:15.00,notes:"Warner Classics. ClassicsToday ***** (5 stars): 'If Richter's realization of Schubert's Wanderer Fantasy has remained legendary, so too has his collaboration with the brilliantly eccentric Carlos Kleiber in the original, uncut version of the Dvořák Concerto.' The Dvořák Concerto was 'once deemed the concerto for two right hands' — Richter and Kleiber reclaim it completely. Two recordings made 13 years apart, both now legendary."},
  {id:145,label:"Harmonia Mundi (2-disc)",composers:["Antonio Caldara"],artist:"María Cristina Kiehr (soprano) · Bernarda Fink (alto) · Andreas Scholl (countertenor) · Christoph Türk (tenor) · Oliver Messthaler (bass) · Schola Cantorum Basiliensis / Chiara Banchini / René Jacobs",title:"Caldara: Maddalena ai piedi di Cristo",description:"HMC 905221.22 · sacred oratorio · 2-disc set · Schola Cantorum Basiliensis / WDR co-production",format:"2-disc set",catNo:"HMC 905221.22",usedGBP:15.00,newGBP:null,notes:"Harmonia Mundi. Antonio Caldara (1671-1736) was one of the most prolific Italian Baroque composers, court composer in Vienna from 1716. 'Maddalena ai piedi di Cristo' is a sacred oratorio of great beauty and drama. The cast is exceptional: Bernarda Fink and Andreas Scholl are among the finest Baroque singers of their generation. René Jacobs is the definitive conductor of this repertoire."},
  {id:146,label:"aeon",composers:["Ernest Chausson","Maurice Ravel","Henri Duparc"],artist:"Felicity Lott (soprano) · Orchestre de la Suisse Romande / Armin Jordan",title:"Chausson · Ravel · Duparc: Mélodies et Poèmes",description:"AECD 0317 · French songs and orchestral songs",format:"Single CD",catNo:"AECD 0317",usedGBP:12.00,newGBP:null,notes:"aeon Records. A recital of French mélodie in orchestral settings — Chausson's Poème de l'amour et de la mer, Ravel songs and the incomparable Duparc mélodies. Felicity Lott is one of the finest interpreters of French vocal music of her generation, with a purity of tone and refinement of expression perfectly suited to this repertoire. Armin Jordan and the OSR provide an ideal Francophone backdrop."},
  {id:147,label:"Linn Records (SACD)",composers:["Frédéric Chopin"],artist:"Ingrid Fliter (piano) · Scottish Chamber Orchestra / Jun Märkl",title:"Chopin: Piano Concertos Nos. 1 & 2",description:"CKD 455 · Linn Records SACD · rec. Usher Hall, Edinburgh, 2012",format:"SACD",catNo:"CKD 455",usedGBP:14.00,newGBP:null,notes:"Linn Records. Ingrid Fliter (born 1973 in Buenos Aires) won second prize at the Leeds International Piano Competition in 2000 and is recognised as one of the outstanding Chopin interpreters of her generation. Linn Records is a Scottish audiophile label renowned for exceptional sound quality. Gramophone praised Fliter's 'natural, aristocratic phrasing and luminous tone.' Jun Märkl and the SCO provide a perfectly scaled partnership."},
  {id:148,label:"Deutsche Grammophon",composers:["Frédéric Chopin"],artist:"Ivo Pogorelich (piano) · Chicago Symphony Orchestra / Claudio Abbado",title:"Chopin: Piano Concerto No. 2 in F minor Op. 21 · Polonaise Op. 44",description:"410 507-2 · rec. Orchestra Hall, Chicago, 1983",format:"Single CD",catNo:"410 507-2",usedGBP:9.00,newGBP:null,notes:"Deutsche Grammophon. Pogorelich's debut recording for DG with Abbado and the Chicago Symphony. Amazon: 'Abbado matches Pogorelich phrase for phrase and draws lovely playing from the Chicago Symphony — the Larghetto glows with warmth.' Pogorelich divided critical opinion from the start: after his controversial elimination at the 1980 Chopin Competition, jury member Martha Argerich resigned in protest and declared him 'a genius.'"},
  {id:149,label:"Deutsche Grammophon (2-disc)",composers:["Frédéric Chopin"],artist:"Maurizio Pollini (piano)",title:"Chopin: Nocturnes (Complete)",description:"477 518 · 2-disc set · rec. Munich, 2003-04",format:"2-disc set",catNo:"477 518",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. The Guardian called Pollini's Nocturnes 'the greatest of all living Chopin interpreters — these are the composer's best loved works for the first time.' The Sun described his miniature solos as 'most mesmerising.' Pollini's precision and intellectual rigour brought a new clarity to music often played as romantic wallpaper — controversial and revelatory in equal measure."},
  {id:150,label:"Hyperion",composers:["Frédéric Chopin"],artist:"Nikolai Demidenko (piano)",title:"Demidenko spielt Chopin",description:"AGPL 1-010 · solo piano recital",format:"Single CD",catNo:"AGPL 1-010",usedGBP:10.00,newGBP:null,notes:"Nikolai Demidenko (born 1955) is a Russian pianist of the generation trained in the Soviet system at the Moscow Conservatoire. His Chopin playing is noted for its powerful, often unconventional interpretations. Demidenko recorded extensively for Hyperion and was highly regarded in Britain throughout the 1990s."},
  {id:151,label:"Harmonia Mundi",composers:["Frédéric Chopin"],artist:"Alexandre Tharaud (piano)",title:"Chopin: 24 Préludes Op. 28 · Prélude Op. 45 · Prélude Op. posth.",description:"HMC 901982 · rec. 2001",format:"Single CD",catNo:"HMC 901982",usedGBP:11.00,newGBP:null,notes:"Harmonia Mundi. Alexandre Tharaud (born 1968) is one of the most distinctive French pianists of his generation, noted for the clarity and intelligence of his interpretations. His Chopin Préludes are praised for their naturalness and poetry. Diapason d'Or award. Tharaud approaches the 24 Préludes not as separate miniatures but as a cycle with its own internal narrative logic."},
  {id:152,label:"Warner Classics",composers:["Frédéric Chopin"],artist:"Martha Argerich (piano) · Orchestre Symphonique de Montréal / Charles Dutoit",title:"Chopin: Piano Concertos Nos. 1 & 2",description:"5 03412 2 1 · rec. Montréal, 1998-99 · Gramophone and Penguin Guide recommended",format:"2-disc set",catNo:"5 03412 2 1",usedGBP:11.00,newGBP:null,notes:"Warner Classics. Argerich's second complete recording of the Chopin concertos, with Dutoit and the Montréal orchestra — more relaxed and characterful than her famous early DG recordings with Abbado. Both the Gramophone Classical Music Guide and Penguin Guide to CDs recommended this release. Argerich's Chopin playing has remained a benchmark for six decades."},
  {id:153,label:"Deutsche Grammophon (Archiv, 2-disc)",composers:["Arcangelo Corelli"],artist:"The English Concert / Trevor Pinnock",title:"Corelli: 12 Concerti Grossi Op. 6",description:"474 907-2 · Gramophone Awards Collection · Early Music Baroque Award 1989 · rec. 1988",format:"2-disc set",catNo:"474 907-2",usedGBP:12.00,newGBP:null,notes:"Archiv / Deutsche Grammophon. Winner of the Gramophone Early Music Baroque Award 1989 — one of the most prestigious honours in classical recording. Corelli's Op. 6 concerti grossi are among the masterpieces of Baroque orchestral writing, influencing every major composer who followed. Pinnock and The English Concert are definitive advocates: transparent textures, rhythmic vitality and perfect stylistic understanding."},
  {id:154,label:"EMI Classics (Great Recordings of the Century)",composers:["Claude Debussy"],artist:"Walter Gieseking (piano)",title:"Debussy: Préludes, Books I & II",description:"5 67223 2 0 · EMI Great Recordings of the Century · rec. Abbey Road, London, 1953-54",format:"Single CD",catNo:"5 67223 2 0",usedGBP:12.00,newGBP:null,notes:"EMI Great Recordings of the Century. Walter Gieseking (1895-1956) is widely regarded as the supreme Debussy pianist of the recorded era — his 1953-54 Abbey Road recordings of the two books of Préludes remain the benchmark against which all others are measured. Gramophone Hall of Fame. His pearly tone, miraculous control of touch and colour, and complete stylistic understanding have never been surpassed. A recording that belongs in every serious classical collection."},
  {id:155,label:"Deutsche Grammophon (Karajan Gold)",composers:["Claude Debussy","Maurice Ravel"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Debussy: La Mer · Prélude à l’après-midi d’un faune · Ravel: Daphnis et Chloé Suite No. 2",description:"439 008-2 · DG Karajan Gold · Original-Image Bit-Processing remaster",format:"Single CD",catNo:"439 008-2",usedGBP:10.00,newGBP:null,notes:"Deutsche Grammophon Karajan Gold series, with OIBP remastering. La Mer is Debussy’s supreme orchestral achievement — three symphonic sketches of the sea that transformed what an orchestra could do with colour and texture. Karajan’s BPO brings extraordinary sonic opulence to this music. The Prélude à l’après-midi d’un faune is arguably the most influential three minutes in the history of modern music. Ravel’s Daphnis et Chloé Suite No. 2 makes a ravishing coupling. HMV sticker: £15.99."},
  {id:156,label:"Decca (2-disc box)",composers:["Gaetano Donizetti"],artist:"Joan Sutherland (Adina) · Luciano Pavarotti (Nemorino) · Dominic Cossa (Belcore) · Spiro Malas (Dulcamara) · Maria Casula (Giannetta) · Ambrosian Opera Chorus · English Chamber Orchestra / Richard Bonynge",title:"Donizetti: L'Elisir d'Amore",description:"414 461-2 · 2-disc box · rec. Kingsway Hall, London, 1970",format:"2-disc set",catNo:"414 461-2",usedGBP:14.00,newGBP:null,notes:"Decca. One of the most beloved opera recordings ever made — Sutherland and Pavarotti at the height of their powers in 1970, with Bonynge drawing glorious playing from the ECO at Kingsway Hall. Pavarotti's 'Una furtiva lagrima' is among the most celebrated tenor arias on disc. Gramophone: 'A glorious performance — Pavarotti's Nemorino is a classic.' This recording helped establish both singers as the dominant operatic forces of their generation."},
  {id:157,label:"CBS Masterworks (2-disc box)",composers:["Gaetano Donizetti"],artist:"José Carreras (Poliuto) · Katia Ricciarelli (Paolina) · Juan Pons (Severo) · Chor der Wiener Singakademie · Wiener Symphoniker / Oleg Caetani",title:"Donizetti: Poliuto",description:"M2K 44821 · 2-disc box · rec. Vienna, 1986",format:"2-disc set",catNo:"M2K 44821",usedGBP:12.00,newGBP:null,notes:"CBS Masterworks. Donizetti's Poliuto is one of his most ambitious operas — originally banned by Neapolitan censors for its depiction of early Christian martyrdom. Carreras brings his lyrical intensity to the title role and Ricciarelli is deeply expressive as Paolina. Recorded in Vienna 1986. Donizetti (1797-1848) wrote over 70 operas, of which Poliuto is among the more rarely performed but musically most impressive."},
  {id:158,label:"Decca (3-disc box)",composers:["Gaetano Donizetti"],artist:"Joan Sutherland (Lucia) · Luciano Pavarotti (Edgardo) · Sherrill Milnes (Enrico) · Nicolai Ghiaurov (Raimondo) · Chorus & Orchestra of the Royal Opera House, Covent Garden / Richard Bonynge",title:"Donizetti: Lucia di Lammermoor",description:"410 193-2 · 3-disc box · rec. Kingsway Hall, London, 1971",format:"3-disc set",catNo:"410 193-2",usedGBP:18.00,newGBP:null,notes:"Decca. One of the most celebrated opera recordings in history. Sutherland's Lucia is without equal on disc — her voice at its most luminous and technically peerless in 1971. Pavarotti's Edgardo is magnificent, Milnes and Ghiaurov outstanding. The Mad Scene is legendary. Gramophone: 'Sutherland's voice is glorious — the range and flexibility and beauty of tone are breathtaking.' Bonynge was the architect of the bel canto revival, and this recording stands as its crowning achievement."},
  {id:159,label:"Deutsche Grammophon",composers:["Antonín Dvořák"],artist:"Israel Philharmonic Orchestra / Leonard Bernstein",title:"Dvořák: Symphony No. 9 in E minor Op. 95 'From the New World' · 3 Slavonic Dances Op. 46",description:"457 712-2 · rec. live, Salle Pleyel, Paris, September 1986 (Symphony) · Mann Auditorium, Tel Aviv, 1988 (Slavonic Dances) · IPO 50th anniversary tour",format:"Single CD",catNo:"457 712-2",usedGBP:10.00,newGBP:null,notes:"Deutsche Grammophon. Recorded live during the Israel Philharmonic's 50th anniversary tour at the Salle Pleyel, Paris, in September 1986. Amazon: 'The most individual of his three versions — the circumstances of a jubilee tour give it a special energy.' The New World Symphony is one of the most beloved works in the entire repertoire — Dvorkák wrote it in New York in 1893, suffused with homesickness for Bohemia. Bernstein and the IPO had a uniquely close bond across three decades."},
  {id:160,label:"Virgin Classics",composers:["Antonín Dvořák","Victor Herbert"],artist:"Gautier Capuçon (cello) · Frankfurt Radio Symphony Orchestra / Paavo Järvi",title:"Dvořák: Cello Concerto in B minor Op. 104 · Victor Herbert: Cello Concerto No. 2 in E minor Op. 30",description:"5 19035 2 7 · Virgin Classics · rec. 2005",format:"Single CD",catNo:"5 19035 2 7",usedGBP:12.00,newGBP:null,notes:"Virgin Classics. Gautier Capuçon (born 1981) is one of the finest French cellists of his generation — younger brother of violinist Renaud Capuçon. His Dvořák is praised for its natural lyricism and youthful ardour. Victor Herbert (1859-1924) was an Irish-American composer whose 1894 Cello Concerto is a forgotten gem — an ideal coupling. Paavo Järvi and the Frankfurt RSO provide a perfectly scaled partnership."},
  {id:161,label:"Naxos",composers:["Antonín Dvořák"],artist:"Joachim Trio",title:"Dvořák: Piano Trios Vol. 1 · Piano Trio in F minor Op. 65 · Dumky Trio Op. 90",description:"8.550444 · Naxos",format:"Single CD",catNo:"8.550444",usedGBP:6.00,newGBP:8.99,notes:"Naxos. The Dumky Trio is one of Dvořák's most beloved chamber works — six movements alternating between Slavic melancholy and exuberant dance, the name 'dumka' (plural 'dumky') deriving from a Ukrainian ballad form. The F minor Trio Op. 65 is an earlier, more turbulent work of great power. The Joachim Trio are Czech specialists well suited to both works."},
  {id:162,label:"Teldec",composers:["Antonín Dvořák"],artist:"András Schiff (piano) · Panocha Quartet",title:"Dvořák: Piano Quartet No. 2 in E-flat major Op. 87",description:"0630-17142-2 · Teldec · rec. 1990s",format:"Single CD",catNo:"0630-17142-2",usedGBP:10.00,newGBP:null,notes:"Teldec. András Schiff with the Czech Panocha Quartet in Dvořák's most popular chamber work. The Piano Quartet No. 2 (1889) is a late masterpiece — warm, lyrical and suffused with Bohemian folk spirit. Schiff's intimate understanding of Central European chamber music and the Panocha Quartet's native authority make this a very compelling partnership."},
  {id:163,label:"Naxos",composers:["Antonín Dvořák","Edward Elgar"],artist:"Maria Kliegel (cello) · Royal Philharmonic Orchestra / Michael Halász",title:"Dvořák: Cello Concerto Op. 104 · Elgar: Cello Concerto Op. 85",description:"8.550503 · Naxos · rec. 1993",format:"Single CD",catNo:"8.550503",usedGBP:6.00,newGBP:8.99,notes:"Naxos. The two greatest cello concertos of the late Romantic era on one budget disc. Maria Kliegel won the ARD International Music Competition in 1984 and brings technical brilliance and deep musical understanding to both works. The Elgar Concerto (1919) was a late-career masterpiece — autumnal, deeply personal, and overshadowed on its premiere before du Pré's recording gave it immortality. ClassicsToday: 'An exceptional budget recommendation.'"},
  {id:164,label:"Deutsche Grammophon",composers:["Antonín Dvořák"],artist:"Symphonieorchester des Bayerischen Rundfunks / Rafael Kubelík",title:"Dvořák: Slavonic Dances Op. 46 & Op. 72",description:"427 346-2 · rec. Munich, 1970s",format:"Single CD",catNo:"427 346-2",usedGBP:8.00,newGBP:null,notes:"Deutsche Grammophon. Rafael Kubelík (1914-1996) was himself Czech — son of the great violinist Jan Kubelík — and his readings of the Slavonic Dances are among the most idiomatically natural on disc. He left Czechoslovakia after the 1948 Communist coup and never returned until 1990. The Bavarian Radio Symphony Orchestra was his great long-term partnership. These 16 dances are Dvořák at his most irresistible."},
  {id:165,label:"Deutsche Grammophon",composers:["Antonín Dvořák","Pyotr Ilyich Tchaikovsky"],artist:"Mstislav Rostropovich (cello) · Berliner Philharmoniker / Herbert von Karajan",title:"Dvořák: Cello Concerto Op. 104 · Tchaikovsky: Rococo Variations Op. 33",description:"413 819-2 · original analogue pressing · rec. Jesus-Christus-Kirche, Berlin, 1969 (Dvořák) & 1975 (Tchaikovsky)",format:"Single CD",catNo:"413 819-2",usedGBP:9.00,newGBP:null,notes:"Deutsche Grammophon. The original analogue pressing of one of the most celebrated recordings in the cello repertoire. Rostropovich's Dvořák Cello Concerto with Karajan and the BPO (1969) has remained at the top of the catalogue for over 50 years — a performance of regal phrasing, singing tone and orchestral sweep. Coupled with the Tchaikovsky Rococo Variations (1975). Also available remastered with OIBP as CD 166 (447 413-2, DG Originals, 1995)."},
  {id:166,label:"Deutsche Grammophon (The Originals)",composers:["Antonín Dvořák","Pyotr Ilyich Tchaikovsky"],artist:"Mstislav Rostropovich (cello) · Berliner Philharmoniker / Herbert von Karajan",title:"Dvořák: Cello Concerto Op. 104 · Tchaikovsky: Rococo Variations Op. 33",description:"447 413-2 · DG The Originals · same recording as CD 165 remastered with Original Image Bit-Processing · reissued 1995",format:"Single CD",catNo:"447 413-2",usedGBP:9.00,newGBP:null,notes:"DG The Originals. The same 1969/1975 Rostropovich/Karajan recordings as CD 165 (413 819-2), remastered in 1995 using DG's Original Image Bit-Processing (OIBP) technology and reissued as part of the prestigious 'The Originals' series. OIBP was DG's proprietary mastering process aimed at recovering more of the original analogue source signal, reducing noise and improving dynamic range. Both pressings are in the collection — some collectors prefer the warmer original analogue sound of CD 165."},
  {id:167,label:"BBC Legends",composers:["Antonín Dvořák","Edward Elgar"],artist:"Jacqueline du Pré (cello) · various orchestras and conductors",title:"du Pré: Dvořák Cello Concerto · Elgar works · Live BBC Recordings",description:"BBCL 4156-2 · BBC Legends · live BBC broadcast archive recordings",format:"Single CD",catNo:"BBCL 4156-2",usedGBP:14.00,newGBP:null,notes:"BBC Legends. Archive live BBC broadcast recordings of Jacqueline du Pré in Dvořák and Elgar. BBC Legends was the label established to release the BBC's archive of broadcast recordings — preserving live performances that would otherwise remain inaccessible. Du Pré's playing had an intensity that studio recordings could rarely match, and these BBC archives capture her at her most visceral and spontaneous."},
  {id:168,label:"EMI Classics",composers:["Antonín Dvořák"],artist:"Berliner Philharmoniker / Simon Rattle",title:"Dvořák: Tone Poems · The Water Goblin · The Noonday Witch · The Wood Dove · The Golden Spinning Wheel",description:"5 58019 2 0 · EMI Classics · rec. Philharmonie, Berlin, 2002",format:"Single CD",catNo:"5 58019 2 0",usedGBP:10.00,newGBP:null,notes:"EMI Classics. Rattle and the BPO in Dvořák's four symphonic poems based on dark Czech folk ballads by Karel Jaromír Erben — tales of goblins, witches, doves and spinning wheels. These are some of Dvořák's most atmospheric and colourful orchestral works, written in the 1890s after his return from America. Rattle brings Straussian opulence to their vivid storytelling."},
  {id:169,label:"MDG (Musikproduktion Dabringhaus und Grimm)",composers:["Antonín Dvořák"],artist:"Dortmund Philharmonic Orchestra / Jac van Steen",title:"Dvořák: Symphony No. 6 in D major Op. 60 · Concert Overtures Op. 91, 92 & 93",description:"MDG 601 1601-2 · In der Natur Op. 91 · Karneval Op. 92 · Othello Op. 93",format:"Single CD",catNo:"MDG 601 1601-2",usedGBP:12.00,newGBP:null,notes:"MDG (Musikproduktion Dabringhaus und Grimm) — a prestigious German audiophile label renowned for exceptional sound quality. Dvořák's Sixth Symphony (1880) is his most Brahmsian work, deeply influenced by Brahms's Second Symphony which he greatly admired. The three concert overtures — In der Natur, Karneval and Othello — form a connected trilogy exploring nature, life and its passions."},
  {id:170,label:"Harmonia Mundi",composers:["Antonín Dvořák"],artist:"Frank Braley (piano) · Ensemble Explorations · Roel Dieltiens (cello)",title:"Dvořák: Piano Quintet No. 2 in A major Op. 81 · Bagatelles Op. 47",description:"HMC 901880 · Harmonia Mundi",format:"Single CD",catNo:"HMC 901880",usedGBP:12.00,newGBP:null,notes:"Harmonia Mundi. Dvořák's Piano Quintet No. 2 is one of the most beloved works in the chamber repertoire — its Dumka slow movement and irresistible Furiant finale are endlessly appealing. Frank Braley and Ensemble Explorations bring a natural, singing quality to these works. The Bagatelles Op. 47 are charming miniatures originally for two violins, cello and harmonium."},
  {id:171,label:"Sony BMG",composers:["Antonín Dvořák"],artist:"Jan Vogler (cello) · New York Philharmonic Strings / David Robertson · Angelika Kirchschlager (soprano) · Helmut Deutsch (piano)",title:"The Secrets of Dvořák's Cello Concerto",description:"82876737162 · Sony BMG · documentary exploration of the Dvořák Cello Concerto",format:"Single CD",catNo:"82876737162",usedGBP:12.00,newGBP:null,notes:"Sony BMG. A documentary-style album in which Jan Vogler explores the history, background and hidden stories behind Dvořák's Cello Concerto — including the secret love story of Dvořák and Josefina Kounicová that inspired the concerto's most poignant moments. Vogler is joined by the NY Philharmonic Strings, David Robertson, and the soprano Angelika Kirchschlager. A fascinating alternative to a straight performance disc."},
  {id:172,label:"EMI Classics (2-disc)",composers:["Edward Elgar"],artist:"London Philharmonic Orchestra / Sir Adrian Boult",title:"Elgar: Symphonies Nos. 1 & 2 · In the South · Serenade for Strings · Introduction & Allegro",description:"3 82151 2 7 · EMI British Composers series · 2-disc set · rec. 1970s",format:"2-disc set",catNo:"3 82151 2 7",usedGBP:12.00,newGBP:null,notes:"EMI British Composers. Sir Adrian Boult (1889-1983) was the pre-eminent Elgar conductor of his generation — he knew Elgar personally and received his direct guidance on interpretation. His LPO recordings of the two symphonies are among the most authoritative on disc. The First Symphony was the most popular orchestral work in Britain at its premiere in 1908. Gramophone: 'Boult's Elgar remains irreplaceable — the authority and natural dignity are unmatched.'"},
  {id:173,label:"EMI Classics",composers:["Edward Elgar"],artist:"Natalie Clein (cello) · Royal Liverpool Philharmonic Orchestra / Vernon Handley",title:"Elgar: Cello Concerto in E minor Op. 85",description:"50999 5 01409 2 3 · rec. Liverpool",format:"Single CD",catNo:"50999 5 01409 2 3",usedGBP:10.00,newGBP:null,notes:"EMI Classics. Natalie Clein won BBC Young Musician of the Year in 1994 aged 16 and has since established herself as one of the finest British cellists of her generation. Vernon Handley was the great Elgar specialist of his era. The Elgar Cello Concerto (1919) is his most deeply personal work — autumnal, valedictory and introspective, famously neglected at its premiere before Jacqueline du Pré brought it immortality in the 1960s."},
  {id:174,label:"ECD (early CD release)",composers:["Edward Elgar"],artist:"Brodsky Quartet · John Bingham (piano)",title:"Elgar: String Quartet in E minor Op. 83 · Piano Quintet in A minor Op. 84",description:"ECD 84082 · early 1980s CD release",format:"Single CD",catNo:"ECD 84082",usedGBP:10.00,newGBP:null,notes:"Early CD release. Elgar's two late chamber masterpieces from 1918-19 — composed at his isolated Brinkwells cottage in Sussex during the First World War. Both works are deeply personal and elusive: the String Quartet with its veiled, questioning slow movement, and the Piano Quintet with its mysterious opening and brooding intensity. One of the most important coupling of late Elgar chamber music. The Brodsky Quartet are dedicated advocates of British chamber repertoire."},
  {id:175,label:"Naxos",composers:["Edward Elgar"],artist:"New Zealand Symphony Orchestra / James Judd",title:"Elgar: Orchestral Miniatures · Chanson de Matin · Chanson de Nuit · Three Bavarian Dances · Froissart Overture",description:"8.557577 · Naxos · rec. Wellington, 2003",format:"Single CD",catNo:"8.557577",usedGBP:6.00,newGBP:8.99,notes:"Naxos. A well-filled budget disc of Elgar's lighter orchestral pieces. The two Chansons (Morning and Night) are among his most charming miniatures. The Three Bavarian Dances were inspired by a holiday in Bavaria. The Froissart Overture was Elgar's first important orchestral work (1890), named after the medieval chronicler Froissart. James Judd was chief conductor of the NZSO from 1999 to 2007."},
  {id:176,label:"EMI",composers:["Edward Elgar","Ralph Vaughan Williams"],artist:"Sinfonia of London · Allegri String Quartet · New Philharmonia Orchestra / Sir John Barbirolli",title:"Barbirolli conducts English String Music · Elgar: Introduction & Allegro · Serenade · Elegy · Sospiri · Vaughan Williams: Tallis Fantasia · Greensleeves",description:"7 45737 2 · EMI · original CD pressing · rec. Kingsway Hall, London, May 1962",format:"Single CD",catNo:"7 45737 2",usedGBP:9.00,newGBP:null,notes:"EMI. The original CD pressing of one of the most celebrated recordings in English music. Same iconic 1962 Kingsway Hall performances as the GROTC reissue (CD 177, 5 67240 2 0). Gramophone Hall of Fame. Recorded in just two sessions in May 1962, this disc defined how English string music sounds on record for generations. The Tallis Fantasia (Temple Church, London, 17 May 1962) is particularly ethereal. Some collectors prefer the warmer sound of this original pressing."},
  {id:177,label:"EMI Classics (Great Recordings of the Century)",composers:["Edward Elgar","Ralph Vaughan Williams"],artist:"Sinfonia of London · Allegri String Quartet · New Philharmonia Orchestra / Sir John Barbirolli",title:"Elgar: Introduction & Allegro · Serenade · Elegy · Sospiri · Vaughan Williams: Fantasia on a Theme by Thomas Tallis · Fantasia on Greensleeves",description:"5 67240 2 0 · EMI Great Recordings of the Century · same recording as CD 176 (7 45737 2), remastered",format:"Single CD",catNo:"5 67240 2 0",usedGBP:12.00,newGBP:null,notes:"EMI Great Recordings of the Century. The GROTC reissue of the same iconic 1962 Barbirolli recording also held as CD 176 (7 45737 2). Gramophone Hall of Fame. The Introduction and Allegro — Elgar's greatest string writing — and the Vaughan Williams Tallis Fantasia are perhaps the two supreme masterpieces of English string music, performed here with a luminous authority that has never been surpassed. Barbirolli was the definitive conductor of both composers in the 20th century."},

let activeFilter='', activeComposer='', activeArtist='', sortMode=0, filtered=[...catalogue], ddType='', ddItems=[];
const sortModes=[{key:'id',label:'No.'},{key:'title',label:'A-Z'},{key:'usedGBP',label:'Price low'},{key:'usedGBPd',label:'Price high'}];

function fmt(n){return n!=null&&n>0?'£'+n.toFixed(2):null}

function getDeleted(){try{return JSON.parse(localStorage.getItem('cd_deleted')||'[]')}catch(e){return[]}}
function saveDeleted(arr){localStorage.setItem('cd_deleted',JSON.stringify(arr))}
function getCatNoStore(){try{return JSON.parse(localStorage.getItem('cd_catnos')||'{}')}catch(e){return{}}}
function getCatNo(id,defaultVal){const s=getCatNoStore();return s[id]!==undefined?s[id]:(defaultVal||'&#8212;')}

function lastNameFirst(name){
  const parts=name.trim().split(' ');
  if(parts.length<=1)return name;
  const last=parts[parts.length-1];
  const rest=parts.slice(0,-1).join(' ');
  return last+', '+rest;
}
function getComposerList(){
  const s=new Set();
  catalogue.forEach(cd=>cd.composers.forEach(c=>s.add(c)));
  return [...s]
    .map(c=>({display:lastNameFirst(c),value:c}))
    .sort((a,b)=>a.display.localeCompare(b.display));
}
function getArtistList(){
  const s=new Set();
  const del=getDeleted();
  catalogue.filter(cd=>!del.includes(cd.id)).forEach(cd=>{
    cd.artist.split(/\s*[·\/]\s*/).forEach(p=>{
      const clean=p.replace(/\s*\([^)]*\)/g,'').trim();
      if(clean.length>2) s.add(clean);
    });
  });
  return [...s].sort((a,b)=>a.localeCompare(b));
}
function toggleDropdown(type, e){
  e.stopPropagation();
  const panel=document.getElementById('dd-panel');
  if(ddType===type){closeDropdown();return;}
  ddType=type;
  ddItems=type==='composer'?getComposerList():getArtistList();
  const current=type==='composer'?activeComposer:activeArtist;
  const filterBar=document.querySelector('.filter-bar');
  const resultsBar=document.querySelector('.results-bar');
  const top=filterBar.getBoundingClientRect().bottom;
  panel.style.top=top+'px';
  document.getElementById('dd-list').innerHTML=
    '<div class="dd-item'+(current===''?' dd-selected':'')+'" onclick="selectDropdown(-1)">All '+(type==='composer'?'composers':'artists')+'</div>'+
    ddItems.map((item,i)=>{
      const val=item.value||item;
      const label=item.display||item;
      return '<div class="dd-item'+(current===val?' dd-selected':'')+'" onclick="selectDropdown('+i+')">'+label+'</div>';
    }).join('');
  panel.style.display='block';
}
function selectDropdown(idx){
  const raw=idx===-1?'':ddItems[idx];
  const val=raw&&raw.value!==undefined?raw.value:raw;
  const label=raw&&raw.display!==undefined?raw.display:raw;
  if(ddType==='composer'){
    activeComposer=val;
    document.getElementById('composer-label').textContent=label||'Composer';
    document.getElementById('composer-btn').classList.toggle('active',val!=='');
  } else {
    activeArtist=val;
    document.getElementById('artist-label').textContent=val.length>20?val.slice(0,18)+'…':val||'Artist';
    document.getElementById('artist-btn').classList.toggle('active',val!=='');
  }
  closeDropdown();
  search();
}
function closeDropdown(){
  document.getElementById('dd-panel').style.display='none';
  ddType='';
}

async function showTracks(id, e){
  e.stopPropagation();
  const cd=catalogue.find(c=>c.id===id);
  const panel=document.getElementById('tracks-panel-'+id);
  const btn=panel.previousElementSibling;

  // Toggle off if already showing
  if(panel.style.display==='block'){
    panel.style.display='none';
    btn.textContent='\u266B Show tracks on MusicBrainz';
    return;
  }

  const catNo=(getCatNoStore()[id]||cd.catNo||'').trim();
  if(!catNo||catNo==='—'){
    panel.style.display='block';
    panel.innerHTML='<div class="tracks-error">No catalogue number — cannot look up tracks.</div>';
    return;
  }

  panel.style.display='block';
  btn.textContent='Loading…';
  panel.innerHTML='<div class="tracks-loading">⏳ Searching MusicBrainz…</div>';

  try{
    // Step 1: search by catalogue number (quoted, then unquoted, then barcode)
    const catNoStripped=catNo.replace(/\s/g,'');
    let releases=[];

    const attempts=[
      'https://musicbrainz.org/ws/2/release/?query='+encodeURIComponent('catno:"'+catNo+'"')+'&limit=5&fmt=json',
      'https://musicbrainz.org/ws/2/release/?query='+encodeURIComponent('catno:'+catNoStripped)+'&limit=5&fmt=json',
      'https://musicbrainz.org/ws/2/release/?query='+encodeURIComponent('barcode:'+catNoStripped)+'&limit=5&fmt=json',
    ];

    for(const url of attempts){
      if(releases.length) break;
      try{
        const r=await fetch(url,{headers:{'Accept':'application/json'}});
        const d=await r.json();
        releases=(d.releases||[]);
        await new Promise(res=>setTimeout(res,1100));
      }catch(e){ break; }
    }

    if(!releases.length){
      panel.innerHTML='<div class="tracks-error">Not found on MusicBrainz for cat. no. '+catNo+'.</div>';
      btn.textContent='\u266B Show tracks on MusicBrainz';
      return;
    }

    // Step 2: fetch full release with tracks
    const mbid=releases[0].id;
    const r2=await fetch('https://musicbrainz.org/ws/2/release/'+mbid+'?inc=recordings&fmt=json',
      {headers:{'Accept':'application/json'}});
    const rel=await r2.json();
    const media=rel.media||[];

    let trackHtml='';
    for(let m=0;m<media.length;m++){
      if(media.length>1) trackHtml+='<div class="tracks-disc">Disc '+(m+1)+'</div>';
      (media[m].tracks||[]).forEach(t=>{
        const ms=t.length;
        const time=ms?Math.floor(ms/60000)+':'+String(Math.floor((ms%60000)/1000)).padStart(2,'0'):'';
        trackHtml+='<div class="track-item"><span class="track-num">'+t.number+'.</span><span class="track-title">'+t.title+'</span><span class="track-time">'+time+'</span></div>';
      });
    }
    panel.innerHTML=trackHtml||'<div class="tracks-error">No track data available.</div>';
    btn.textContent='\u266B Hide tracks';
  }catch(err){
    panel.innerHTML='<div class="tracks-error">Could not reach MusicBrainz — check your connection.</div>';
    btn.textContent='\u266B Show tracks on MusicBrainz';
  }
}
function toggle(id){const c=document.getElementById('card-'+id);if(c)c.classList.toggle('open')}
function clearSearch(){document.getElementById('search').value='';search()}
function toggleSort(){sortMode=(sortMode+1)%sortModes.length;document.getElementById('sort-label').textContent=sortModes[sortMode].label;search()}

function search(){
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  document.getElementById('clear-search').classList.toggle('visible',q.length>0);
  const deleted=getDeleted();
  const catnos=getCatNoStore();
  filtered=catalogue.filter(cd=>{
    if(deleted.includes(cd.id))return false;
    if(activeFilter==='favourites')return getFavourites().includes(cd.id);
    if(activeFilter==='duplicate'){
      return cd.duplicate===true&&cd.duplicateGroup&&
        catalogue.some(o=>o.id!==cd.id&&o.duplicateGroup===cd.duplicateGroup&&!deleted.includes(o.id));
    }
    if(activeFilter==='SACD'&&!(cd.format&&cd.format.includes('SACD')))return false;
    if(activeFilter&&activeFilter!=='SACD'&&cd.format!==activeFilter)return false;
    if(activeComposer&&!cd.composers.includes(activeComposer))return false;
    if(activeArtist&&!cd.artist.includes(activeArtist))return false;
    if(!q)return true;
    const liveCatNo=catnos[cd.id]||cd.catNo||'';
    const hay=[cd.title,cd.artist,cd.label,...cd.composers,cd.description||'',liveCatNo,cd.notes||''].join(' ').toLowerCase();
    return hay.includes(q);
  });
  const sm=sortModes[sortMode];
  filtered.sort((a,b)=>{
    if(sm.key==='id')return a.id-b.id;
    if(sm.key==='title')return a.title.localeCompare(b.title);
    if(sm.key==='usedGBP')return a.usedGBP-b.usedGBP;
    if(sm.key==='usedGBPd')return b.usedGBP-a.usedGBP;
    return 0;
  });
  render(q);
}

function render(q){
  const container=document.getElementById('cards');
  const noRes=document.getElementById('no-results');
  const notFound=document.getElementById('not-found-msg');
  const resCount=document.getElementById('results-count');
  const deleted=getDeleted();
  const total=catalogue.length-deleted.length;

  if(!filtered.length){
    container.innerHTML='';
    noRes.style.display='block';
    notFound.classList.add('visible');
  } else {
    noRes.style.display='none';
    notFound.classList.remove('visible');
  }

  const isFiltered=q||activeFilter||activeComposer||activeArtist;
  resCount.textContent=isFiltered?filtered.length+' of '+total:total+' CDs';
  

  container.innerHTML=filtered.map(cd=>{
    const isActiveDupe=cd.duplicate&&cd.duplicateGroup&&
      catalogue.some(o=>o.id!==cd.id&&o.duplicateGroup===cd.duplicateGroup&&!deleted.includes(o.id));
    const dupeBadge=isActiveDupe?'<span class="pill pill-dupe">&#9888; Duplicate</span>':'';
    const cardClass=isActiveDupe?' duplicate':'';
    const composers=cd.composers.map(c=>'<span class="pill pill-composer">'+c+'</span>').join('');
    const priceDisplay=cd.usedGBP>0?'&#163;'+cd.usedGBP.toFixed(2):'TBC';
    return '<div class="card'+cardClass+'" id="card-'+cd.id+'">'+
      '<div class="card-main" onclick="toggle('+cd.id+')">'+
        '<div class="card-num">'+cd.id+'</div>'+
        '<div class="card-body">'+
          '<div class="card-title">'+cd.title+'</div>'+
          '<div class="card-artist">'+cd.artist+'</div>'+
          '<div class="card-meta">'+composers+
            '<span class="pill pill-label">'+cd.label+'</span>'+
            '<span class="pill pill-format">'+cd.format+'</span>'+
            dupeBadge+
          '</div>'+
        '</div>'+
        '<div class="card-price">'+
          '<button class="star-btn'+(getFavourites().includes(cd.id)?' active':'')+'" onclick="toggleFavourite('+cd.id+',event)" title="Mark as favourite">&#9733;</button>'+
          '<div class="price-label">Used</div>'+
          '<div class="price-used">'+priceDisplay+'</div>'+
          '<div class="expand-icon">&#8964;</div>'+
        '</div>'+
      '</div>'+
      '<div class="card-detail">'+
        '<div class="detail-prices">'+
          '<div class="detail-price-item"><div class="detail-price-val">'+priceDisplay+'</div><div class="detail-price-lbl">Used (median)</div></div>'+
          (cd.newGBP?'<div class="detail-price-item"><div class="detail-price-val">&#163;'+cd.newGBP.toFixed(2)+'</div><div class="detail-price-lbl">New</div></div>':'')+
        '</div>'+
        '<div class="detail-section">'+
          '<div class="detail-label">Catalogue No.</div>'+
          '<div class="catno-row" id="catno-row-'+cd.id+'">'+
            '<span class="detail-text catno-val" id="catno-val-'+cd.id+'">'+getCatNo(cd.id,cd.catNo)+'</span>'+
            '<button class="catno-edit-btn" onclick="editCatNo('+cd.id+',event)">&#9999;&#65039;</button>'+
          '</div>'+
          '<div class="catno-edit-wrap" id="catno-edit-'+cd.id+'" style="display:none">'+
            '<input type="text" class="catno-input" id="catno-input-'+cd.id+'" placeholder="Enter catalogue number...">'+
            '<div style="display:flex;gap:0.5rem;margin-top:0.4rem">'+
              '<button class="btn-yes" onclick="saveCatNo('+cd.id+',event)">Save</button>'+
              '<button class="btn-no" onclick="cancelCatNo('+cd.id+',event)">Cancel</button>'+
            '</div>'+
          '</div>'+
        '</div>'+
        (cd.description?'<div class="detail-section"><div class="detail-label">Details</div><div class="detail-text">'+cd.description+'</div></div>':'')+
        '<div class="detail-section"><div class="detail-label">Notes</div><div class="detail-text">'+cd.notes+'</div></div>'+
        '<div class="detail-section">'+
          '<div class="detail-label">Clive\'s Notes</div>'+
          '<div class="clive-note-row">'+
            '<div class="clive-note-display" id="clive-note-val-'+cd.id+'">'+(getCliveNote(cd.id)||'<span class="clive-note-placeholder">Add your notes…</span>')+'</div>'+
            '<button class="catno-edit-btn" onclick="editCliveNote('+cd.id+',event)">&#9999;&#65039;</button>'+
          '</div>'+
          '<div id="clive-note-edit-'+cd.id+'" style="display:none">'+
            '<textarea class="clive-note-input" id="clive-note-input-'+cd.id+'" placeholder="Your personal notes about this CD…"></textarea>'+
            '<div style="display:flex;gap:0.5rem;margin-top:0.4rem">'+
              '<button class="btn-yes" onclick="saveCliveNote('+cd.id+',event)">Save</button>'+
              '<button class="btn-no" onclick="cancelCliveNote('+cd.id+',event)">Cancel</button>'+
            '</div>'+
          '</div>'+
        '</div>'+
        '<button class="tracks-btn" onclick="showTracks('+cd.id+',event)">&#127925; Show tracks on MusicBrainz</button>'+
        '<div class="tracks-panel" id="tracks-panel-'+cd.id+'"></div>'+
        '<button class="delete-btn" onclick="showConfirm('+cd.id+',event)">Remove from collection</button>'+
        '<div class="delete-confirm" id="confirm-'+cd.id+'">'+
          '<p>Remove this CD?<br><strong>'+cd.title+'</strong></p>'+
          '<div class="delete-confirm-btns">'+
            '<button class="btn-no" onclick="hideConfirm('+cd.id+',event)">Cancel</button>'+
            '<button class="btn-yes" onclick="deleteCD('+cd.id+')">Yes, remove it</button>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');

  updateStats();
}

function updateStats(){
  const deleted=getDeleted();
  // Footer always shows TOTAL collection (not filtered view)
  const all=catalogue.filter(c=>!deleted.includes(c.id));
  const total=all.length;
  const val=all.reduce((s,c)=>s+(c.usedGBP||0),0);
  const avg=total?val/total:0;
  const comps=new Set(all.flatMap(c=>c.composers)).size;
  document.getElementById('s-total').innerHTML=total;
  document.getElementById('s-value').innerHTML='£'+val.toFixed(2);
  document.getElementById('s-avg').innerHTML='£'+avg.toFixed(2);
  document.getElementById('s-comp').innerHTML=comps;
}

document.querySelectorAll('.filter-chip[data-filter]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const isActive=btn.classList.contains('active');
    const isAll=btn.dataset.filter==='';
    // Toggle off if already active (and not the All chip)
    const newFilter=(isActive&&!isAll)?'':btn.dataset.filter||'';
    document.querySelectorAll('.filter-chip[data-filter]').forEach(b=>b.classList.remove('active'));
    // Highlight All chip if resetting, otherwise highlight clicked chip
    if(newFilter===''){
      document.querySelector('.filter-chip[data-filter=""]').classList.add('active');
    } else {
      btn.classList.add('active');
    }
    activeFilter=newFilter;
    if(activeFilter===''){
      activeComposer=''; activeArtist='';
      document.getElementById('composer-label').textContent='Composer';
      document.getElementById('artist-label').textContent='Artist';
      document.getElementById('composer-btn').classList.remove('active');
      document.getElementById('artist-btn').classList.remove('active');
    }
    closeDropdown();
    search();
  });
});
document.addEventListener('click', closeDropdown);
document.getElementById('search').addEventListener('input',search);

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/CD-Catalogue/sw.js').catch(()=>{});
  });
}

updateRestoreBtn();
search();

// Keep filter bar stuck just below header
function setHeaderHeight(){
  const h = document.querySelector('header');
  if(h) document.documentElement.style.setProperty('--header-h', h.offsetHeight+'px');
}
setHeaderHeight();
window.addEventListener('resize', setHeaderHeight);
</script>
</body>
