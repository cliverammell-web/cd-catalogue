  {id:203,label:"Harmonia Mundi (2-disc)",composers:["George Frideric Handel"],artist:"Jeffrey Gall (Flavio) · Derek Lee Ragin · Lena Lootens · Bernarda Fink · Ensemble 415 / René Jacobs",title:"Handel: Flavio HWV 16",description:"HMC 901312.13 · Harmonia Mundi · 2-disc set",format:"2-disc set",catNo:"HMC 901312.13",usedGBP:15.00,newGBP:null,notes:"Harmonia Mundi. Flavio (1723) is one of Handel's wittiest and most ironic operas — a sophisticated comedy of honour and dishonour. This Ensemble 415 / René Jacobs recording is widely considered definitive. The cast is exceptional: Jeffrey Gall, Derek Lee Ragin and Bernarda Fink all at their peak. Gramophone: 'A fabulous recording — the singing and playing are of the highest order throughout.'"},
  {id:204,label:"Erato (2-disc)",composers:["George Frideric Handel"],artist:"Jacqueline Poulenard · Jennifer Smith · Nathalie Stutzmann · John Elwes · Les Musiciens du Louvre / Marc Minkowski",title:"Handel: Il Trionfo del Tempo e del Disinganno HWV 46a",description:"2292-45351-2 · Erato · 2-disc set · rec. 1990",format:"2-disc set",catNo:"2292-45351-2",usedGBP:14.00,newGBP:null,notes:"Erato. Handel's earliest surviving oratorio, composed in Rome in 1707 at just 22 years old — an allegorical work in which Beauty, Pleasure, Time and Disillusionment argue over the soul. Minkowski and his Les Musiciens du Louvre bring characteristically incisive rhythms and stylistic authority. Nathalie Stutzmann's contralto as Disillusionment is particularly memorable. A fascinating early Handel work rarely heard in concert."},
  {id:205,label:"Philips Digital Classics (3-disc)",composers:["George Frideric Handel"],artist:"Nigel Robson (Jephtha) · Lynne Dawson · Anne Sofie von Otter · Michael Chance · Stephen Varcoe · Ruth Holton · Monteverdi Choir · English Baroque Soloists / John Eliot Gardiner",title:"Handel: Jephtha HWV 70",description:"422 351-2 · Philips Digital Classics · 3-disc set · rec. 1988",format:"3-disc set",catNo:"422 351-2",usedGBP:16.00,newGBP:null,notes:"Philips. Handel's final oratorio (1751), composed as he was losing his sight — his pencilled remark in the manuscript reads: 'reached here on 13 Febr. 1751, unable to continue owing to weakening of the sight of my left eye.' One of the most moving works in the choral repertoire. Gardiner's account with the Monteverdi Choir is definitive — Gramophone Award winner. Von Otter as Storge and Chance as Hamor are outstanding."},
  {id:206,label:"Virgin Classics (3-disc)",composers:["George Frideric Handel"],artist:"Joyce DiDonato · Patricia Ciofi · Maite Beaumont · Dominique Labelle · Laura Cherici · Zachary Stains · Carlo Lepore · Il Complesso Barocco / Alan Curtis",title:"Handel: Radamisto HWV 12a",description:"7243 5 45673 2 2 · Virgin Classics · 3-disc set",format:"3-disc set",catNo:"7243 5 45673 2 2",usedGBP:18.00,newGBP:null,notes:"Virgin Classics. A significant recording of one of Handel's finest early operas (1720), notable for the early appearance of Joyce DiDonato, now one of the world's great mezzo-sopranos. Radamisto marked Handel's triumphant debut at the newly opened King's Theatre in the Haymarket in 1720. Alan Curtis and Il Complesso Barocco were among the most adventurous advocates for obscure Handel opera."},
  {id:207,label:"Decca (2-disc)",composers:["George Frideric Handel"],artist:"Emma Kirkby · Patrizia Kwella · Carolyn Watkinson · Ian Partridge · David Thomas · Academy of Ancient Music / Christopher Hogwood",title:"Handel: La Resurrezione HWV 47",description:"421 132-2 · Decca · 2-disc set · rec. 1986",format:"2-disc set",catNo:"421 132-2",usedGBP:12.00,newGBP:null,notes:"Decca. La Resurrezione (1708) is the oratorio Handel composed in Rome for the Marquis Ruspoli — a vivid dramatic work depicting the Resurrection through the perspectives of Mary Magdalene, the Angel, and Lucifer. Hogwood and his AAM team bring clarity and period authenticity. Kirkby and Kwella are in superb form, and Ian Partridge's tenor adds aristocratic refinement."},
  {id:208,label:"Philips Digital Classics (2-disc)",composers:["George Frideric Handel"],artist:"Carolyn Watkinson · Nancy Argenta · Barbara Hendricks · Anthony Rolfe Johnson · Nicola Walker Smith · Monteverdi Choir · English Baroque Soloists / John Eliot Gardiner",title:"Handel: Solomon HWV 67",description:"412 612-2 · Philips Digital Classics · 2-disc set · rec. 1984",format:"2-disc set",catNo:"412 612-2",usedGBP:16.00,newGBP:null,notes:"Philips. One of the most celebrated Handel recordings ever made. Solomon (1748) is widely considered Handel's choral masterpiece — the double-chorus writing in particular has no equal in the entire Baroque repertoire. Gardiner's 1984 recording with the Monteverdi Choir and English Baroque Soloists is a towering achievement: Barbara Hendricks and Nancy Argenta as the two queens, Carolyn Watkinson as Solomon. Gramophone: 'Quite simply a classic recording.'"},
  {id:218,label:"Chandos",composers:["George Frideric Handel"],artist:"Patrizia Kwella · James Bowman · Ian Partridge · Michael George · The Sixteen / Harry Christophers",title:"Handel: Chandos Anthems Vol. 3",description:"CHAN 0505 · Chandos · The Sixteen Edition",format:"Single CD",catNo:"CHAN 0505",usedGBP:10.00,newGBP:null,notes:"Chandos. Part of The Sixteen's complete Chandos Anthems cycle with Harry Christophers. Handel composed the 11 Chandos Anthems in 1717-18 for James Brydges, Duke of Chandos, at his estate Cannons in Middlesex. They are among the finest examples of English Baroque choral writing. The Sixteen's recordings are definitive in this repertoire."},
  {id:219,label:"Chandos",composers:["George Frideric Handel"],artist:"Lynne Dawson · Ian Partridge · The Sixteen / Harry Christophers",title:"Handel: Chandos Anthems Vol. 4 · Nos. 10 & 11",description:"CHAN 0509 · Chandos · The Sixteen Edition",format:"Single CD",catNo:"CHAN 0509",usedGBP:10.00,newGBP:null,notes:"Chandos. The final volume of The Sixteen's Chandos Anthems cycle, containing Anthems Nos. 10 (The Lord is my light) and 11 (Let God arise). The 11th anthem, 'Let God arise,' is one of the most jubilant and ceremonial of the set — a fitting conclusion to the cycle."},
  {id:220,label:"Chandos",composers:["George Frideric Handel"],artist:"Lynne Dawson · Ian Partridge · Michael George · The Sixteen / Harry Christophers",title:"Handel: Chandos Anthems Vol. 1",description:"CHAN 8600 · Chandos · earlier Chandos pressing",format:"Single CD",catNo:"CHAN 8600",usedGBP:8.00,newGBP:null,notes:"Chandos. The first volume of The Sixteen's Chandos Anthems cycle in the earlier CHAN 8xxx catalogue series. The Chandos Anthems were written for a relatively small ensemble — solo voices, small choir and an intimate instrumental group — which The Sixteen reproduce with great authenticity and warmth."},
  {id:221,label:"Chandos",composers:["George Frideric Handel"],artist:"Lynne Dawson · Ian Partridge · The Sixteen / Harry Christophers",title:"Handel: Chandos Anthems Vol. 2",description:"CHAN 0504 · Chandos · The Sixteen Edition",format:"Single CD",catNo:"CHAN 0504",usedGBP:10.00,newGBP:null,notes:"Chandos. Volume 2 of The Sixteen's complete Chandos Anthems cycle. Harry Christophers and The Sixteen have been among the foremost advocates for Handel's choral music over four decades — their intimate understanding of the Baroque style brings these anthems fully to life."},
  {id:222,label:"Coro",composers:["George Frideric Handel"],artist:"Sarah Connolly (mezzo-soprano) · The Sixteen · Symphony of Harmony and Invention / Harry Christophers",title:"Heroes and Heroines · Handel Operatic Arias",description:"COR16925 · Coro · The Sixteen Edition",format:"Single CD",catNo:"COR16925",usedGBP:12.00,newGBP:null,notes:"Coro (The Sixteen's own label). Sarah Connolly is one of Britain's finest mezzo-sopranos, with a particular affinity for Handel. This disc of operatic arias showcases the dramatic range of Handel's writing for the voice — from heroic fury to tender lament. Christophers and the Symphony of Harmony and Invention provide the ideal period-instrument backdrop."},
  {id:223,label:"Coro",composers:["George Frideric Handel"],artist:"Nancy Argenta (soprano) · Ian Partridge (tenor) · Michael George (bass) · The Sixteen · Symphony of Harmony and Invention / Harry Christophers",title:"Handel: Alexander's Feast HWV 75",description:"COR16028 · Coro · Classic FM recommended",format:"Single CD",catNo:"COR16028",usedGBP:12.00,newGBP:null,notes:"Coro. Classic FM recommendation. Alexander's Feast (1736) is Handel's setting of Dryden's famous ode on the power of music — a work he regarded among his finest. It was a huge success at its premiere, running for over three hours. The Sixteen bring their characteristic clarity and stylistic purity to this magnificent occasional ode, with a distinguished trio of soloists."},
  {id:224,label:"Coro Live",composers:["George Frideric Handel"],artist:"Elin Manahan Thomas (soprano) · Principals from The Sixteen",title:"Fedel e Costante · Handel Italian Cantatas",description:"COR16045 · Coro Live · live recording",format:"Single CD",catNo:"COR16045",usedGBP:10.00,newGBP:null,notes:"Coro Live. Elin Manahan Thomas, the Welsh soprano, with principals from The Sixteen in a live recital of Handel's Italian cantatas. Handel composed over 100 Italian cantatas during his years in Italy (1706-10) — exquisite miniatures that combine Baroque craftsmanship with extraordinary emotional expressiveness. 'Fedel e Costante' (Faithful and Constant) gives the disc its poetic title."},
  {id:225,label:"Archiv Produktion",composers:["George Frideric Handel"],artist:"Choir and Orchestra · Simon Preston",title:"Handel: Dixit Dominus HWV 232 · Nisi Dominus HWV 238 · Salve Regina HWV 241",description:"435 594-2 · Archiv Produktion",format:"Single CD",catNo:"435 594-2",usedGBP:10.00,newGBP:null,notes:"Archiv. Three of Handel's greatest Latin choral works, composed during his years in Italy. The Dixit Dominus (1707) is a blazing, virtuosic setting of Psalm 110, written at only 22 years old — astonishing in its drama and technical ambition. The Nisi Dominus and Salve Regina are more intimate but equally beautiful. Simon Preston was one of the most distinguished British choral conductors of his generation."},
  {id:226,label:"Decca (2-disc)",composers:["George Frideric Handel"],artist:"King's College Choir, Cambridge / Sir David Willcocks",title:"Handel from King's · Chandos Anthems Nos. 2, 5a, 6, 9, 10 & 11",description:"458 389-2 · Decca · 2-disc set · classic King's College recordings",format:"2-disc set",catNo:"458 389-2",usedGBP:12.00,newGBP:null,notes:"Decca. A selection of Chandos Anthems in the legendary King's College tradition under Sir David Willcocks, who transformed King's into one of the world's great choral institutions. These recordings from the 1960s-70s have a timeless quality — the King's acoustic and the unique treble sound are perfectly suited to Handel's intimate, devotional style. A classic of the catalogue."},
  {id:227,label:"Archiv Produktion",composers:["George Frideric Handel"],artist:"Jennifer Smith (soprano) · John Elwes (tenor) · The English Concert / Trevor Pinnock",title:"Handel: Italian Cantatas",description:"419 736-2 · Archiv Produktion · rec. 1985",format:"Single CD",catNo:"419 736-2",usedGBP:10.00,newGBP:null,notes:"Archiv. Pinnock and The English Concert in a selection of Handel's Italian cantatas — the intimate chamber works he composed in Italy that launched his international career. Jennifer Smith and John Elwes are perfectly matched soloists. These cantatas show Handel at his most personal and emotionally direct, away from the grand public gestures of his operas and oratorios."},
  {id:228,label:"Deutsche Grammophon (SACD)",composers:["George Frideric Handel"],artist:"Renée Fleming (soprano) · Orchestra of the Age of Enlightenment / Harry Bicket",title:"Renée Fleming · Handel",description:"475 6186 · DG · SACD hybrid · rec. 2004",format:"SACD",catNo:"475 6186",usedGBP:14.00,newGBP:null,notes:"Deutsche Grammophon SACD. Renée Fleming, one of the world's most celebrated sopranos, in a disc of Handel operatic arias with the Orchestra of the Age of Enlightenment and Harry Bicket. Fleming brings her famously luminous tone and technical command to Handel's most expressive operatic writing. The SACD format captures her voice with exceptional clarity and warmth."},
  {id:229,label:"Archiv Produktion",composers:["George Frideric Handel"],artist:"Felicity Lott (soprano) · Anthony Rolfe Johnson (tenor) · The English Concert and Choir / Trevor Pinnock",title:"Handel: Ode for St Cecilia's Day HWV 76",description:"474 549-2 · Archiv Produktion",format:"Single CD",catNo:"474 549-2",usedGBP:12.00,newGBP:null,notes:"Archiv. Handel's magnificent setting of Dryden's Ode to St Cecilia (1739), written at the same time as his L'Allegro. Each stanza celebrates a different instrument — the organ, the violin, the flute, the trumpet, the drum — making it one of the most inventive and varied of all his occasional works. Felicity Lott and Anthony Rolfe Johnson are ideal soloists, and Pinnock's English Concert is at its finest."},
  {id:209,label:"EMI Classics (Double Forte, 2-disc)",composers:["George Frideric Handel"],artist:"Simon Preston (organ) · Menuhin Festival Orchestra / Yehudi Menuhin",title:"Handel: Organ Concertos",description:"7243 5 72676 2 5 · EMI Double Forte · 2-disc budget set",format:"2-disc set",catNo:"7243 5 72676 2 5",usedGBP:8.00,newGBP:null,sealed:true,notes:"EMI Double Forte budget 2-disc set. Simon Preston, one of the foremost British organists of his generation, recorded Handel's organ concertos with Yehudi Menuhin and the Menuhin Festival Orchestra. Handel effectively invented the organ concerto as a form, performing them himself between the acts of his oratorios to entertain the audience."},
  {id:210,label:"Erato",composers:["George Frideric Handel"],artist:"Ton Koopman (organ) · Amsterdam Baroque Orchestra",title:"Handel: Organ Concertos",description:"ECD 88136 · Erato",format:"Single CD",catNo:"ECD 88136",usedGBP:10.00,newGBP:null,notes:"Erato. Ton Koopman, one of the great Dutch organist-conductors, leads his Amsterdam Baroque Orchestra in Handel's organ concertos. Koopman was a pupil of Gustav Leonhardt and is among the most distinguished practitioners of the period-instrument movement. His registrations on the organ reflect 18th-century practice with great authenticity."},
  {id:211,label:"Archiv Produktion",composers:["George Frideric Handel"],artist:"Simon Preston (organ) · The English Concert / Trevor Pinnock",title:"Handel: Organ Concertos Op. 4 HWV 289-294",description:"413 465-2 · Archiv Produktion · rec. 1983",format:"Single CD",catNo:"413 465-2",usedGBP:10.00,newGBP:null,notes:"Archiv. Simon Preston and Pinnock's English Concert in Handel's six Op. 4 organ concertos (1738) — the first set Handel published, composed for performance between the acts of his oratorios. Gramophone: 'A landmark period-instrument recording.' Preston plays a reconstruction of an 18th-century chamber organ perfectly suited to these intimate concertos."},
  {id:212,label:"Archiv Produktion",composers:["George Frideric Handel"],artist:"Simon Preston (organ) · The English Concert / Trevor Pinnock",title:"Handel: Organ Concertos Op. 7 HWV 306-311",description:"413 468-2 · Archiv Produktion · rec. 1983",format:"Single CD",catNo:"413 468-2",usedGBP:10.00,newGBP:null,notes:"Archiv. The companion disc to Op. 4 (CD 211) — the six Op. 7 concertos (1740), published posthumously. Together the Op. 4 and Op. 7 sets represent Handel's complete numbered organ concertos. Preston and Pinnock are an ideal partnership: Preston's scholarly approach and Pinnock's rhythmic vitality make these definitive period-instrument recordings."},
  {id:213,label:"Sony Classical",composers:["George Frideric Handel","Domenico Scarlatti"],artist:"Murray Perahia (piano)",title:"Perahia plays Handel and Scarlatti",description:"SK 62785 · Sony Classical · SBM Super Bit Mastering",format:"Single CD",catNo:"SK 62785",usedGBP:12.00,newGBP:null,notes:"Sony Classical with SBM Super Bit Mastering. Perahia in a recital of Baroque keyboard music — Handel suites and Scarlatti sonatas on the modern piano. Perahia has always been drawn to the Baroque, approaching it on the piano with the same stylistic rigour as he brings to Mozart. Domenico Scarlatti (1685-1757) wrote over 500 keyboard sonatas of dazzling invention and wit — born the same year as Handel and Bach."},
  {id:214,label:"Regis Records",composers:["George Frideric Handel"],artist:"Sarah Francis (oboe) · London Harpsichord Ensemble",title:"Handel: Oboe Concertos & Sonatas",description:"RRC1106 · Regis Records · Penguin CD Guide recommended",format:"Single CD",catNo:"RRC1106",usedGBP:7.00,newGBP:8.99,notes:"Regis Records. Penguin CD Guide recommended. Sarah Francis is a distinguished British oboist who championed Handel's oboe music over several decades. The London Harpsichord Ensemble provide an intimate period-style accompaniment. Regis Records is a UK budget label that reissued many fine recordings at bargain prices. An ideal introduction to Handel's charming oboe concertos."},
  {id:215,label:"Decca (L'Oiseau-Lyre)",composers:["George Frideric Handel"],artist:"Academy of Ancient Music / Christopher Hogwood",title:"Handel: Water Music Suite · Music for the Royal Fireworks",description:"400 059-2 · Decca L'Oiseau-Lyre · very early CD pressing · rec. 1978-79",format:"Single CD",catNo:"400 059-2",usedGBP:10.00,newGBP:null,notes:"Decca L'Oiseau-Lyre. One of the earliest Decca CD releases — the 400 series dating from 1983. Hogwood and the AAM recorded the Water Music and Fireworks in 1978-79, and these period-instrument performances were pioneering at the time. The Music for the Royal Fireworks was originally performed outdoors with a huge wind band in 1749; Hogwood uses Handel's original outdoor scoring."},
  {id:216,label:"Linn Records",composers:["George Frideric Handel"],artist:"Pamela Thorby (recorder) · Richard Egarr (harpsichord/organ)",title:"Handel: Recorder Sonatas",description:"CKD 223 · Linn Records",format:"Single CD",catNo:"CKD 223",usedGBP:14.00,newGBP:null,notes:"Linn Records. Pamela Thorby is one of the world's leading recorder players, and Richard Egarr one of the most distinguished harpsichordists of his generation. Together they bring exceptional musicianship to Handel's recorder sonatas — intimate, expressive works that lie at the heart of the Baroque chamber repertoire. Linn Records are renowned for their audiophile-quality recordings."},
  {id:217,label:"Testament",composers:["Edward Elgar","J.S. Bach"],artist:"Ida Haendel (violin) · London Philharmonic Orchestra / Sir Adrian Boult",title:"Elgar: Violin Concerto in B minor Op. 61 · Bach: Chaconne BWV 1004",description:"SBT 1146 · Testament Records · historic recording",format:"Single CD",catNo:"SBT 1146",usedGBP:14.00,newGBP:null,notes:"Testament Records. Ida Haendel (1928-2020) — born in Poland, later British — was one of the greatest violinists of the 20th century, widely regarded as under-recorded relative to her stature. Her surname 'Haendel' was entirely coincidental to the composer. This Testament reissue pairs the Elgar Violin Concerto with Boult (one of the Elgar specialists par excellence) with the Bach Chaconne. A precious document of a legendary artist."},
  {id:230,label:"Deutsche Grammophon",composers:["George Frideric Handel"],artist:"Anne Sofie von Otter (mezzo-soprano) · Musica Antiqua Köln / Reinhard Goebel",title:"Handel: Marian Cantatas & Arias",description:"439 866-2 · DG · cantatas composed in Rome, 1706-07",format:"Single CD",catNo:"439 866-2",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. Handel composed these Latin cantatas in praise of the Virgin Mary during his time in Rome (1706-07), for the cultivated circle of Cardinal Ottoboni. Von Otter's warm mezzo and Musica Antiqua Köln's brilliant period playing make this one of the most distinguished discs of Handel's Italian period. Reinhard Goebel founded Musica Antiqua Köln in 1973 and was one of the most influential figures in the period-instrument movement."},
  {id:231,label:"Hyperion (2-disc)",composers:["George Frideric Handel"],artist:"Emma Kirkby · Catherine Denley · James Bowman · Michael George · Choir of New College Oxford · The King's Consort / Robert King",title:"Handel: Judas Maccabaeus HWV 63",description:"CDA66641/2 · Hyperion · 2-disc set",format:"2-disc set",catNo:"CDA66641/2",usedGBP:16.00,newGBP:null,notes:"Hyperion. Judas Maccabaeus (1746) was one of Handel's most popular oratorios in his own lifetime — a celebration of Jewish military heroism that resonated strongly with British patriotic feeling. Kirkby, Bowman and Denley are in superb form. Robert King and The King's Consort have been tireless advocates for Handel's choral music. The chorus 'See the conqu'ring hero comes' became one of the most famous tunes of the 18th century."},
  {id:232,label:"EMI Reflexe (2-disc)",composers:["George Frideric Handel"],artist:"Jill Feldman · Emma Kirkby · Emily Everall · Margaret Cable · Joseph Cornwell · David Thomas · Taverner Choir · Taverner Players / Andrew Parrott",title:"Handel: Carmelite Vespers (1707)",description:"CDS 7 49749 2 · EMI Reflexe · 2-disc set · rec. 1984",format:"2-disc set",catNo:"CDS 7 49749 2",usedGBP:14.00,newGBP:null,notes:"EMI Reflexe. Andrew Parrott's reconstruction of the Vesper music Handel composed in Rome in 1707 for the feast of Our Lady of Mount Carmel, drawing on music from Handel's Italian cantatas and sacred works. A fascinating scholarly project bringing to life music that had never been heard in this form before. Kirkby and Feldman head a distinguished cast; Parrott and the Taverner Players are among the finest period-instrument advocates."},
  {id:233,label:"Archiv Produktion",composers:["Joseph Haydn"],artist:"The English Concert / Trevor Pinnock",title:"Haydn: The 'Sturm und Drang' Symphonies Vol. 5 'Trauer'",description:"429 756-2 · Archiv Produktion · includes Symphony No. 44 'Trauer'",format:"Single CD",catNo:"429 756-2",usedGBP:10.00,newGBP:null,notes:"Archiv. Part of Pinnock and The English Concert's acclaimed Haydn Sturm und Drang symphony series. The 'Sturm und Drang' (Storm and Stress) symphonies — composed around 1768-72 — are remarkable works of emotional intensity that broke sharply from the elegant conventions of the time. Symphony No. 44 'Trauer' (Mourning) is among the most deeply felt, its slow movement so beautiful that Haydn reportedly asked for it to be played at his own funeral."},
  {id:234,label:"EMI",composers:["Joseph Haydn"],artist:"English Chamber Orchestra / Jeffrey Tate",title:"Haydn: Symphonies Nos. 99 in E-flat major & 101 in D major 'The Clock'",description:"CDC 7 49634 2 · EMI",format:"Single CD",catNo:"CDC 7 49634 2",usedGBP:9.00,newGBP:null,notes:"EMI. Two of Haydn's twelve 'London' Symphonies composed for his triumphant visits to England in 1791-92 and 1794-95. Symphony No. 101 'The Clock' takes its nickname from the tick-tock accompaniment in the slow movement — one of the most instantly recognisable openings in all Haydn. Jeffrey Tate and the ECO bring elegance and wit to these quintessential late Haydn masterpieces."},
  {id:235,label:"Naxos",composers:["Joseph Haydn"],artist:"Viktória Loukiánetz (soprano) · Gabriele Sima (contralto) · Kurt Azesberger (tenor) · Robert Holl (bass) · Hungarian Radio and Television Chorus · Nicolaus Esterőzy Sinfonia / Béla Drahos",title:"Haydn: Nelson Mass · Kleine Orgelmesse (Little Organ Mass)",description:"8.554416 · Naxos",format:"Single CD",catNo:"8.554416",usedGBP:6.00,newGBP:8.99,notes:"Naxos. The Nelson Mass (Missa in Angustiis, 1798) was composed during the Battle of the Nile — hence its nickname, though Haydn had no knowledge of Nelson's victory at the time of writing. It is among his most dramatic and intense sacred works, driven by a sense of urgency and power that reflects the turbulent times. The Little Organ Mass makes an ideal companion piece."},
  {id:236,label:"Naxos",composers:["Joseph Haydn"],artist:"Maria Kliegel (cello) · Cologne Chamber Orchestra / Helmut Müller-Brühl",title:"Haydn: Cello Concertos · Hob. VIIb:1, 2 & 4",description:"8.555041 · Naxos",format:"Single CD",catNo:"8.555041",usedGBP:6.00,newGBP:8.99,notes:"Naxos. Haydn's two great cello concertos — in C major (rediscovered in Prague in 1961, having been lost for nearly 200 years) and D major — are among the finest in the entire cello repertoire. Maria Kliegel brings her assured technique and warm tone to these works. An exceptional budget disc coupling three Haydn cello concertos."},
  {id:237,label:"Vox Box (2-disc)",composers:["Joseph Haydn"],artist:"Helen Donath (soprano/Gabriel/Eva) · Adalbert Kraus (tenor/Uriel) · Kurt Widmer (bass/Raphael/Adam) · Süddeutscher Madrigalchor Stuttgart · Orchester der Ludwigsburger Festspiele / Wolfgang Gönnenwein",title:"Haydn: The Creation (Die Schöpfung) Hob. XXI:2",description:"231558 · 2-disc set · original German pressing; reissued as Vox Box CDX-5025",format:"2-disc set",catNo:"231558",usedGBP:12.00,newGBP:null,notes:"Vox Box reissue of an original German pressing. Haydn's greatest oratorio, composed in 1798 when he was 65, directly inspired by hearing Handel's Messiah in London. The Creation depicts the six days of creation based on Genesis and Milton's Paradise Lost, opening with one of the most remarkable passages in all music — the representation of Chaos that suddenly bursts into blazing C major on the word 'Light.' Gönnenwein was closely associated with the Ludwigsburg Festival and this is one of the most warmly regarded accounts."},
  {id:238,label:"RCA Victor Red Seal",composers:["Joseph Haydn"],artist:"Steven Isserlis (cello) · Orchestra of the Age of Enlightenment / Roger Norrington",title:"Haydn: Cello Concertos Hob. VIIb:1 & 2",description:"09026 68578 2 · RCA Victor Red Seal",format:"Single CD",catNo:"09026 68578 2",usedGBP:12.00,newGBP:null,notes:"RCA Victor. Steven Isserlis is one of Britain's most distinguished cellists, with a strongly individual musical personality and a particular commitment to period-informed playing on the modern cello. Roger Norrington and the Orchestra of the Age of Enlightenment bring their characteristic historical awareness to these concertos. A thoughtful and distinctively characterised pairing."},
  {id:239,label:"Pentatone (SACD)",composers:["Joseph Haydn"],artist:"Gordan Nikolić (violin/director) · Netherlands Chamber Orchestra",title:"Haydn: Sinfonia Concertante Hob. I:105 · Symphony No. 100 'Military' · L'Isola disabitata Overture",description:"PTC 5186 300 · Pentatone SACD hybrid multichannel",format:"SACD",catNo:"PTC 5186 300",usedGBP:14.00,newGBP:null,notes:"Pentatone SACD. Gordan Nikolić, the distinguished Serbian violinist, directs the Netherlands Chamber Orchestra from the violin in a disc of late Haydn. The Symphony No. 100 'Military' takes its nickname from the use of Turkish percussion (cymbals, triangle, bass drum) that caused a sensation at its London premiere in 1794. The Sinfonia Concertante is one of Haydn's most charming occasional works. SACD hybrid multichannel format."},
  {id:240,label:"Naxos",composers:["Joseph Haydn"],artist:"Kodály Quartet",title:"Haydn: String Quartets Op. 76 · No. 1 · No. 2 'Fifths' · No. 3 'Emperor'",description:"8.550314 · Naxos",format:"Single CD",catNo:"8.550314",usedGBP:6.00,newGBP:8.99,notes:"Naxos. Three of Haydn's six Op. 76 quartets (1797), among the greatest works in the string quartet repertoire. The 'Emperor' Quartet takes its name from the slow movement, a set of variations on the hymn Haydn wrote for Emperor Franz II — later adapted as the German national anthem. The 'Fifths' Quartet is named for the falling-fifth motif that opens it. The Kodály Quartet were long-standing Naxos advocates for Haydn's chamber music."},
  {id:241,label:"Philips",composers:["Joseph Haydn"],artist:"Alfred Brendel (piano)",title:"Haydn: Piano Sonatas Hob. XVI: 49, 50 & 52",description:"411 045-2 · Philips",format:"Single CD",catNo:"411 045-2",usedGBP:10.00,newGBP:null,notes:"Philips. Alfred Brendel's Haydn is among the most distinguished on disc — witty, refined and architecturally immaculate. These three late sonatas (including the great E-flat major Hob. XVI:52, arguably the finest of all) show Haydn's keyboard writing at its most sophisticated. Brendel approaches Haydn with the same intellectual rigour he brings to Beethoven and Schubert, illuminating the music's structural ingenuity without ever sacrificing its charm."},
  {id:242,label:"MDG Gold (3-disc box)",composers:["George Frideric Handel"],artist:"Simone Kermes · John Elwes · Claudia Jentjens · Matthew Koch · Kölner Kammerchor · Collegium Cartusianum / Peter Neumann",title:"Handel: Saul HWV 53",description:"332 0801-2 · MDG Gold · 3-disc box · An Oratorio or Sacred Drama (1739)",format:"3-disc set",catNo:"332 0801-2",usedGBP:18.00,newGBP:null,notes:"MDG Gold. Saul (1739) is one of Handel's most dramatic and psychologically complex oratorios — the story of the jealous, maddened king of Israel and the young David. The opening 'Dead March' is one of the most famous pieces of music he ever wrote. Simone Kermes is a sparkling presence. Peter Neumann and the Cologne forces bring genuine theatrical intensity to this three-hour masterpiece. MDG Gold is the premium audiophile series of Musikproduktion Dabringhaus und Grimm."},
  {id:243,label:"Coro",composers:["George Frideric Handel"],artist:"Nancy Argenta · Michael Chance · Mary Plazas · Ivan Randle · Michael George · The Sixteen / Harry Christophers",title:"Handel: Esther HWV 50",description:"COR16019 · Coro · The Sixteen Edition",format:"Single CD",catNo:"COR16019",usedGBP:12.00,newGBP:null,notes:"Coro. Esther was Handel's first English oratorio — the work that began the genre he would make entirely his own. Christophers and The Sixteen are ideal advocates, with a distinguished cast including Nancy Argenta and Michael Chance. The Sixteen's series of Handel choral works on their own Coro label represents one of the most comprehensive surveys of his vocal music in the catalogue."},
  {id:244,label:"Avie Records",composers:["George Frideric Handel"],artist:"The Brook Street Band",title:"Handel: Seven Trio Sonatas for Two Violins, Harpsichord and Violoncello Op. 5",description:"AV2068 · Avie Records",format:"Single CD",catNo:"AV2068",usedGBP:12.00,newGBP:null,notes:"Avie Records. The Brook Street Band is a chamber ensemble named after the London street where Handel lived for 36 years. They specialise in his chamber music, bringing an intimate knowledge of his style to these charming Trio Sonatas Op. 5 (1739). These seven sonatas are among Handel's most elegant and personal chamber works, combining Italianate melody with German counterpoint."},
  {id:245,label:"Nimbus Records",composers:["Joseph Haydn"],artist:"Austro-Hungarian Haydn Orchestra / Adam Fischer",title:"Haydn: Symphonies Nos. 6 'Le Matin', 7 'Le Midi', 8 'Le Soir'",description:"NI 5240 · Nimbus Records · part of Adam Fischer's complete Haydn symphony cycle",format:"Single CD",catNo:"NI 5240",usedGBP:10.00,newGBP:null,notes:"Nimbus. Adam Fischer's monumental complete Haydn symphony cycle on Nimbus (32 volumes) was one of the great recording projects of the 1990s. The three 'Times of Day' symphonies (1761) were among the first Haydn wrote for Prince Esterhazy and are charmingly programmatic — depicting morning, noon and evening with solo passages that show off the court orchestra's best players."},
  {id:246,label:"Philips (Duo, 2-disc)",composers:["Joseph Haydn"],artist:"Royal Concertgebouw Orchestra / Sir Colin Davis",title:"Haydn: The London Symphonies Nos. 93, 94, 97, 99, 100 & 101",description:"442 614-2 · Philips Classics Duo · 2-disc set · 150 min.",format:"2-disc set",catNo:"442 614-2",usedGBP:10.00,newGBP:null,notes:"Philips Duo. Six of Haydn's twelve London Symphonies in a generous 2-disc budget set, with the Concertgebouw and Colin Davis. These are the symphonies Haydn composed for his two triumphant London visits (1791-92 and 1794-95), when he was treated as the greatest living composer. Davis and the Concertgebouw bring characteristic warmth and authority. Includes the 'Surprise' (94) and 'Clock' (101)."},
  {id:247,label:"Archiv Produktion",composers:["Joseph Haydn"],artist:"Various soloists · The English Concert and Choir / Trevor Pinnock",title:"Haydn: Missa in Angustiis 'Nelson Mass' Hob. XXII:11 · Te Deum Hob. XXIIc:2",description:"423 097-2 · Archiv Produktion · rec. 1988",format:"Single CD",catNo:"423 097-2",usedGBP:10.00,newGBP:null,notes:"Archiv. Pinnock and The English Concert in Haydn's most dramatic mass — the Nelson Mass of 1798, composed at the time of the Battle of the Nile. Pinnock's period-instrument approach strips away any comfort, revealing the work's underlying tension and urgent intensity. Gramophone praised this as one of the finest period-instrument accounts of this mass."},
  {id:248,label:"Decca (Double, 2-disc)",composers:["Joseph Haydn"],artist:"Lucia Popp · Ortrun Wenkel · Werner Hollweg · Kurt Moll · Brighton Festival Chorus · Royal Philharmonic Orchestra / Antal Doráti",title:"Haydn: The Creation Hob. XXI:2 · Salve Regina",description:"443 027-2 · Decca Double · 2-disc set",format:"2-disc set",catNo:"443 027-2",usedGBP:12.00,newGBP:null,notes:"Decca Double. Antal Doráti (1906-1988) was a great Haydn conductor whose recordings for Decca — including the complete symphony cycle — were benchmark achievements. His Creation with Lucia Popp (at her most luminous), Kurt Moll and Werner Hollweg is warmly idiomatic. The Salve Regina makes an ideal coupling. Budget double-disc reissue."},
  {id:249,label:"Philips",composers:["Joseph Haydn","Johann Nepomuk Hummel","Johann Wilhelm Hertel","Carl Stamitz"],artist:"Håkan Hardenberger (trumpet) · Academy of St Martin-in-the-Fields / Sir Neville Marriner",title:"Trumpet Concertos · Haydn · Hummel · Hertel · Stamitz",description:"420 203-2 · Philips · rec. 1987",format:"Single CD",catNo:"420 203-2",usedGBP:10.00,newGBP:null,notes:"Philips. One of the best-selling classical CDs ever made — Hardenberger's trumpet disc sold over one million copies and helped define the trumpet as a major solo instrument. Håkan Hardenberger (born 1961) is widely regarded as the finest classical trumpeter of his generation. The Haydn Concerto (1796) and Hummel (1803) are the two greatest in the repertoire; Hertel and Stamitz are delightful rarities. Recorded at Abbey Road with Marriner and the ASMF."},
  {id:250,label:"EMI Classics",composers:["Joseph Haydn"],artist:"Leif Ove Andsnes (piano) · Norwegian Chamber Orchestra",title:"Haydn: Piano Concertos Hob. XVIII: 3, 4 & 11",description:"50999 2 28527 2 4 · EMI Classics · Gramophone and Penguin Guide recommended",format:"Single CD",catNo:"50999 2 28527 2 4",usedGBP:10.00,newGBP:null,notes:"EMI Classics. Gramophone Classical Music Guide and Penguin Guide recommended. Andsnes directs from the keyboard in three of Haydn's finest piano concertos, including the great D major Hob. XVIII:11. His playing combines classical elegance with natural spontaneity. The Norwegian Chamber Orchestra provides a perfectly scaled partnership. One of the finest Haydn concerto discs in the catalogue."},
  {id:251,label:"Chandos (2-disc)",composers:["Michael Haydn"],artist:"London Mozart Players / Matthias Bamert",title:"Michael Haydn: Symphonies",description:"CHAN 9352 · Chandos · 2-disc set",format:"2-disc set",catNo:"CHAN 9352",usedGBP:12.00,newGBP:null,notes:"Chandos. Michael Haydn (1737-1806) was Joseph Haydn's younger brother and a distinguished composer in his own right, overshadowed in posterity only by the fame of his sibling. He spent most of his career in Salzburg, where he was a colleague and friend of Mozart. His symphonies are well-crafted, elegant and full of melodic invention — championed by Bamert and the London Mozart Players in this Chandos survey."},
  {id:252,label:"Deutsche Grammophon (2-disc)",composers:["Joseph Haydn"],artist:"Various soloists · Berliner Philharmoniker / Herbert von Karajan",title:"Haydn: Die Schöpfung (The Creation) Hob. XXI:2",description:"449 761-2 · DG · 2-disc set · Special Price",format:"2-disc set",catNo:"449 761-2",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. Karajan's Berlin Philharmonic recording of The Creation — grand in scale and opulent in sound, as one would expect from this partnership. A very different approach from Gardiner or Gönnenwein but wholly compelling on its own terms. The DG Special Price reissue makes this one of the best-value versions of Haydn's greatest work in the catalogue."},
  {id:253,label:"MDG (SACD)",composers:["Johann Wilhelm Hertel","Johann Christian Hertel"],artist:"Wolfgang Bauer (trumpet) · Würtembergisches Kammerorchester Heilbronn",title:"J.W. & J.C. Hertel: Trumpet Concertos",description:"MDG 901 1499-6 · MDG SACD hybrid multichannel",format:"SACD",catNo:"MDG 901 1499-6",usedGBP:14.00,newGBP:null,notes:"MDG SACD. Johann Wilhelm Hertel (1727-1789) and his father Johann Christian Hertel (1699-1754) both composed trumpet concertos of great charm. Johann Wilhelm appeared on the Hardenberger disc (CD 249); this MDG SACD pairs him with his father for the first time on one disc. Wolfgang Bauer is a distinguished German trumpeter. The MDG multichannel SACD format captures the brass with exceptional brilliance and presence."},
  {id:254,label:"Chandos (Early Music)",composers:["Johann Nepomuk Hummel"],artist:"Various soloists · Collegium Musicum 90 / Richard Hickox",title:"Hummel: Mass in D major · Mass in B flat major · Alma virgo",description:"CHAN 0681 · Chandos Early Music · The Hummel Mass Edition Vol. 1 · Limelight Award 2003 shortlisted",format:"Single CD",catNo:"CHAN 0681",usedGBP:12.00,newGBP:null,notes:"Chandos Early Music. The first volume of Richard Hickox's Hummel Mass Edition — shortlisted for the Limelight Award 2003. Richard Hickox (1948-2008) was a tireless champion of neglected British and Continental repertoire, whose sudden death aged 60 was a huge loss to the musical world. Hummel's masses are elegant, refined works that bridge the Classical and Romantic eras. Collegium Musicum 90 use period instruments."},
  {id:255,label:"Chandos",composers:["Johann Nepomuk Hummel"],artist:"Howard Shelley (piano) · London Mozart Players",title:"Hummel: Piano Concerto in C major · Rondo Brillant Op. 56 · Rondo Brillant Op. 56",description:"CHAN 10216 · Chandos",format:"Single CD",catNo:"CHAN 10216",usedGBP:12.00,newGBP:null,notes:"Chandos. Howard Shelley has been the pre-eminent advocate for Hummel's piano concertos over several decades, recording the complete set for Chandos with the London Mozart Players. Hummel (1778-1837) was a pupil of Mozart, friend of Haydn and Beethoven, and one of the most celebrated pianists of his era. His piano writing bridges the Classical elegance of Mozart and the early Romanticism of Schubert."},
  {id:256,label:"Chandos",composers:["Johann Nepomuk Hummel"],artist:"Alison Stephens (mandolin) · Urban Agnäs (trumpet) · London Mozart Players / Howard Shelley",title:"Hummel: Mandolin Concerto · Trumpet Concerto · Ballet Music",description:"CHAN 9925 · Chandos",format:"Single CD",catNo:"CHAN 9925",usedGBP:12.00,newGBP:null,notes:"Chandos. A delightful miscellany of Hummel rarities. The Mandolin Concerto is a charming discovery. The Trumpet Concerto in E major (1803) is one of the two greatest in the trumpet repertoire alongside Haydn's — it was written for the newly invented keyed trumpet and remained unperformed for over a century before its modern rediscovery. Alison Stephens is a leading mandolin soloist; Urban Agnäs a distinguished Swedish trumpeter."},
  {id:257,label:"Naxos (6-disc box)",composers:["Joseph Haydn"],artist:"Cologne Chamber Orchestra / Helmut Müller-Brühl",title:"Haydn: The Complete Concertos",description:"8.506019 · Naxos · 6-disc box set",format:"6-disc set",catNo:"8.506019",usedGBP:20.00,newGBP:null,notes:"Naxos. Six-disc box set collecting all of Haydn's concertos including those for keyboard, cello (x2), violin, horn, trumpet and flute. Helmut Müller-Brühl and the Cologne Chamber Orchestra recorded prolifically for Naxos and were ideal interpreters of this repertoire. An invaluable budget survey of Haydn's complete concerto output — a form he did not favour as much as Mozart but contributed to with some magnificent works."},
  {id:258,label:"Naxos",composers:["Jenő Hubay"],artist:"Chloë Hanslip (violin) · Bournemouth Symphony Orchestra / Andrew Manze",title:"Hubáy: Violin Concertos",description:"8.572078 · Naxos",format:"Single CD",catNo:"8.572078",usedGBP:8.00,newGBP:8.99,notes:"Naxos. Jenő Hubáy (1858-1937) was a Hungarian violinist and composer, student of Vieuxtemps, who also taught Jelly d'Arányi and Yehudi Menuhin. His violin concertos are brilliantly crafted Romantic works in the Hungarian tradition. Chloë Hanslip (born 1987) is a distinguished British violinist who has championed rare 20th-century repertoire. Andrew Manze brings his scholarly rigour to this colourful music."},
  {id:259,label:"Naxos",composers:["John Ireland"],artist:"John Lenehan (piano)",title:"Ireland: Piano Works · Sarnia · London Pieces · In those days",description:"8.553700 · Naxos",format:"Single CD",catNo:"8.553700",usedGBP:7.00,newGBP:8.99,notes:"Naxos. John Ireland (1879-1962) was one of the finest British composers of the early 20th century, associated with the English pastoral tradition alongside Butterworth and Finzi. Sarnia: An Island Sequence (1940-41), inspired by Guernsey, is his piano masterpiece — three evocative movements of great beauty. The London Pieces (1917-20) include the celebrated 'Chelsea Reach.' John Lenehan is a committed advocate for this repertoire."},
  {id:260,label:"Gimell",composers:["Josquin des Prez"],artist:"The Tallis Scholars / Peter Phillips",title:"Josquin: Missa Pange Lingua · Missa La Sol Fa Re Mi",description:"CDGIM 009 · Gimell · Gramophone Record of the Year",format:"Single CD",catNo:"CDGIM 009",usedGBP:14.00,newGBP:null,notes:"Gimell. Gramophone Record of the Year — one of the most celebrated recordings in the history of early music. Josquin des Prez (c.1450-1521) was regarded by his contemporaries as the greatest composer alive, praised by Luther as 'the master of the notes.' The Missa Pange Lingua is his final mass and possibly his finest achievement. Peter Phillips and the Tallis Scholars transformed the way we hear Renaissance polyphony, and this disc remains the definitive recording."},
  {id:261,label:"Dacapo",composers:["Rued Langgaard"],artist:"Nightingale String Quartet",title:"Langgaard: String Quartets Vol. 3",description:"6.220577 · Dacapo Records · Danish label",format:"Single CD",catNo:"6.220577",usedGBP:12.00,newGBP:null,notes:"Dacapo. Rued Langgaard (1893-1952) was a Danish composer almost entirely ignored in his lifetime and not seriously rediscovered until the 1990s. He is now recognised as one of the most original musical minds of the 20th century — his visionary harmonic language anticipated much of what came decades later. The Nightingale String Quartet are dedicated interpreters of this neglected repertoire. Dacapo is the principal Danish label for Nordic music."},
  {id:262,label:"Deutsche Grammophon (20th Century Classics)",composers:["György Ligeti"],artist:"Ensemble InterContemporain / Pierre Boulez · LaSalle Quartet",title:"Ligeti: Chamber Concerto · Ramifications · String Quartet No. 2 · Aventures · Lux aeterna",description:"423 244-2 · DG 20th Century Classics",format:"Single CD",catNo:"423 244-2",usedGBP:10.00,newGBP:null,notes:"DG 20th Century Classics. György Ligeti (1923-2006) was one of the most original composers of the 20th century — his micropolyphony and unique harmonic language are instantly recognisable. The Lux aeterna became famous through Kubrick's 2001: A Space Odyssey, as did the Requiem and Atmospheres. Pierre Boulez and the Ensemble InterContemporain are definitive advocates. The LaSalle Quartet perform the intricate String Quartet No. 2 with precision and commitment."},
  {id:263,label:"Hyperion",composers:["Christian Joseph Lidarti"],artist:"Francesco D'Orazio (violin) · Janser Musici",title:"Lidarti: Violin Concertos",description:"CDA67685 · Hyperion",format:"Single CD",catNo:"CDA67685",usedGBP:12.00,newGBP:null,notes:"Hyperion. Christian Joseph Lidarti (1730-c.1793) was an Italian composer of Bohemian origin who spent much of his career in Prague and Amsterdam. His violin concertos are charming galant works that show the transition from Baroque to Classical style. Francesco D'Orazio is a distinguished Italian violinist who has specialised in rediscovering neglected Italian repertoire. A delightful rarity."},
  {id:264,label:"Pierre Vérany",composers:["Franz Liszt"],artist:"Chantal de Zeeuw (organ)",title:"Liszt: Prélude et Fugue sur B-A-C-H · Variations sur 'Weinen, Klagen' · Fantaisie et Fugue sur 'Ad nos'",description:"PV.783041 · Pierre Vérany · aux grandes orgues de la Cathédrale d'Aix-en-Provence",format:"Single CD",catNo:"PV.783041",usedGBP:12.00,newGBP:null,notes:"Pierre Vérany. Three of Liszt's greatest organ works recorded on the magnificent organ of Aix-en-Provence Cathedral. The Prelude and Fugue on B-A-C-H (the musical letters of Bach's name) is a tour de force of late Romantic organ writing. The Fantaisie et Fugue on 'Ad nos' is one of the most monumental organ works in the entire repertoire. Chantal de Zeeuw is a distinguished Dutch/French organist."},
  {id:265,label:"Naxos",composers:["Franz Liszt","Johannes Brahms"],artist:"Michael Ponti (piano)",title:"Liszt: Fantasia and Fugue on B-A-C-H · Brahms: Variations and Fugue on a Theme of Handel Op. 24",description:"8.550408 · Naxos",format:"Single CD",catNo:"8.550408",usedGBP:6.00,newGBP:8.99,notes:"Naxos. Two great variation and fugue works in the B-A-C-H tradition. Liszt's Fantasia on the Bach theme is a pianistic adaptation of his organ work. Brahms's Handel Variations Op. 24 (1861) is one of his greatest piano works — 25 variations of extraordinary invention culminating in a double fugue. Michael Ponti was an American pianist especially noted for his Romantic repertoire recordings for Vox and Naxos."},
  {id:266,label:"CBS Masterworks",composers:["Gustav Mahler"],artist:"Kathleen Battle (soprano) · Wiener Philharmoniker / Lorin Maazel",title:"Mahler: Symphony No. 4 in G major",description:"MK 39072 · CBS Masterworks",format:"Single CD",catNo:"MK 39072",usedGBP:10.00,newGBP:null,notes:"CBS Masterworks. Kathleen Battle's pure, luminous soprano is ideally cast in the final movement of Mahler's most serene and heavenly symphony. Lorin Maazel and the Vienna Philharmonic bring Viennese warmth and refinement. The Fourth is Mahler's most immediately approachable symphony — relatively brief (~55 min), chamber-like in texture, and ending with a child's vision of heaven."},
  {id:267,label:"Deutsche Grammophon",composers:["Gustav Mahler"],artist:"Wiener Philharmoniker / Leonard Bernstein",title:"Mahler: Symphony No. 5 in C-sharp minor",description:"477 6334 · DG · rec. Vienna, 1987",format:"Single CD",catNo:"477 6334",usedGBP:10.00,newGBP:null,notes:"Deutsche Grammophon. Bernstein's 1987 DG recording with the Vienna Philharmonic — one of the most celebrated accounts of Mahler's Fifth. The Adagietto (used by Visconti in Death in Venice) is played with an almost unbearable tenderness. Bernstein had a uniquely personal relationship with Mahler's music: he was the first conductor to systematically champion Mahler in America and is largely responsible for his worldwide popularity today."},
  {id:268,label:"Decca (2-disc)",composers:["Gustav Mahler"],artist:"Soloists · Chicago Symphony Orchestra and Chorus / Georg Solti",title:"Mahler: Symphony No. 2 in C minor 'Resurrection'",description:"410 202-2 · Decca · 2-disc set · early Decca CD pressing",format:"2-disc set",catNo:"410 202-2",usedGBP:12.00,newGBP:null,notes:"Decca. One of the earliest Decca CD releases (the 410 series from 1983-84). Georg Solti's Chicago Mahler recordings were among the great achievements of the LP and early CD era — the CSO brass and percussion at full throttle are thrilling. The Resurrection Symphony (1894) ends in a vast choral finale of overwhelming power, setting Klopstock's 'Resurrection Ode'. Solti and the CSO were a dream partnership for this music."},
  {id:269,label:"Deutsche Grammophon (2-disc)",composers:["Gustav Mahler"],artist:"Christa Ludwig (mezzo) · Berliner Philharmoniker / Herbert von Karajan",title:"Mahler: Symphony No. 5 in C-sharp minor · Kindertotenlieder",description:"415 096-2 · DG · 2-disc set · rec. Berlin, 1973",format:"2-disc set",catNo:"415 096-2",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. Karajan's 1973 recording with the Berlin Philharmonic remains one of the most magnificent Mahler Fifth recordings in the catalogue — sumptuous, grand and intensely crafted. The Adagietto has become the most famous movement in all Mahler. Christa Ludwig sings the Kindertotenlieder (Songs on the Death of Children) with her characteristic deep expression and rich tone. She was one of the great Mahler singers of the 20th century."},
  {id:270,label:"Deutsche Grammophon (2-disc)",composers:["Gustav Mahler"],artist:"Christa Ludwig (mezzo) · Berliner Philharmoniker / Herbert von Karajan",title:"Mahler: Symphony No. 6 in A minor 'Tragic' · Rückert-Lieder",description:"415 099-2 · DG · 2-disc set · rec. Berlin, 1975",format:"2-disc set",catNo:"415 099-2",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. The companion to CD 269 — Karajan's Sixth with Christa Ludwig singing the Rückert-Lieder. The Sixth Symphony ('Tragic') is Mahler's most relentlessly dark work, ending with a catastrophic hammer blow that Mahler himself identified with the blows of fate. Christa Ludwig's Rückert-Lieder are among the most treasured recordings she ever made."},
  {id:271,label:"RCO Live (SACD)",composers:["Gustav Mahler"],artist:"Royal Concertgebouw Orchestra / Mariss Jansons",title:"Mahler: Symphony No. 1 in D major 'Titan'",description:"RCO 07001 · RCO Live · SACD · live recording",format:"SACD",catNo:"RCO 07001",usedGBP:12.00,newGBP:null,notes:"RCO Live (the Concertgebouw's own label). A live Mahler First from Mariss Jansons — one of the most Mahler-attuned orchestras and conductors of recent decades. The Concertgebouw has a special relationship with Mahler — its former chief conductor Mengelberg was a personal friend of the composer, and the RCO has been performing his symphonies since the 1890s. Jansons's account crackles with spontaneity and natural authority."},
  {id:272,label:"Deutsche Grammophon (2-disc)",composers:["Gustav Mahler"],artist:"Anna Larsson (mezzo) · Berliner Philharmoniker / Claudio Abbado",title:"Mahler: Symphony No. 3 in D minor",description:"471 502-2 · DG · 2-disc set · rec. Berlin, 2000",format:"2-disc set",catNo:"471 502-2",usedGBP:14.00,newGBP:null,notes:"Deutsche Grammophon. Abbado's DG recording of Mahler's longest symphony — about 95-100 minutes — is one of the finest in the catalogue. Gramophone: 'A recording of exceptional beauty and commitment.' The Third Symphony is a vast six-movement work depicting nature's awakening, from inorganic matter through flowers, animals and humanity to the eternal love of God. Anna Larsson's deep contralto is magnificent in the fourth movement's setting of Nietzsche. Abbado and the BPO were an inspired combination for late Mahler."},
  {id:273,label:"Deutsche Grammophon",composers:["Gustav Mahler"],artist:"Thomas Hampson (baritone) · Wiener Philharmoniker / Leonard Bernstein",title:"Mahler: Lieder eines fahrenden Gesellen · Kindertotenlieder · Rückert-Lieder",description:"431 682-2 · DG · rec. Vienna, 1988",format:"Single CD",catNo:"431 682-2",usedGBP:10.00,newGBP:null,notes:"Deutsche Grammophon. Thomas Hampson and Bernstein in three of Mahler's greatest song cycles, recorded live in Vienna in 1988. Mahler wrote the Kindertotenlieder (Songs on the Death of Children) to words by Rückert, completing them in 1904. His wife Alma never forgave him — their daughter Maria died three years later aged four. Hampson's warm baritone and Bernstein's deeply personal Mahler style make this one of the finest song discs in the catalogue."},
  {id:274,label:"Deutsche Grammophon (2-disc)",composers:["Gustav Mahler"],artist:"Jessye Norman (mezzo) · Wiener Sängerknaben · Wiener Philharmoniker / Claudio Abbado",title:"Mahler: Symphony No. 3 in D minor",description:"410 715-2 · DG · 2-disc set · rec. Vienna, 1980",format:"2-disc set",catNo:"410 715-2",usedGBP:14.00,newGBP:null,notes:"Deutsche Grammophon. Abbado's first great Mahler recording, made in Vienna in 1980, with Jessye Norman in glorious voice in the fourth movement's Nietzsche setting. Abbado and the Vienna Philharmonic were a natural combination for this most Viennese of composers. The Third Symphony — Mahler's longest at around 95 minutes — depicts the awakening of nature from stone through flowers, animals, humanity and angels to divine love."},
  {id:275,label:"Decca (2-disc)",composers:["Gustav Mahler"],artist:"Various soloists · Chicago Symphony Orchestra and Chorus / Georg Solti",title:"Mahler: Symphony No. 8 in E-flat major 'Symphony of a Thousand'",description:"414 493-2 · Decca · 2-disc set",format:"2-disc set",catNo:"414 493-2",usedGBP:15.00,newGBP:null,notes:"Decca. Solti and the Chicago Symphony in Mahler's most epic work. The Eighth Symphony requires eight soloists, two large choruses, a boys' choir and a vastly enlarged orchestra — at its 1910 premiere in Munich over 1,000 performers were involved, giving it its nickname. Solti and the CSO were the ideal combination for this music: the Chicago brass are simply overwhelming in the great opening hymn 'Veni Creator Spiritus.'"},
  {id:276,label:"EMI (2-disc)",composers:["Gustav Mahler","Arnold Schoenberg"],artist:"City of Birmingham Symphony Orchestra / Simon Rattle",title:"Mahler: Symphony No. 10 (Cooke version) · Brahms/Schoenberg: Piano Quartet No. 1 in G minor",description:"CDS 7 473018 · EMI · 2-disc set · rec. Birmingham, 1980",format:"2-disc set",catNo:"CDS 7 473018",usedGBP:14.00,newGBP:null,notes:"EMI. Simon Rattle's landmark early recording — his Mahler Tenth in Deryck Cooke's performing version (completing the symphony Mahler left unfinished at his death) helped establish Rattle's international reputation. Coupled with Schoenberg's magnificent 1937 orchestration of Brahms's Piano Quartet Op. 25 — a radical reimagining that Schoenberg called 'my symphony on a theme by Brahms.' Both works show the fascinating connection between the Brahms and Schoenberg/Mahler worlds."},
  {id:277,label:"Hyperion",composers:["Johann Nepomuk Hummel"],artist:"Nikolai Demidenko (piano) · BBC Scottish Symphony Orchestra / Jerzy Maksymiuk",title:"The Romantic Piano Concerto Vol. 2 · Hummel: Piano Concertos",description:"CDA66580 · Hyperion · Romantic Piano Concerto series Vol. 2",format:"Single CD",catNo:"CDA66580",usedGBP:12.00,newGBP:null,notes:"Hyperion. Volume 2 of Hyperion's celebrated Romantic Piano Concerto series, featuring Nikolai Demidenko in Hummel piano concertos with the BBC Scottish Symphony under Jerzy Maksymiuk. Hummel's concertos represent the Classical-Romantic boundary at its most elegant and inventive."},
  {id:278,label:"Deutsche Grammophon (2-disc)",composers:["Felix Mendelssohn"],artist:"Daniel Barenboim (piano)",title:"Mendelssohn: Lieder ohne Worte (Songs without Words) · Complete",description:"453 061-2 · DG · 2-disc set",format:"2-disc set",catNo:"453 061-2",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. The complete Songs without Words — 48 short piano pieces that Mendelssohn composed throughout his life and that remain among the most beloved piano music ever written. Barenboim's playing is warm, natural and beautifully characterised. Mendelssohn (1809-1847) invented the genre of the 'Lied ohne Worte' and returned to it repeatedly — these intimate pieces are autobiographical documents of his inner world."},
  {id:279,label:"BIS (SACD)",composers:["Felix Mendelssohn"],artist:"Judith Howarth (soprano) · Jennifer Larmore (mezzo) · Christoph Prégardien (tenor) · Bergen Philharmonic Choir · Danish National Vocal Ensemble / Bergen Philharmonic Orchestra / Andrew Litton",title:"Mendelssohn: Symphony No. 2 in B-flat major Op. 52 'Lobgesang' (Hymn of Praise)",description:"BIS-SACD-1704 · BIS SACD · SEALED · companion to CD 282",format:"SACD",catNo:"BIS-SACD-1704",usedGBP:18.00,newGBP:18.00,sealed:true,notes:"BIS SACD. UNOPENED. The Lobgesang (1840) is Mendelssohn's most ambitious choral-orchestral work, blending three orchestral movements with a vast cantata finale. Written to celebrate the 400th anniversary of Gutenberg's printing press, it reflects Mendelssohn's deep Lutheran faith. Bergen Philharmonic / Andrew Litton — companion to CD 282 (BIS-SACD-1604). Judith Howarth and Jennifer Larmore lead a distinguished cast."},
  {id:280,label:"Teldec",composers:["Felix Mendelssohn"],artist:"Maxim Vengerov (violin) · Gewandhausorchester Leipzig / Kurt Masur",title:"Mendelssohn: Violin Concerto in E minor Op. 64 · Violin Concerto in D minor (1822)",description:"4509-90875-2 · Teldec · rec. Leipzig, 1993",format:"Single CD",catNo:"4509-90875-2",usedGBP:10.00,newGBP:null,notes:"Teldec. The young Maxim Vengerov (born 1974) with the Gewandhaus — the very orchestra that premiered the E minor Concerto in 1845. This has a special authenticity. The famous E minor Concerto is one of the most beloved in the entire repertoire; the early D minor Concerto (written aged 13) is a fascinating discovery. Gramophone praised Vengerov's 'phenomenal technique and natural musicianship.' Masur and the Gewandhaus are ideal partners."},
  {id:281,label:"Harmonia Mundi USA",composers:["Felix Mendelssohn"],artist:"The Eroica Quartet",title:"Mendelssohn: String Quartets",description:"HMU 907245 · Harmonia Mundi USA",format:"Single CD",catNo:"HMU 907245",usedGBP:12.00,newGBP:null,notes:"Harmonia Mundi USA. Mendelssohn's string quartets are among the finest in the 19th-century repertoire, combining Classical clarity with Romantic emotional intensity. The Eroica Quartet bring warmth and refinement to this music. Mendelssohn wrote his first serious string quartet aged 18; his final quartet in F minor (1847), written after his sister Fanny's sudden death, is a work of devastating grief."},
  {id:282,label:"BIS (SACD)",composers:["Felix Mendelssohn"],artist:"Bergen Philharmonic Orchestra / Andrew Litton",title:"Mendelssohn: Symphony No. 3 in A minor Op. 56 'Scottish' · Symphony No. 5 in D major Op. 107 'Reformation'",description:"BIS-SACD-1604 · BIS SACD · companion to CD 279",format:"SACD",catNo:"BIS-SACD-1604",usedGBP:14.00,newGBP:null,notes:"BIS SACD. Andrew Litton's Mendelssohn cycle with the Bergen Philharmonic — companion to the Lobgesang (CD 279). The Scottish Symphony was inspired by Mendelssohn's 1829 visit to Scotland and the ruins of Holyrood Palace. The Reformation Symphony was written to celebrate the 300th anniversary of the Augsburg Confession. Litton and the Bergen Philharmonic have made a distinguished Mendelssohn cycle for BIS."},
  {id:283,label:"Hyperion (2-disc)",composers:["Claudio Monteverdi"],artist:"Soloists · The King's Consort / Robert King",title:"Monteverdi: Vespers 1610",description:"CDA67531/2 · Hyperion · 2-disc set",format:"2-disc set",catNo:"CDA67531/2",usedGBP:16.00,newGBP:null,notes:"Hyperion. Monteverdi's Vespers of 1610 is one of the supreme masterpieces of the early Baroque — a collection of psalms, hymns and motets of extraordinary variety and magnificence, composed for presentation to the Pope in Rome. Robert King and The King's Consort have been consistent advocates for this repertoire. Claudio Monteverdi (1567-1643) effectively invented opera and transformed Western music."},
  {id:284,label:"Philips",composers:["Modest Mussorgsky"],artist:"Royal Concertgebouw Orchestra / Sir Colin Davis",title:"Mussorgsky: Pictures at an Exhibition · Night on the Bare Mountain",description:"411 473-2 · Philips · rec. 1980",format:"Single CD",catNo:"411 473-2",usedGBP:10.00,newGBP:null,notes:"Philips. Sir Colin Davis and the Concertgebouw in two of the most vivid orchestral showpieces in the repertoire. Pictures at an Exhibition was originally written for solo piano (1874) and orchestrated by Ravel in 1922 — Ravel's version became one of the most celebrated orchestrations ever made. Night on the Bare Mountain depicts a witches' sabbath. Modest Mussorgsky (1839-1881) was one of the most original voices in Russian music."},
  {id:285,label:"Naxos",composers:["W.A. Mozart"],artist:"Kungsbacka Piano Trio",title:"Mozart: Late Piano Trios K. 542, K. 548 & K. 564",description:"8.570519 · Naxos",format:"Single CD",catNo:"8.570519",usedGBP:7.00,newGBP:8.99,notes:"Naxos. Mozart's three late piano trios of 1788, composed in the same extraordinary year as his last three symphonies. These are intimate, searching works that reveal Mozart at his most personal and introspective. The Kungsbacka Piano Trio are a Swedish ensemble of great refinement and stylistic understanding."},
  {id:286,label:"CBS Masterworks",composers:["W.A. Mozart"],artist:"Murray Perahia (piano) · English Chamber Orchestra",title:"Mozart: Piano Concertos Nos. 17 K.453 & 18 K.456",description:"CD 36686 · CBS Masterworks · early digital CD pressing",format:"Single CD",catNo:"CD 36686",usedGBP:10.00,newGBP:null,notes:"CBS Masterworks. A very early CBS digital CD pressing — the 'CD 36xxx' catalogue series dates from the early 1980s when CBS was one of the first major labels to release on CD. Perahia's Mozart concerto cycle with the ECO is one of the most admired in the catalogue — classical in proportion, singing in melody and deeply intelligent in phrasing. These two G major concertos are among Mozart's most characterful."},
  {id:287,label:"CBS Masterworks",composers:["W.A. Mozart","Franz Schubert"],artist:"Murray Perahia (piano) · Radu Lupu (piano)",title:"Mozart: Sonata for 2 Pianos K.448 · Schubert: Fantasia in F minor D.940",description:"517490 2 · CBS Masterworks",format:"Single CD",catNo:"517490 2",usedGBP:12.00,newGBP:null,notes:"CBS Masterworks. One of the most celebrated duo piano recordings ever made. Perahia and Lupu were an ideal partnership — two of the most refined pianists of their generation in music that demands absolute equality and stylistic unity. Mozart's K.448 is his only surviving work for two pianos. Schubert's F minor Fantasia D.940 is perhaps his most intimate and heartbreaking piano work, written in the last year of his life."},
  {id:288,label:"Teldec",composers:["W.A. Mozart"],artist:"Andreas Staier (fortepiano) · Concerto Köln",title:"Mozart: Piano Concertos Nos. 9 'Jeunehomme' K.271 & 17 K.453",description:"4509-98412-2 · Teldec · period instruments",format:"Single CD",catNo:"4509-98412-2",usedGBP:12.00,newGBP:null,notes:"Teldec. Andreas Staier plays a replica fortepiano with Concerto Köln on period instruments — a historically informed account of two of Mozart's finest concertos. The 'Jeunehomme' Concerto (1777) was written for a French pianist visiting Salzburg and is the work that announced Mozart as a concerto composer of the first rank. Staier is one of the most distinguished fortepianists of his generation."},
  {id:289,label:"Philips",composers:["W.A. Mozart"],artist:"Claudio Arrau (piano)",title:"Mozart: Piano Sonatas KV 282, 283 & 545",description:"416 830-2 · Philips",format:"Single CD",catNo:"416 830-2",usedGBP:9.00,newGBP:null,notes:"Philips. Claudio Arrau's Mozart is a fascinating combination of aristocratic bearing and deep personal expressiveness — not the lighter Classical touch of some interpreters but a more weighty, searching approach. The Sonata K.545 'for beginners' is one of the most famous pieces in all music; in Arrau's hands it reveals unexpected depths. Recorded late in his career, these are performances of great wisdom."},
  {id:290,label:"Deutsche Grammophon",composers:["W.A. Mozart"],artist:"Mikhail Pletnev (piano)",title:"Pletnev: Mozart Piano Sonatas",description:"00289 477 5788 · DG · rec. 2005",format:"Single CD",catNo:"00289 477 5788",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. Mikhail Pletnev (born 1957) is one of the most individual pianists alive — his Mozart is idiosyncratic, unpredictable and wholly personal. DG described this as 'Pletnev's first-ever Mozart sonata recording on CD.' His playing has a crystalline clarity and rhythmic precision that brings new light to familiar scores. Some find his approach unconventional; others consider it revelatory."},
  {id:291,label:"Philips (2-disc)",composers:["W.A. Mozart","Franz Schubert","Ludwig van Beethoven"],artist:"Mitsuko Uchida (piano)",title:"Mitsuko Uchida: Perspectives",description:"473 686-2 · Philips · 2-disc compilation",format:"2-disc set",catNo:"473 686-2",usedGBP:12.00,newGBP:null,notes:"Philips. A 2-disc compilation showcasing Mitsuko Uchida's Philips recordings across Mozart, Schubert, Beethoven and other composers. Uchida (born 1948 in Japan) is one of the greatest pianists alive, particularly celebrated for her Mozart and Schubert. She was awarded DBE in 2009. These Perspectives discs were an ideal introduction to her artistry."},
  {id:292,label:"Philips (Complete Mozart Edition)",composers:["W.A. Mozart"],artist:"Mitsuko Uchida (piano)",title:"Mozart: Piano Sonatas Nos. 6, 11 'Alla turca', 16 & 18",description:"446 238-2 · Philips Complete Mozart Edition",format:"Single CD",catNo:"446 238-2",usedGBP:9.00,newGBP:null,notes:"Philips Complete Mozart Edition. Four of Mozart's most beloved piano sonatas including the famous 'Alla turca' (No. 11), with its irresistible Turkish Rondo finale. Mitsuko Uchida's complete Mozart piano sonata cycle for Philips is widely regarded as the finest available recording of this repertoire — technically flawless, stylistically impeccable and deeply musical."},
  {id:293,label:"Philips",composers:["W.A. Mozart"],artist:"Mitsuko Uchida (piano) · English Chamber Orchestra / Jeffrey Tate",title:"Mozart: Piano Concertos Nos. 20 in D minor K.466 & 21 in C major K.467",description:"416 381-2 · Philips",format:"Single CD",catNo:"416 381-2",usedGBP:10.00,newGBP:null,notes:"Philips. Two of Mozart's most celebrated concertos in Uchida's acclaimed series with the ECO and Jeffrey Tate. No. 20 in D minor is his most dramatic and stormy concerto; No. 21 in C major became famous as 'Elvira Madigan' after the Swedish film. Uchida and Tate made one of the most distinguished Mozart concerto series of the 1980s-90s."},
  {id:294,label:"Philips (5-disc box)",composers:["W.A. Mozart"],artist:"Mitsuko Uchida (piano)",title:"Mozart: The Complete Piano Sonatas",description:"468 356-2 · Philips · 5-disc box set · all 17 sonatas plus Fantasias and Rondos",format:"5-disc set",catNo:"468 356-2",usedGBP:25.00,newGBP:null,notes:"Philips. The complete Mitsuko Uchida Mozart piano sonatas in a 5-disc box — widely regarded as the finest available recording of this repertoire. Gramophone: 'These performances combine crystalline clarity, immaculate technique and deep musical intelligence in a way that has never been surpassed.' Uchida's cycle has been the reference recording since its release and remains unchallenged. All 17 sonatas plus Fantasias K.397 and K.475 and Rondos K.485 and K.511."},
  {id:295,label:"CBS Masterworks",composers:["W.A. Mozart"],artist:"Murray Perahia (piano) · Radu Lupu (piano) · English Chamber Orchestra",title:"Mozart: Concertos for 2 & 3 Pianos K.365 & K.242",description:"518811 2 · CBS Masterworks",format:"Single CD",catNo:"518811 2",usedGBP:10.00,newGBP:null,notes:"CBS Masterworks. The same celebrated duo as the 2-piano sonata disc (CD 287) — Perahia and Lupu in Mozart's Concerto for 2 Pianos K.365 and the Concerto for 3 Pianos K.242 (played here on two pianos as Mozart himself arranged). These are works of pure delight, Mozart at his most generous and entertaining. The partnership of Perahia and Lupu was one of the great piano duos of the late 20th century."},
  {id:296,label:"CBS Masterworks",composers:["W.A. Mozart"],artist:"Murray Perahia (piano) · English Chamber Orchestra",title:"Mozart: Piano Concertos Nos. 14 K.449 & 21 K.467 'Elvira Madigan'",description:"MK 39224 · CBS Masterworks",format:"Single CD",catNo:"MK 39224",usedGBP:10.00,newGBP:null,notes:"CBS Masterworks. Two of Mozart's most beloved concertos in Perahia's distinguished ECO series. No. 14 K.449 was the first of the great 'Viennese' concertos, inaugurating the series of masterpieces he wrote for his own concert appearances. No. 21 K.467 became world-famous as 'Elvira Madigan' after Bo Widerberg's 1967 Swedish film. Perahia's singing tone and Classical proportion are ideally suited to both."},
  {id:297,label:"CBS Masterworks",composers:["W.A. Mozart"],artist:"Murray Perahia (piano) · English Chamber Orchestra",title:"Mozart: Piano Concertos Nos. 6 K.238 & 11 K.413",description:"MK 39223 · CBS Masterworks",format:"Single CD",catNo:"MK 39223",usedGBP:10.00,newGBP:null,notes:"CBS Masterworks. Earlier Mozart concertos from Perahia's complete ECO series — K.238 from Salzburg (1776) and K.413 from Vienna (1782-83), the first of Mozart's concertos composed specifically for the Vienna public. Together they show the development of his concerto writing from elegant Salzburg entertainment to the sophisticated Viennese style."},
  {id:298,label:"CBS Masterworks",composers:["W.A. Mozart"],artist:"Murray Perahia (piano) · English Chamber Orchestra",title:"Mozart: Piano Concertos (CBS series volume)",description:"MK 39225 · CBS Masterworks",format:"Single CD",catNo:"MK 39225",usedGBP:10.00,newGBP:null,notes:"CBS Masterworks. Another volume from Murray Perahia's complete Mozart piano concerto cycle with the ECO — one of the most admired series of recordings in the repertoire. Perahia both conducts and plays throughout, maintaining perfect ensemble between soloist and orchestra with a naturalness that sounds entirely spontaneous."},
  {id:299,label:"Naxos",composers:["W.A. Mozart"],artist:"Jenő Jandó (piano) · Concentus Hungaricus / Mátyás Antal",title:"Mozart: Piano Concertos Nos. 21 K.467 'Elvira Madigan' & 23 K.488",description:"8.550116 · Naxos",format:"Single CD",catNo:"8.550116",usedGBP:6.00,newGBP:8.99,notes:"Naxos. Two of the most popular Mozart piano concertos at budget price. Jenő Jandó recorded a complete Mozart concerto cycle for Naxos with Hungarian ensembles in the late 1980s-90s, providing excellent value accounts of this repertoire. The Concentus Hungaricus bring natural period-influenced lightness to the accompaniments."},
  {id:300,label:"Philips",composers:["W.A. Mozart"],artist:"Mitsuko Uchida (piano)",title:"Mozart: Piano Sonatas KV 533/494 & KV 545 · Rondo KV 494",description:"412 122-2 · Philips",format:"Single CD",catNo:"412 122-2",usedGBP:9.00,newGBP:null,notes:"Philips. Mitsuko Uchida in two of Mozart's most profound later sonatas: K.533/494, a deeply serious work in F major, and K.545, the famous 'easy' sonata that conceals considerable depth beneath its apparent simplicity. Uchida's cycle for Philips remains the benchmark; these are among the most admired performances in the complete set."},
  {id:301,label:"RCA",composers:["W.A. Mozart"],artist:"Alicia de Larrocha (piano)",title:"Mozart: Piano Sonatas Vol. 4 · Sonatas K.279, 280, 311 · Fantasias K.475 & K.397 · Rondo K.485",description:"09026 60453 2 · RCA",format:"Single CD",catNo:"09026 60453 2",usedGBP:10.00,newGBP:null,notes:"RCA. Alicia de Larrocha (1923-2009) was one of the most celebrated pianists of the 20th century, particularly beloved for her Albéniz and Granados but also a distinguished Mozart interpreter. Her RCA Mozart series has an aristocratic elegance and natural authority. Volume 4 includes early sonatas alongside the great Fantasias K.475 and K.397."},
  {id:302,label:"CRD Records",composers:["W.A. Mozart","Johannes Brahms"],artist:"The Nash Ensemble",title:"Mozart: Clarinet Quintet K.581 · Brahms: Clarinet Quintet Op. 115",description:"CRD 3445 · CRD Records",format:"Single CD",catNo:"CRD 3445",usedGBP:12.00,newGBP:null,notes:"CRD Records. The two greatest works in the clarinet quintet repertoire on one disc — the natural coupling. Mozart's K.581 (1789) was written for Anton Stadler and is one of his most serene and autumnal works. Brahms's Op.115 (1891) was also written at the end of a composer's life, similarly valedictory in tone. The Nash Ensemble were one of Britain's finest chamber ensembles, with Michael Collins as clarinetist."},
  {id:303,label:"Philips (Duo, 2-disc)",composers:["W.A. Mozart"],artist:"Arthur Grumiaux · Arpad Gerecz · Max Lesueur · Tibor de Machula · Academy of St Martin-in-the-Fields soloists · others",title:"Mozart: The Complete Quintets Vol. 1",description:"456 055-2 · Philips Duo · 2-disc set",format:"2-disc set",catNo:"456 055-2",usedGBP:10.00,newGBP:null,notes:"Philips Duo. The first volume of the complete Mozart quintets featuring the distinguished Grumiaux-led ensemble. Mozart's quintets — for strings, clarinet, horn and piano — represent some of his most intimate and searching chamber writing. Arthur Grumiaux (1921-1986) was one of the supreme violinists of the 20th century, his silky tone and aristocratic style perfectly suited to this music."},
  {id:304,label:"Philips (Duo, 2-disc)",composers:["W.A. Mozart"],artist:"Quartetto Italiano · Jack Brymer (clarinet) · Abigail Quartet · others",title:"Mozart: The Complete Quintets Vol. 2",description:"456 058-2 · Philips Duo · 2-disc set",format:"2-disc set",catNo:"456 058-2",usedGBP:10.00,newGBP:null,notes:"Philips Duo. The companion volume featuring the legendary Quartetto Italiano and Jack Brymer (principal clarinettist of the RPO, one of the most celebrated British wind players of the 20th century). Together Vols. 1 and 2 form a comprehensive survey of Mozart's quintet output at exceptional Duo budget price."},
  {id:305,label:"EMI Classics (Box set)",composers:["W.A. Mozart"],artist:"English Chamber Orchestra / Jeffrey Tate",title:"Mozart: 51 Symphonies",description:"5 85589 2 · EMI Classics · 12-disc box set",format:"12-disc set",catNo:"5 85589 2",usedGBP:30.00,newGBP:null,notes:"EMI Classics. A remarkable 12-disc box set containing all 51 symphonies attributed to Mozart — the 41 canonical numbered works plus ten unnumbered early symphonies. Jeffrey Tate (1943-2017) was a British conductor particularly celebrated for his Mozart with the English Chamber Orchestra. His cycle is praised for its lightness of touch, natural phrasing and elegant proportions. An outstanding survey of Mozart's symphonic output from boyhood to the great final trilogy."},
  {id:306,label:"Deutsche Grammophon",composers:["W.A. Mozart"],artist:"Barbara Hendricks (soprano) · Janet Perry (soprano) · Peter Schreier (tenor) · Benjamin Luxon (bass) · Vienna Singverein · Berliner Philharmoniker / Herbert von Karajan",title:"Mozart: Grosse Messe C-moll (Mass in C minor) K.427",description:"400 067-2 · DG · very early DG CD pressing · rec. 1982",format:"Single CD",catNo:"400 067-2",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. One of the earliest DG CD releases — the 400 series dates from 1982-83. The Mass in C minor K.427 is one of Mozart's most ambitious sacred works, left unfinished at his death. It was partly premiered during his visit to Salzburg in 1783 when his wife Constanze sang the soprano solos. Karajan's grand, opulent account with Barbara Hendricks is a landmark recording, though its scale contrasts sharply with more recently fashionable period-instrument accounts."},
  {id:307,label:"Philips (Duo, 2-disc)",composers:["W.A. Mozart"],artist:"Mitsuko Uchida (piano) · English Chamber Orchestra / Jeffrey Tate",title:"Mozart: The Great Piano Concertos Vol. 1 · Nos. 19, 20, 21, 22 & 23",description:"468 540-2 · Philips Duo · 2-disc set",format:"2-disc set",catNo:"468 540-2",usedGBP:10.00,newGBP:null,notes:"Philips Duo. Five of Mozart's greatest concertos in one budget 2-disc set, drawn from Uchida and Tate's acclaimed complete series. Includes the famous No. 21 K.467 'Elvira Madigan' and the dark, stormy No. 20 K.466 in D minor. This Philips Duo series made Uchida's definitive cycle widely accessible at modest cost."},
  {id:308,label:"Philips (Duo, 2-disc)",composers:["W.A. Mozart"],artist:"Mitsuko Uchida (piano) · English Chamber Orchestra / Jeffrey Tate",title:"Mozart: The Great Piano Concertos Vol. 2 · Nos. 16, 24, 25, 26 & 27",description:"468 918-2 · Philips Duo · 2-disc set",format:"2-disc set",catNo:"468 918-2",usedGBP:10.00,newGBP:null,notes:"Philips Duo. Vol. 2 includes the sublime final concerto K.595 (No. 27), written in the last year of Mozart's life, and the magnificent K.491 in C minor (No. 24) — the most tragic of all his concertos. Also includes the brilliant 'Coronation' Concerto K.537 (No. 26)."},
  {id:309,label:"Philips (Duo, 2-disc)",composers:["W.A. Mozart"],artist:"Mitsuko Uchida (piano) · English Chamber Orchestra / Jeffrey Tate",title:"Mozart: The Great Piano Concertos Vol. 3 · Nos. 9, 14, 15, 17 & 18",description:"473 313-2 · Philips Duo · 2-disc set",format:"2-disc set",catNo:"473 313-2",usedGBP:10.00,newGBP:null,notes:"Philips Duo. Vol. 3 includes the 'Jeunehomme' Concerto K.271 (No. 9) — the breakthrough work that announced Mozart as a concerto composer of genius — and the delightful G major works of his early Vienna years. Together the three Duo volumes cover the 15 most popular of the 23 canonical concertos. The complete Uchida/Tate cycle was released as an 8-disc Philips set covering Nos. 5-27."},
  {id:310,label:"Chandos",composers:["Leopold Mozart"],artist:"London Mozart Players / Matthias Bamert",title:"Leopold Mozart: Symphonies",description:"CHAN 10496 · Chandos",format:"Single CD",catNo:"CHAN 10496",usedGBP:12.00,newGBP:null,notes:"Chandos. Leopold Mozart (1719-1787) was Wolfgang's father, music teacher and first manager — a distinguished musician in his own right who composed numerous symphonies, concertos and chamber works. His 'Toy Symphony' has remained a favourite, though most of his output has been neglected. These symphonies show a gifted Baroque-era craftsman whose shadow was somewhat eclipsed by his extraordinary son. Matthias Bamert and the London Mozart Players are ideal advocates."},
  {id:311,label:"Deutsche Grammophon (The Originals)",composers:["W.A. Mozart","Franz Schubert"],artist:"Emil Gilels (piano) · Elena Gilels (piano) · Wiener Philharmoniker / Karl Böhm",title:"Mozart: Piano Concerto No. 27 K.595 · Concerto for 2 Pianos K.365 · Schubert: Fantasy in F minor D.940",description:"463 652-2 · DG The Originals",format:"Single CD",catNo:"463 652-2",usedGBP:12.00,newGBP:null,notes:"DG The Originals. A precious document: Emil Gilels (1916-1985) and his daughter Elena in Mozart and Schubert, with Böhm and the Vienna Philharmonic. The Concerto K.595 was the last Mozart ever wrote, composed in 1791, the year of his death — it has an autumnal serenity and tenderness that many hear as valedictory. The Schubert Fantasy D.940 pairs perfectly. DG The Originals series reissued legendary recordings in premium sound."},
