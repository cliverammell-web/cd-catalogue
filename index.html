  {id:312,label:"EMI Classics",composers:["W.A. Mozart"],artist:"Academy of St Martin-in-the-Fields / Sir Neville Marriner",title:"Mozart: Symphonies Nos. 35 'Haffner' & 41 'Jupiter'",description:"7243 5 85696 2 9 · EMI Classics · Encore series",format:"Single CD",catNo:"7243 5 85696 2 9",usedGBP:8.00,newGBP:null,notes:"EMI Classics Encore. Neville Marriner and the Academy of St Martin-in-the-Fields in two of Mozart's most celebrated symphonies. The 'Haffner' (1782) was composed in a fortnight as a serenade and later converted to a symphony. The 'Jupiter' (1788) is the last and greatest of all his symphonies, concluding with one of the most complex and brilliant fugal finales in all music. Marriner and the ASMF were one of the great Mozart partnerships."},
  {id:313,label:"EMI Classics",composers:["W.A. Mozart"],artist:"Academy of St Martin-in-the-Fields / Sir Neville Marriner",title:"Mozart: Symphonies Nos. 38 'Prague' & 39",description:"7243 5 85813 2 4 · EMI Classics · Encore series",format:"Single CD",catNo:"7243 5 85813 2 4",usedGBP:8.00,newGBP:null,notes:"EMI Classics Encore. The 'Prague' Symphony (1787) has no minuet — Mozart composed it for a city that adored him when Vienna had grown cool, and it reflects his most sophisticated contrapuntal mastery. The 39th in E-flat (1788) is perhaps the most serene and lyrical of the final three. Marriner's ASMF accounts are warm, natural and ideally scaled."},
  {id:314,label:"IMP (Pickwick)",composers:["W.A. Mozart"],artist:"London Mozart Players / Jane Glover",title:"Mozart: Symphonies Nos. 34, 35 'Haffner' & 39",description:"DCA 615 · IMP / Pickwick Records",format:"Single CD",catNo:"DCA 615",usedGBP:8.00,newGBP:null,notes:"IMP/Pickwick. Jane Glover (born 1949) is a distinguished British conductor closely associated with Mozart and Baroque music. She was one of the few prominent female conductors of her generation. The London Mozart Players were founded in 1949 and have been a dedicated Mozart ensemble throughout their existence. A well-regarded budget recording of three middle-period symphonies."},
  {id:315,label:"Hyperion",composers:["W.A. Mozart"],artist:"Thea King (basset clarinet) · English Chamber Orchestra / Jeffrey Tate · Gabrieli String Quartet",title:"Mozart: Clarinet Concerto K.622 · Clarinet Quintet K.581",description:"CDA66199 · Hyperion · rec. 1987",format:"Single CD",catNo:"CDA66199",usedGBP:12.00,newGBP:null,notes:"Hyperion. Thea King (1925-2007) plays a basset clarinet in both works, restoring the original intent of Mozart's writing — the instrument's lower range adds a depth and richness that the standard clarinet cannot match. Both works were written for the clarinettist Anton Stadler in the last years of Mozart's life and share an extraordinary quality of autumnal serenity. Jeffrey Tate conducts the ECO; the Gabrieli Quartet join for the Quintet."},
  {id:316,label:"Decca",composers:["W.A. Mozart"],artist:"Mitsuko Uchida (piano/conductor) · The Cleveland Orchestra",title:"Mozart: Piano Concertos Nos. 9 K.271 & 21 K.467",description:"478 3539 · Decca · new recording · rec. Cleveland",format:"Single CD",catNo:"478 3539",usedGBP:14.00,newGBP:null,notes:"Decca. Uchida's first recordings for Decca after her long Philips period — now directing from the piano rather than working with a separate conductor. The Cleveland Orchestra, one of America's finest, responds with exceptional sensitivity to her direction. These new accounts bring fresh insight to concertos she has known for decades, with a freedom and spontaneity that comes from complete personal command of the music."},
  {id:317,label:"EMI",composers:["W.A. Mozart"],artist:"English Chamber Orchestra / Jeffrey Tate",title:"Mozart: Symphonies Nos. 40 in G minor K.550 & 41 'Jupiter' K.551",description:"CDC 7 47147 2 · EMI",format:"Single CD",catNo:"CDC 7 47147 2",usedGBP:8.00,newGBP:null,notes:"EMI. Jeffrey Tate and the ECO in two of Mozart's greatest symphonies from his extraordinary final burst of creativity in the summer of 1788. Nos. 39, 40 and 41 were all written within about six weeks — an astonishing creative sprint. The G minor Symphony No. 40 is among the most deeply felt works he ever wrote; the Jupiter's final fugue is one of music's supreme achievements. Tate's ECO accounts are lithe, beautifully proportioned and full of character."},
  {id:318,label:"Pentatone (SACD)",composers:["W.A. Mozart"],artist:"Julia Fischer (violin) · Gordan Nikolić (violin) · Netherlands Chamber Orchestra / Yakov Kreizberg",title:"Mozart: Sinfonia Concertante K.364 · Concertone for 2 Violins K.190",description:"PTC 5186 098 · Pentatone SACD hybrid",format:"SACD",catNo:"PTC 5186 098",usedGBP:16.00,newGBP:null,notes:"Pentatone SACD. Julia Fischer and Gordan Nikolić in two of Mozart's most glorious works for multiple soloists and orchestra. The Sinfonia Concertante K.364 (1779) is one of the greatest works he ever composed — a profound dialogue between violin and viola of extraordinary depth and beauty. Fischer and Nikolić are a natural partnership — the same duo featured on several Pentatone recordings together."},
  {id:319,label:"Philips Eloquence",composers:["W.A. Mozart"],artist:"Jack Brymer (clarinet) · Neil Black (oboe) · Michael Chapman (bassoon) · Academy of St Martin-in-the-Fields / Sir Neville Marriner",title:"Mozart: Clarinet Concerto K.622 · Oboe Concerto K.314 · Bassoon Concerto K.191",description:"468 116-2 · Philips Eloquence budget reissue",format:"Single CD",catNo:"468 116-2",usedGBP:10.00,newGBP:null,notes:"Philips Eloquence. Three of Mozart's finest wind concertos in one budget disc with three distinguished British soloists. Jack Brymer was principal clarinettist of the RPO and BBC SO; Neil Black a celebrated oboist. The Bassoon Concerto K.191 (1774) is the earliest major work of Mozart's that remains in the standard repertoire — he was 18 when he wrote it. All three concertos are works of extraordinary charm and melodic invention."},
  {id:320,label:"Naxos",composers:["W.A. Mozart"],artist:"Cologne Chamber Orchestra / Helmut Müller-Brühl",title:"Mozart: Divertimento No. 11 in D major K.251 · Divertimento No. 17 in D major K.334",description:"8.570990 · Naxos",format:"Single CD",catNo:"8.570990",usedGBP:7.00,newGBP:8.99,notes:"Naxos. Two of Mozart's most substantial divertimenti. K.334 in D major (1779-80) is the grandest of all his divertimenti, in six movements including two minuets and a famous set of variations, often performed as a serenade by chamber orchestra. K.251 was written for his sister Nannerl's name-day. Helmut Müller-Brühl and the Cologne Chamber Orchestra bring stylish lightness to these charming works."},
  {id:321,label:"Hyperion",composers:["W.A. Mozart"],artist:"Various soloists · Choir and ensemble",title:"Mozart: Missa Solemnis K.337 · Sacred Works",description:"CDA67921 · Hyperion",format:"Single CD",catNo:"CDA67921",usedGBP:14.00,newGBP:null,notes:"Hyperion. Mozart's Missa Solemnis in C major K.337 (1780) was among the last of his Salzburg masses, composed just before he left for Vienna and the break with Archbishop Colloredo. It is a ceremonial work of considerable dignity and formal grandeur. Hyperion's survey of Mozart's sacred music has been an important contribution to the repertoire."},
  {id:322,label:"EMI Classics (Great Artists of the Century)",composers:["W.A. Mozart"],artist:"Anne-Sophie Mutter (violin) · Berliner Philharmoniker / Herbert von Karajan",title:"Mozart: Violin Concertos Nos. 1, 2 & 4 · Adagio in E",description:"7243 5 62825 2 0 · EMI Great Artists of the Century · rec. Berlin, 1978",format:"Single CD",catNo:"7243 5 62825 2 0",usedGBP:12.00,newGBP:null,notes:"EMI Great Artists of the Century. Anne-Sophie Mutter's legendary debut recordings made in 1978 aged just 15, when Karajan discovered her and brought her to the Berlin Philharmonic. These recordings launched one of the great careers in violin history. Mutter's pure tone and innate musicality are already fully formed; Karajan's loving support throughout is palpable. A historic document reissued in the EMI Great Artists series."},
  {id:323,label:"Philips (2-disc)",composers:["W.A. Mozart"],artist:"Arthur Grumiaux (violin) · London Symphony Orchestra / Sir Colin Davis",title:"Mozart: The Complete Violin Concertos Nos. 1-5",description:"464 722-2 · Philips · 2-disc set · 96kHz 24-bit Super Digital Transfer",format:"2-disc set",catNo:"464 722-2",usedGBP:12.00,newGBP:12.00,sealed:true,notes:"Philips. Arthur Grumiaux (1921-1986) was one of the supreme violinists of the 20th century — his silky Belgian tone and aristocratic phrasing ideally suited to Mozart. This complete cycle with Colin Davis and the LSO is widely regarded as the benchmark recording of all five concertos. Remastered at 96kHz/24-bit for outstanding sonic quality. Gramophone: 'Grumiaux at his most enchanting — the finest Mozart violin concerto set available.'"},
  {id:324,label:"Deutsche Grammophon (4-disc)",composers:["W.A. Mozart"],artist:"Anne-Sophie Mutter (violin) · Lambert Orkis (piano)",title:"Mozart: The Violin Sonatas · Laudate Dominum · Exsultate jubilate · Deluxe Limited Edition",description:"00289 477 5801 · DG · 4-disc deluxe limited edition",format:"4-disc set",catNo:"00289 477 5801",usedGBP:25.00,newGBP:null,notes:"Deutsche Grammophon. A 4-disc deluxe limited edition of Mutter's complete Mozart violin sonata recordings with her long-standing pianist partner Lambert Orkis, plus the soprano showpieces Laudate Dominum and Exsultate jubilate. Mutter has described these recordings as among the most personally meaningful of her career. The package includes extensive documentation and is presented in luxurious packaging."},
  {id:325,label:"Deutsche Grammophon (2-disc)",composers:["W.A. Mozart"],artist:"Anne-Sophie Mutter (violin) · Lambert Orkis (piano)",title:"Mozart: Violin Sonatas",description:"00289 474 2152 · DG · 2-disc set",format:"2-disc set",catNo:"00289 474 2152",usedGBP:14.00,newGBP:null,notes:"Deutsche Grammophon. A 2-disc selection of Mutter's Mozart violin sonata recordings with Lambert Orkis — a companion or earlier release to the 4-disc deluxe edition (CD 324). Mutter and Orkis have been one of the most celebrated duo partnerships in chamber music, their interpretations of the Mozart sonatas combining technical mastery with an intense personal rapport."},
  {id:326,label:"Chandos",composers:["W.A. Mozart","Carl Maria von Weber","Johann Nepomuk Hummel"],artist:"Valeri Popov (bassoon) · Russian State Symphony Orchestra / Valeri Polyansky",title:"Mozart · Weber · Hummel: Bassoon Concertos",description:"CHAN 9656 · Chandos",format:"Single CD",catNo:"CHAN 9656",usedGBP:12.00,newGBP:null,notes:"Chandos. Three of the finest bassoon concertos in the repertoire on one disc. Mozart's K.191 (1774) is the earliest; Weber's F major Op.75 (1811) and Hummel's F major Op.34 are both Romantic-era masterpieces for the instrument. Carl Maria von Weber (1786-1826) was a leading German Romantic composer, best known for the operas Der Freischütz and Oberon. Valeri Popov was principal bassoon of the Bolshoi Orchestra."},
  {id:327,label:"Telarc",composers:["W.A. Mozart","Ludwig van Beethoven"],artist:"André Previn (piano) · Vienna Wind Soloists",title:"Mozart: Piano & Wind Quintet K.452 · Beethoven: Piano & Wind Quintet Op. 16",description:"CD-80114 · Telarc",format:"Single CD",catNo:"CD-80114",usedGBP:12.00,newGBP:null,notes:"Telarc. The two great piano and wind quintets of the Classical era — the natural pairing. Mozart composed K.452 in E-flat major in 1784 and wrote to his father that he considered it 'the best work I have ever composed.' Beethoven's Op.16 was written soon after as a direct homage. André Previn (1929-2019) was a versatile genius at home in jazz, film music and classical repertoire. The Vienna Wind Soloists are one of the great wind chamber ensembles."},
  {id:328,label:"EMI Classics (Great Recordings of the Century)",composers:["W.A. Mozart"],artist:"Dennis Brain (horn) · Philharmonia Orchestra / Herbert von Karajan · Colin Horsley (piano) · Dennis Brain Wind Ensemble",title:"Mozart: Horn Concertos Nos. 1-4 K.412, 417, 447 & 495 · Horn Quintet K.407",description:"7243 5 66898 2 4 · EMI Great Recordings of the Century · rec. 1953-56",format:"Single CD",catNo:"7243 5 66898 2 4",usedGBP:12.00,newGBP:null,notes:"EMI Great Recordings of the Century. The most legendary Mozart horn recording ever made — Dennis Brain (1921-1957) with Karajan and the Philharmonia, recorded 1953-56. Brain was the supreme horn player of the 20th century; his death in a car crash at 36 was one of music's greatest losses. These recordings have never been surpassed. All four horn concertos were written for Brain's predecessor Franz Leutgeb, Mozart's lifelong friend. Gramophone: 'A century of records produced nothing finer on the horn.'"},
  {id:329,label:"Philips",composers:["W.A. Mozart"],artist:"Sylvia McNair (soprano) · Diana Montague (mezzo) · Anthony Rolfe Johnson (tenor) · Cornelius Hauptmann (bass) · Monteverdi Choir · English Baroque Soloists / John Eliot Gardiner",title:"Mozart: Great Mass in C minor K.427",description:"420 210-2 · Philips · SEALED · rec. 1987",format:"Single CD",catNo:"420 210-2",usedGBP:15.00,newGBP:15.00,sealed:true,notes:"Philips. UNOPENED. Gardiner's landmark 1987 period-instrument recording of Mozart's Great Mass in C minor K.427 — considered by many the finest performance on disc. The Mass was left unfinished by Mozart and Gardiner uses a scholarly completion of the missing sections. Sylvia McNair sings the soprano solos with luminous purity. A companion to Gardiner's Requiem (CD 330) — together they represent his finest Mozart choral recordings on Philips."},
  {id:330,label:"Philips (Mozart Collection)",composers:["W.A. Mozart"],artist:"Barbara Bonney (soprano) · Anne Sofie von Otter (mezzo) · Hans Peter Blochwitz (tenor) · Cornelius Hauptmann (bass) · Monteverdi Choir · English Baroque Soloists / Sir John Eliot Gardiner",title:"Mozart: Requiem K.626",description:"00289 475 7057 · Philips Mozart Collection reissue · rec. 1990",format:"Single CD",catNo:"00289 475 7057",usedGBP:12.00,newGBP:null,notes:"Philips Mozart Collection. Gardiner's celebrated 1990 Philips recording of the Requiem — reissued in the Mozart Collection/Mozart Forever series. Barbara Bonney and Anne Sofie von Otter head a distinguished cast. Mozart's Requiem K.626 was left unfinished at his death in December 1791; the completion by his pupil Franz Xaver Süssmayr has been used in concert ever since. Gramophone praised this as 'the finest period-instrument Requiem available.'"},
  {id:331,label:"Deutsche Grammophon",composers:["W.A. Mozart"],artist:"Wiener Philharmoniker / James Levine",title:"Mozart: Eine kleine Nachtmusik K.525 · Serenade No. 9 'Posthorn' K.320",description:"410 085-2 · DG · very early CD pressing · rec. 1975",format:"Single CD",catNo:"410 085-2",usedGBP:10.00,newGBP:null,notes:"Deutsche Grammophon. One of the earliest DG CD releases — the 410 series from 1982-83. James Levine and the Vienna Philharmonic in two great Mozart serenades. Eine kleine Nachtmusik K.525 (1787) is perhaps the single most recognisable piece of classical music ever written. The Posthorn Serenade K.320 (1779) is a substantial 8-movement work named for the posthorn solo in its second minuet — one of Mozart's grandest and most inventive serenades."},
  {id:332,label:"Deutsche Grammophon (3-disc)",composers:["W.A. Mozart"],artist:"Hermann Prey (Figaro) · Edith Mathis (Susanna) · Gundula Janowitz (Countess) · Dietrich Fischer-Dieskau (Count) · Tatiana Troyanos (Cherubino) · Chor und Orchester der Deutschen Oper Berlin / Karl Böhm",title:"Mozart: Le Nozze di Figaro K.492",description:"415 520-2 · DG · 3-disc set · rec. Berlin, 1968",format:"3-disc set",catNo:"415 520-2",usedGBP:20.00,newGBP:null,notes:"Deutsche Grammophon. One of the most celebrated opera recordings ever made. Karl Böhm's 1968 DG Figaro with Fischer-Dieskau and Janowitz is a cornerstone of the recorded repertoire. The Marriage of Figaro (1786) is arguably Mozart's greatest opera — a perfect fusion of comedy, pathos, social satire and divine music. Fischer-Dieskau's Count Almaviva and Gundula Janowitz's Countess are definitive. Gramophone: 'An imperishable classic of the gramophone.'"},
  {id:333,label:"Harmonia Mundi (3-disc)",composers:["W.A. Mozart"],artist:"Johannes Weisser (Don Giovanni) · Lorenzo Regazzo · Alexandrina Pendatchanska · Olga Pasichnyk · Kenneth Tarver · Sunhae Im · Nikolay Borchev · Alessandro Guerzoni · RIAS Kammerchor · Freiburger Barockorchester / René Jacobs",title:"Mozart: Don Giovanni K.527",description:"HMC 901964.66 · Harmonia Mundi · 3-disc set · WDR co-production",format:"3-disc set",catNo:"HMC 901964.66",usedGBP:22.00,newGBP:null,notes:"Harmonia Mundi. René Jacobs's Don Giovanni — the boldest and most dramatically innovative period-instrument recording of this opera. Jacobs treats it as dark comedy laced with real terror, restoring many passages usually cut. Johannes Weisser is a formidably characterised Giovanni. The Freiburger Barockorchester brings incisive, transparent playing throughout. Gramophone Award winner. Don Giovanni (1787) is regarded by many as the greatest opera ever composed."},
  {id:334,label:"Harmonia Mundi (3-disc)",composers:["W.A. Mozart"],artist:"Véronique Gens · Bernarda Fink · Werner Güra · Marcos Boone · Graciela Oddone · others · Concerto Köln / René Jacobs",title:"Mozart: Così fan tutte K.588",description:"HMC 901663.65 · Harmonia Mundi · 3-disc set · SEALED · WDR co-production",format:"3-disc set",catNo:"HMC 901663.65",usedGBP:22.00,newGBP:22.00,sealed:true,notes:"Harmonia Mundi. UNOPENED. René Jacobs's Così fan tutte with Concerto Köln — the companion to his Don Giovanni (CD 333), forming part of a distinguished Jacobs Mozart opera series for HM. Véronique Gens and Bernarda Fink are ideally cast as the two sisters. Così fan tutte (1790) is Mozart's most perfectly constructed opera buffa and perhaps his most psychologically complex — a meditation on the nature of love, fidelity and self-knowledge. Gramophone Award winner."},
  {id:335,label:"Philips (Complete Mozart Edition, 2-disc)",composers:["W.A. Mozart"],artist:"Philip Langridge (Tito) · Ann Murray (Sesto) · Lucia Popp (Vitellia) · others · English Chamber Orchestra / Colin Davis",title:"Mozart: La Clemenza di Tito K.621",description:"422 544-2 · Philips Complete Mozart Edition · 2-disc set · rec. 1984",format:"2-disc set",catNo:"422 544-2",usedGBP:18.00,newGBP:null,notes:"Philips Complete Mozart Edition. La Clemenza di Tito (1791) was Mozart's last opera, composed in an astonishing 18 days for the coronation of Emperor Leopold II in Prague. It is a noble, austere opera seria far removed from the comedies of the Da Ponte trilogy, yet containing some of his most deeply felt music. Philip Langridge is a distinguished Tito; Lucia Popp's Vitellia is outstanding. Colin Davis and the ECO bring their characteristic Mozart authority."},
  {id:336,label:"EMI Digital (3-disc)",composers:["W.A. Mozart"],artist:"Carol Vaness (Fiordiligi) · Delores Ziegler (Dorabella) · John Aler (Ferrando) · Dale Duesing (Guglielmo) · Lillian Watson (Despina) · Claudio Desderi (Don Alfonso) · Glyndebourne Chorus · London Philharmonic Orchestra / Bernard Haitink",title:"Mozart: Così fan tutte K.588",description:"CDCC 7 47727 8 · EMI Digital · 3-disc set · Glyndebourne Festival Opera · rec. 1987",format:"3-disc set",catNo:"CDCC 7 47727 8",usedGBP:20.00,newGBP:null,notes:"EMI Digital. The celebrated 1987 Glyndebourne Festival production under Bernard Haitink with the London Philharmonic. Carol Vaness is a radiant Fiordiligi; the ensemble work throughout is impeccable. Haitink brings his characteristic warmth and structural clarity. A fine complement to the Jacobs period-instrument account (CD 334). Glyndebourne's intimate theatre is ideally suited to Così fan tutte's chamber opera scale."},
  {id:337,label:"EMI (3-disc)",composers:["W.A. Mozart"],artist:"Eberhard Wächter (Don Giovanni) · Joan Sutherland (Donna Anna) · Luigi Alva (Don Ottavio) · Gottlob Frick (Commendatore) · Elisabeth Schwarzkopf (Donna Elvira) · Giuseppe Taddei (Leporello) · Piero Cappuccilli (Masetto) · Graziella Sciutti (Zerlina) · Philharmonia Orchestra & Chorus / Carlo Maria Giulini",title:"Mozart: Don Giovanni K.527",description:"CDCC 7 47260 8 · EMI · 3-disc set · rec. 1959",format:"3-disc set",catNo:"CDCC 7 47260 8",usedGBP:22.00,newGBP:null,notes:"EMI. Possibly the most celebrated opera recording ever made. Giulini's 1959 Philharmonia Don Giovanni assembled a cast of supreme artists: Schwarzkopf as Donna Elvira, Sutherland as Donna Anna, Wächter in the title role, Taddei as a darkly comic Leporello. Carlo Maria Giulini (1914-2005) brought the work theatrical urgency and architectural grandeur in equal measure. Gramophone: 'The supreme Don Giovanni on disc — no subsequent recording has seriously challenged its supremacy.' An absolute treasure of the collection."},
  {id:338,label:"Harmonia Mundi (3-disc + DVD)",composers:["W.A. Mozart"],artist:"Richard Croft (Idomeneo) · Bernarda Fink (Idamante) · Sunhae Im (Ilia) · Alexandrina Pendatchanska (Elettra) · Kenneth Tarver · Nicolas Rivenc · Luca Tittoto · RIAS Kammerchor · Freiburger Barockorchester / René Jacobs",title:"Mozart: Idomeneo K.366",description:"HMC 902036.38 · Harmonia Mundi · 3-disc set + DVD 'Making of' · SEALED · WDR co-production",format:"3-disc set",catNo:"HMC 902036.38",usedGBP:28.00,newGBP:28.00,sealed:true,notes:"Harmonia Mundi. UNOPENED. René Jacobs completes his Mozart opera series for HM with Idomeneo — alongside Don Giovanni (CD 333) and Così fan tutte (CD 334). Idomeneo (1781) was Mozart's first great opera seria, composed for Munich when he was 24, and is widely regarded as the most magnificent opera seria ever written. Richard Croft's Idomeneo and Bernarda Fink's Idamante are outstanding. The 'Making of' DVD adds valuable documentary value to a landmark recording."},
  {id:339,label:"Philips Digital Classics (2-disc)",composers:["W.A. Mozart"],artist:"Kiri Te Kanawa (Pamina) · Cheryl Studer (Queen of Night) · Francisco Araiza (Tamino) · Samuel Ramey (Sarastro) · Olaf Bär (Papageno) · others · Ambrosian Opera Chorus · Academy of St Martin-in-the-Fields / Sir Neville Marriner",title:"Mozart: Die Zauberlöte K.620 (The Magic Flute)",description:"426 276-2 · Philips Digital Classics · 2-disc set",format:"2-disc set",catNo:"426 276-2",usedGBP:14.00,newGBP:null,notes:"Philips Digital Classics. A distinguished cast assembled by Marriner and the ASMF: Kiri Te Kanawa's warm Pamina, Cheryl Studer's formidable Queen of Night and Samuel Ramey's commanding Sarastro. Die Zauberlöte (1791) was Mozart's last great work, premiered just two months before his death. It is a uniquely Viennese synthesis of Masonic symbolism, fairy tale, comedy and transcendent music that defies categorisation."},
  {id:340,label:"Deutsche Grammophon (2-disc)",composers:["W.A. Mozart"],artist:"Edith Mathis (Pamina) · Karin Ott (Queen of Night) · Francisco Araiza (Tamino) · Anna Tomowa-Sintow · Agnès Baltsa · José van Dam (Sarastro) · Gottfried Hornik (Papageno) · Chor der Deutschen Oper Berlin · Berliner Philharmoniker / Herbert von Karajan",title:"Mozart: Die Zauberlöte K.620 (The Magic Flute)",description:"410 967-2 · DG · 2-disc set · very early DG CD pressing · rec. 1982",format:"2-disc set",catNo:"410 967-2",usedGBP:16.00,newGBP:null,notes:"Deutsche Grammophon. One of the earliest opera recordings on CD — the 410 series from 1982-83. Karajan's third and final Magic Flute recording, made in 1982 with the Berlin Philharmonic and a distinguished cast. José van Dam is an authoritative Sarastro; Edith Mathis brings great beauty to Pamina. A historic early CD pressing of enduring musical value."},
  {id:341,label:"Deutsche Grammophon (2-disc)",composers:["W.A. Mozart"],artist:"Dorothea Röschmann (Pamina) · Erika Miklósa (Queen of Night) · Christoph Strehl (Tamino) · René Pape (Sarastro) · Hanno Müller-Brachmann (Papageno) · Arnold Schoenberg Chor · Mahler Chamber Orchestra / Claudio Abbado",title:"Mozart: Die Zauberlöte K.620 (The Magic Flute)",description:"00289 477 5789 · DG · 2-disc set · SEALED · rec. 2005",format:"2-disc set",catNo:"00289 477 5789",usedGBP:18.00,newGBP:18.00,sealed:true,notes:"Deutsche Grammophon. UNOPENED. Described as 'Abbado's first-ever Magic Flute' — a triumphant success. René Pape is considered one of the great Sarastros of our era; Dorothea Röschmann's Pamina is luminous and deeply felt. The Mahler Chamber Orchestra, Abbado's chamber ensemble, brings transparency and freshness. The press greeted it: 'The inspiration of this evening with Abbado will live on long after the Mozart Year has passed.'"},
  {id:342,label:"EMI Classics for Pleasure (2-disc)",composers:["W.A. Mozart"],artist:"Sena Jurinac (Countess) · Graziella Sciutti (Susanna) · Rise Stevens (Cherubino) · Monica Sinclair (Marcellina) · Hugues Cuénod (Basilio) · Sesto Bruscantini (Count Almaviva) · Franco Calabrese (Figaro) · Ian Wallace (Bartolo) · Glyndebourne Festival Orchestra and Chorus / Vittorio Gui",title:"Mozart: Le Nozze di Figaro K.492 (The Marriage of Figaro)",description:"CDB 7 67261 2 · EMI Classics for Pleasure · 2-disc set · Glyndebourne Festival · rec. 1955",format:"2-disc set",catNo:"CDB 7 67261 2",usedGBP:12.00,newGBP:null,notes:"EMI Classics for Pleasure. The legendary 1955 Glyndebourne Figaro conducted by Vittorio Gui (1885-1975), one of the most revered Italian conductors of the mid-20th century. Sena Jurinac's Countess is deeply moving, Bruscantini's Count authoritative and Hugues Cuénod — who lived to 105 — is a memorably vivid Basilio. Reissued at budget price in EMI's Classics for Pleasure series. Gramophone: 'A model of classical style and operatic grace.'"},
  {id:343,label:"Dacapo (SACD)",composers:["Carl Nielsen"],artist:"Danish National Symphony Orchestra / DR / Thomas Dausgaard",title:"Nielsen: Orchestral Music",description:"6.220518 · Dacapo SACD hybrid",format:"SACD",catNo:"6.220518",usedGBP:14.00,newGBP:null,notes:"Dacapo SACD. Carl Nielsen (1865-1931) is Denmark's greatest composer, standing alongside Sibelius as the supreme symphonist of the Nordic tradition. Thomas Dausgaard, a leading Danish conductor, brings natural authority and fresh perspective to Nielsen's orchestral music. The Danish National Symphony Orchestra has a special relationship with Nielsen's work. Dacapo's SACD series has been instrumental in bringing Nielsen's music to international attention."},
  {id:344,label:"RCA Classic Library",composers:["Carl Nielsen"],artist:"Chicago Symphony Orchestra / Morton Gould (Sym. 2) · Jean Martinon (Sym. 4)",title:"Nielsen: Symphony No. 2 'The Four Temperaments' · Symphony No. 4 'The Inextinguishable'",description:"82876762372 · RCA Classic Library · SEALED",format:"Single CD",catNo:"82876762372",usedGBP:10.00,newGBP:10.00,sealed:true,notes:"RCA Classic Library. UNOPENED. Two of Nielsen's greatest symphonies with the Chicago Symphony. Symphony No. 2 'The Four Temperaments' (1902) depicts four distinct human personality types — choleric, phlegmatic, melancholic and sanguine — with vivid musical characterisation. Symphony No. 4 'The Inextinguishable' (1916) was written during the First World War and expresses an indomitable life force that cannot be suppressed. Morton Gould and Jean Martinon are distinguished advocates."},
  {id:345,label:"Deutsche Grammophon (2-disc)",composers:["Carl Orff"],artist:"Various soloists · choirs · orchestras / Eugen Jochum",title:"Orff: Trionfi · Carmina Burana · Catulli Carmina · Trionfo di Afrodite",description:"474 131-2 · DG · 2-disc set · complete trilogy",format:"2-disc set",catNo:"474 131-2",usedGBP:16.00,newGBP:null,notes:"Deutsche Grammophon. The complete Trionfi trilogy — all three of Orff's scenic cantatas on two discs under Eugen Jochum, who conducted the premiere of Carmina Burana in 1937 and remained its most authoritative interpreter. Carmina Burana (1936) is one of the most performed classical works in the world; Catulli Carmina and Trionfo di Afrodite complete the celebratory trilogy. Carl Orff (1895-1982) created a unique theatrical and musical world that blends primitivism with Mediterranean sensuality."},
  {id:346,label:"EMI Classics",composers:["Niccolò Paganini","Pablo de Sarasate","Henri Vieuxtemps"],artist:"Itzhak Perlman (violin) · various orchestras",title:"The Perlman Edition · Paganini: Violin Concerto No. 1 · Sarasate: Carmen Fantasy · Vieuxtemps: works",description:"7243 5 62594 2 3 · EMI Classics · The Perlman Edition",format:"Single CD",catNo:"7243 5 62594 2 3",usedGBP:10.00,newGBP:null,notes:"EMI Classics. Part of The Perlman Edition — EMI's comprehensive survey of Itzhak Perlman's recordings. Perlman (born 1945) is one of the great violinists of the 20th century, celebrated for his warm tone and easy virtuosity. Paganini's Violin Concerto No. 1 is the supreme showpiece of the violinist's repertoire; Sarasate's Carmen Fantasy is a dazzling set of operatic variations. Pablo de Sarasate (1844-1908) and Henri Vieuxtemps (1820-1881) were both virtuoso violinists who wrote brilliantly for their instrument."},
  {id:347,label:"Decca",composers:["Various"],artist:"Luciano Pavarotti (tenor) · various orchestras",title:"Pavarotti: Anniversary",description:"417 362-2 · Decca",format:"Single CD",catNo:"417 362-2",usedGBP:10.00,newGBP:null,notes:"Decca. An anniversary compilation celebrating Luciano Pavarotti's career with Decca Records — the greatest operatic tenor of the latter 20th century. Pavarotti (1935-2007) transformed opera from an art form for connoisseurs into a global popular phenomenon. His Decca recordings from the 1960s-90s capture his remarkable voice at its peak: a natural, seemingly effortless production with a legendary high C that became his signature."},
  {id:348,label:"SMD (2-disc)",composers:["Various"],artist:"Luciano Pavarotti (tenor)",title:"The Pavarotti Collection · Celebrating 25 Triumphant Years",description:"SMD 8617 · 2-disc TV collection",format:"2-disc set",catNo:"SMD 8617",usedGBP:8.00,newGBP:null,notes:"SMD. A 2-disc TV-advertised compilation celebrating Pavarotti's 25 years at the top of the operatic world. These TV-compilation packages introduced millions of listeners to classical music and opera during the 1980s-90s. Pavarotti's ability to communicate across barriers of language and musical knowledge made him uniquely suited to this kind of populist anthology."},
  {id:349,label:"Deutsche Grammophon",composers:["Giovanni Battista Pergolesi"],artist:"Margaret Marshall (soprano) · Lucia Valentini Terrani (mezzo) · London Symphony Orchestra / Claudio Abbado",title:"Pergolesi: Stabat Mater",description:"415 103-2 · DG Digital · rec. 1985",format:"Single CD",catNo:"415 103-2",usedGBP:10.00,newGBP:null,notes:"Deutsche Grammophon. Giovanni Battista Pergolesi (1710-1736) died of tuberculosis aged just 26, leaving a handful of works that had an enormous influence on the galant style. His Stabat Mater for two voices and strings (1736) was composed in the last weeks of his life and became one of the most performed works of the 18th century. Abbado's account with Marshall and Valentini Terrani is among the finest on disc — deeply felt without sentimentality."},
  {id:350,label:"Harmonia Mundi",composers:["Giovanni Benedetto Platti"],artist:"Akademie für Alte Musik Berlin",title:"Platti: Concerti Grossi after Corelli",description:"HMC 901996 · Harmonia Mundi",format:"Single CD",catNo:"HMC 901996",usedGBP:12.00,newGBP:null,notes:"Harmonia Mundi. Giovanni Benedetto Platti (1697-1763) was an Italian composer who spent most of his career at the Würzburg court. His Concerti Grossi modelled on Corelli's Op. 6 are elegant Baroque works of great charm. The Akademie für Alte Musik Berlin is one of the finest period-instrument ensembles in the world. A beautiful disc of charming, underperformed Baroque music."},
  {id:351,label:"Harmonia Mundi USA",composers:["Henry Purcell"],artist:"Lorraine Hunt Lieberson (Dido) · others · Choir of Clare College Cambridge · Philharmonia Baroque Orchestra / Nicholas McGegan",title:"Purcell: Dido and Aeneas",description:"HMU 907110 · Harmonia Mundi USA",format:"Single CD",catNo:"HMU 907110",usedGBP:14.00,newGBP:null,notes:"Harmonia Mundi USA. Lorraine Hunt Lieberson (1954-2006) was one of the most profoundly musical singers of her generation — her Dido is widely considered the finest recorded performance of this role. Purcell's Dido and Aeneas (c.1689) is the earliest surviving English opera and one of the most perfectly constructed short operas ever written, culminating in Dido's Lament, among the most heartbreaking arias in all music. Hunt Lieberson's death from cancer aged 52 was a devastating loss to the musical world."},
  {id:352,label:"Archiv Produktion",composers:["Giovanni Pierluigi da Palestrina","Gregorio Allegri"],artist:"Choir of Westminster Abbey / Simon Preston",title:"Palestrina: Missa Papae Marcelli · Allegri: Miserere",description:"415 517-2 · Archiv Produktion",format:"Single CD",catNo:"415 517-2",usedGBP:12.00,newGBP:null,notes:"Archiv. The two most celebrated pieces of Renaissance sacred polyphony on one disc. Palestrina's Missa Papae Marcelli (c.1562) is a supremely lucid and serene setting of the Mass, often said to have saved polyphonic music from the reforming zeal of the Council of Trent. Allegri's Miserere became famous when the 14-year-old Mozart heard it once at the Sistine Chapel and wrote it out from memory. Simon Preston and the Westminster Abbey Choir are ideal advocates. Gregorio Allegri (1582-1652) composed almost nothing else of lasting significance; this one work made him immortal."},
  {id:353,label:"Decca (2-disc)",composers:["Giacomo Puccini"],artist:"Joan Sutherland (Turandot) · Luciano Pavarotti (Calf) · Montserrat Caballé (Liù) · Nicolai Ghiaurov (Timur) · Tom Krause · Peter Pears (Emperor) · John Alldis Choir · London Philharmonic Orchestra / Zubin Mehta",title:"Puccini: Turandot",description:"414 274-2 · Decca · 2-disc set · rec. 1972",format:"2-disc set",catNo:"414 274-2",usedGBP:16.00,newGBP:null,notes:"Decca. The most starry cast ever assembled for Turandot on record: Sutherland as the Ice Princess, Pavarotti as the ardent Prince Calf, Caballé as the heartbreaking Liù — and Peter Pears as the Emperor Altoum! Mehta and the LPO provide magnificent support. 'Nessun dorma' became the world's most famous opera aria partly through Pavarotti's performances of it, climaxing at the 1990 FIFA World Cup opening concert. Turandot was Puccini's last opera, left unfinished at his death in 1924."},
  {id:354,label:"Decca (2-disc)",composers:["Giacomo Puccini"],artist:"Renata Tebaldi (Mimì) · Carlo Bergonzi (Rodolfo) · Ettore Bastianini (Marcello) · others / Francesco Molinari-Pradelli",title:"Puccini: La Bohème",description:"411 868-2 · Decca · 2-disc set · rec. 1959",format:"2-disc set",catNo:"411 868-2",usedGBP:14.00,newGBP:null,notes:"Decca. Renata Tebaldi's second Decca recording of La Bohème — with a superb cast headed by Carlo Bergonzi as Rodolfo and Ettore Bastianini as Marcello. Tebaldi's warm, full-toned Mimì is one of the most beloved of all recorded performances of this role. La Bohème (1896) is the most frequently performed opera in the world — Puccini's genius for heart-wrenching melody reaches its peak in Mimì's arias. Gramophone praised this as 'among the finest Bohèmes on disc.'"},
  {id:355,label:"EMI Classics",composers:["Giacomo Puccini"],artist:"Maria Callas (Tosca) · Giuseppe di Stefano (Cavaradossi) · Tito Gobbi (Scarpia) · Coro e Orchestra del Teatro alla Scala / Victor de Sabata",title:"Puccini: Tosca · Highlights",description:"7243 5 85644 2 6 · EMI Classics · highlights from the 1953 recording",format:"Single CD",catNo:"7243 5 85644 2 6",usedGBP:10.00,newGBP:null,notes:"EMI Classics. A highlights disc from the most celebrated opera recording ever made — the legendary 1953 de Sabata/Callas/Gobbi Tosca. Gramophone: 'The greatest opera recording ever made.' Callas's Tosca is the definitive dramatic soprano portrait; Tito Gobbi's Baron Scarpia is the most terrifying villain in all opera; Victor de Sabata's conducting is one of the wonders of the recorded art. Every second of this recording is at the highest possible artistic level. The complete 2-disc set (CD 356) gives the full experience."},
  {id:356,label:"Decca (2-disc)",composers:["Giacomo Puccini"],artist:"Leontyne Price (Tosca) · Giuseppe di Stefano (Cavaradossi) · Giuseppe Taddei (Scarpia) · Fernando Corena · Wiener Philharmoniker / Herbert von Karajan",title:"Puccini: Tosca",description:"421 670-2 · Decca Brand Opera · 2-disc set · rec. 1962",format:"2-disc set",catNo:"421 670-2",usedGBP:14.00,newGBP:null,notes:"Decca Brand Opera. Karajan's 1962 Vienna recording with a magnificent cast: Leontyne Price at the height of her powers as Tosca, di Stefano as a passionate Cavaradossi, and Taddei as a darkly complex Scarpia. The Vienna Philharmonic plays with opulent beauty throughout. One of the rival accounts to the legendary de Sabata/Callas — different in character but equally compelling, with Price's rich soprano timbre offering a completely contrasted portrait of the role."},
  {id:357,label:"Harmonia Mundi (Musique d'Abord)",composers:["Henry Purcell"],artist:"London Baroque",title:"Purcell: Chamber Music",description:"HMA 1951327 · Harmonia Mundi Musique d'Abord budget reissue",format:"Single CD",catNo:"HMA 1951327",usedGBP:10.00,newGBP:null,notes:"Harmonia Mundi Musique d'Abord. London Baroque is one of the finest period-instrument chamber groups, specialising in 17th and 18th century music. Purcell's chamber music — fantasias, sonatas and other works for strings — is among the most refined and emotionally complex instrumental music of the Baroque era. The three- and four-part fantasias in particular anticipate later contrapuntal developments in a uniquely English idiom."},
  {id:358,label:"Decca (Florilegium)",composers:["Henry Purcell"],artist:"Emma Kirkby · Judith Nelson · Catherine Bott · James Bowman · David Hill · Simon Keyte · David Thomas · Academy of Ancient Music / Christopher Hogwood",title:"Purcell: Music for a While",description:"443 195-2 · Decca Florilegium budget series",format:"Single CD",catNo:"443 195-2",usedGBP:10.00,newGBP:null,notes:"Decca Florilegium. A fine anthology of Purcell's vocal music under the title of one of his most haunting songs. 'Music for a While' is a ground-bass song of hypnotic beauty. The cast includes Emma Kirkby and James Bowman — two of the greatest early music singers of the late 20th century — with Hogwood's Academy. Purcell (1659-1695) died aged just 36, leaving an extraordinary legacy of songs, anthems, odes, theatre music and chamber works that remain incomparably English."},
  {id:359,label:"EMI Classics",composers:["Sergei Prokofiev"],artist:"City of Birmingham Symphony Orchestra / Simon Rattle",title:"Prokofiev: Symphony No. 5 in B-flat major Op. 100 · Scythian Suite Op. 20",description:"0777 7 54577 2 8 · EMI Classics · rec. Birmingham, 1992",format:"Single CD",catNo:"0777 7 54577 2 8",usedGBP:10.00,newGBP:null,notes:"EMI Classics. Rattle and the CBSO in Prokofiev's most celebrated symphony, composed in 1944 during the Second World War. The Fifth Symphony is one of the great Russian orchestral works — heroic, lyrical and ultimately triumphant. The Scythian Suite (1914-15), inspired by ancient Slavic mythology, is a brilliant and savage work that rivals Stravinsky's Rite of Spring in primitive energy. An outstanding disc from Rattle's landmark Birmingham years."},
  {id:360,label:"Philips (4-disc)",composers:["Sergei Prokofiev"],artist:"London Symphony Orchestra / Valery Gergiev",title:"Prokofiev: The Complete Symphonies",description:"475 7655 · Philips · 4-disc set including original and revised versions of Symphonies Nos. 1 & 4",format:"4-disc set",catNo:"475 7655",usedGBP:22.00,newGBP:null,notes:"Philips. Gergiev and the LSO in the complete Prokofiev symphonies, including both the original and revised versions of Symphonies Nos. 1 and 4. Prokofiev's seven symphonies span his entire creative life from the Classical Symphony (1917) to the Seventh (1952). Gergiev brings a Russian conductor's natural authority to this repertoire, and the LSO responds with tremendous energy and commitment. One of the finest complete Prokofiev symphony cycles available."},
  {id:361,label:"Arte Nova (2-disc)",composers:["Sergei Prokofiev"],artist:"Lev Vinocour (piano)",title:"Prokofiev: Complete Transcriptions for Piano",description:"74321 63636 2 · Arte Nova · 2-disc set",format:"2-disc set",catNo:"74321 63636 2",usedGBP:12.00,newGBP:null,notes:"Arte Nova. Lev Vinocour in Prokofiev's complete piano transcriptions — arrangements and transcriptions he made throughout his career of various works including pieces by other composers. A fascinating specialist disc that reveals Prokofiev's pianistic virtuosity from a different angle. Arte Nova was a German budget label that issued several distinguished recordings at competitive prices."},
  {id:362,label:"EMI Classics",composers:["Sergei Prokofiev"],artist:"Peter Donohoe (piano)",title:"Prokofiev: Piano Sonatas Nos. 6, 7 & 8 (The War Sonatas)",description:"CDC 7 54281 2 · EMI Classics · rec. University of Warwick, 17-20 March 1991 · 76 min",format:"Single CD",catNo:"CDC 7 54281 2",usedGBP:10.00,newGBP:null,notes:"EMI Classics. The three 'War Sonatas' — Prokofiev's greatest piano works, composed between 1939-44 during the Second World War. No. 6 in A major Op. 82, No. 7 in B flat Op. 83 (the most famous, with its savage toccata finale), and No. 8 in B flat Op. 84 (the most lyrical and introspective). Peter Donohoe won Silver Medal at the 1982 Moscow Tchaikovsky Competition; his accounts are authoritative and deeply committed. Recorded at the University of Warwick, 17–20 March 1991."},
  {id:363,label:"RCA Victor",composers:["Sergei Rachmaninov"],artist:"Evgeny Kissin (piano) · London Symphony Orchestra / Valery Gergiev",title:"Rachmaninov: Piano Concerto No. 2 in C minor Op. 18 · Études-Tableaux Op. 39",description:"07863 57982 2 · RCA Victor Red Seal · rec. 1993 live",format:"Single CD",catNo:"07863 57982 2",usedGBP:14.00,newGBP:null,notes:"RCA Victor. Kissin and Gergiev in what many consider one of the finest recordings of the Rachmaninov Second Concerto ever made — recorded live in 1993. Evgeny Kissin (born 1971) was already one of the most celebrated pianists in the world when this was recorded; his combination of phenomenal technique, natural musicality and emotional depth is extraordinary. The Études-Tableaux complete a magnificent disc."},
  {id:364,label:"Decca (Trio, 3-disc)",composers:["Sergei Rachmaninov"],artist:"Vladimir Ashkenazy (piano) · London Symphony Orchestra / André Previn",title:"Rachmaninov: Complete Piano Concertos · Rhapsody on a Theme of Paganini",description:"473 251-2 · Decca Trio · 3-disc set",format:"3-disc set",catNo:"473 251-2",usedGBP:16.00,newGBP:null,notes:"Decca Trio. Ashkenazy and Previn's complete Rachmaninov piano concerto cycle — one of the most admired in the catalogue. All four concertos plus the Paganini Rhapsody collected in a budget 3-disc set. Ashkenazy brings his customary combination of technical mastery and musical warmth; Previn and the LSO are ideal partners. The Second and Third Concertos are particularly distinguished. An essential survey of Rachmaninov's complete output for piano and orchestra."},
  {id:365,label:"Decca",composers:["Sergei Rachmaninov"],artist:"Vladimir Ashkenazy (piano) · Royal Concertgebouw Orchestra / Bernard Haitink",title:"Rachmaninov: Piano Concertos Nos. 3 & 4",description:"414 475-2 · Decca Digital · rec. 1985",format:"Single CD",catNo:"414 475-2",usedGBP:12.00,newGBP:null,notes:"Decca. The companion to the complete cycle (CD 364), featuring the two less frequently performed but equally magnificent concertos — the heroic Third (the most technically demanding in the repertoire) and the more intimate, elusive Fourth. Bernard Haitink and the Concertgebouw bring their characteristic refinement. Ashkenazy's Third is among the most technically clean and musically satisfying on record."},
  {id:366,label:"RCA",composers:["Sergei Rachmaninov"],artist:"Vladimir Horowitz (piano) · New York Philharmonic / Eugene Ormandy",title:"Rachmaninoff: Piano Concerto No. 3 in D minor Op. 30 · Horowitz Golden Jubilee Concert",description:"RD82633 · RCA · live Carnegie Hall, January 8, 1978",format:"Single CD",catNo:"RD82633",usedGBP:14.00,newGBP:null,notes:"RCA. One of the legendary events in 20th-century musical history: Horowitz's Golden Jubilee Concert at Carnegie Hall on 8 January 1978, marking 50 years since his American debut. Horowitz (1903-1989) had been in semi-retirement for years. The hall was electric; the audience included Leonard Bernstein, Zubin Mehta and Isaac Stern. His performance of the Rachmaninoff Third is one of the most overwhelming piano recordings ever made — volcanic technique allied to profound musical wisdom."},
  {id:367,label:"Deutsche Grammophon",composers:["Sergei Rachmaninov"],artist:"Russian National Orchestra / Mikhail Pletnev",title:"Rachmaninov: Symphony No. 2 in E minor Op. 27 · The Rock Op. 7",description:"439 888-2 · DG · rec. 1993",format:"Single CD",catNo:"439 888-2",usedGBP:12.00,newGBP:null,notes:"Deutsche Grammophon. Pletnev's recording of the Second Symphony with his own Russian National Orchestra is one of the most distinguished in the catalogue — deeply felt, spaciously paced and magnificently played. The Second Symphony (1906-07) is Rachmaninov's most romantically opulent orchestral work, its long-breathed melodies reaching an emotional intensity few composers can match. The Rock is an early tone poem showing his emerging voice. Gramophone recommended."},
  {id:368,label:"Decca (Double, 2-disc)",composers:["Sergei Prokofiev"],artist:"The Cleveland Orchestra / Lorin Maazel",title:"Prokofiev: Romeo and Juliet Op. 64",description:"452 970-2 · Decca Double · 2-disc set · rec. 1973",format:"2-disc set",catNo:"452 970-2",usedGBP:10.00,newGBP:null,notes:"Decca Double. Maazel and the Cleveland Orchestra in the complete Romeo and Juliet ballet — Prokofiev's greatest theatrical work. Composed in 1935-36, it is one of the most dramatically vivid and melodically rich ballet scores ever written. Maazel's account with the Cleveland is celebrated for its dramatic urgency and orchestral precision. Decca Double reissues the complete score across two discs at budget price."},
  {id:369,label:"Avie Records",composers:["Sergei Rachmaninov"],artist:"Simon Trpčeski (piano) · Royal Liverpool Philharmonic Orchestra / Vasily Petrenko",title:"Rachmaninov: Piano Concertos Nos. 1 & 4 · Rhapsody on a Theme of Paganini",description:"AV2191 · Avie Records",format:"Single CD",catNo:"AV2191",usedGBP:12.00,newGBP:null,notes:"Avie Records. Simon Trpčeski and Vasily Petrenko with the Royal Liverpool Philharmonic in the two less famous Rachmaninov concertos alongside the Paganini Rhapsody. Trpčeski (born 1979, North Macedonia) is one of the most gifted pianists of his generation, with a natural Romantic temperament ideally suited to this repertoire. Vasily Petrenko's tenure with the RLPO produced a series of acclaimed recordings for Avie. A fine and relatively unsung disc."},
  {id:370,label:"Erato (promo)",composers:["Jean-Baptiste Rameau","Edouard Lalo","Florent Schmitt","Jean-Henri d'Anglebert","Maurice Ohana","Gabriel Fauré"],artist:"Various · Minkowski · Armin Jordan · Barbara Hendricks · Hubeau · Ross · Skrowaczewski",title:"Collection Musifrance · Extraits/Excerpts",description:"2292-45584-2 · Erato · promotional disc · NOT FOR SALE · Coproduction Erato/Radio France · 1990",format:"Single CD",catNo:"2292-45584-2",usedGBP:18.00,newGBP:null,notes:"Erato/Radio France promotional sampler, 1990. Marked 'NOT FOR SALE' — these were distributed to record shops, radio stations and critics to showcase Erato's Collection Musifrance catalogue of French music. Never commercially released. Contains excerpts from: Rameau: Platée (Minkowski/Les Musiciens du Louvre) · Lalo: Le Roi d'Ys (Hendricks/Jordan/Orchestre Philharmonique de Radio France) · Florent Schmitt: Psaume · Fauré: piano works (Hubeau) · d'Anglebert: keyboard pieces (Ross) · Ohana: Le Livre des Prodiges (Skrowaczewski). A genuine collector's item that escaped into private hands. Introduces five composers new to the collection: Rameau, Lalo, Schmitt, d'Anglebert and Ohana."},
  {id:371,label:"EMI Classics (Great Recordings of the Century)",composers:["Sergei Rachmaninov"],artist:"London Symphony Orchestra / André Previn",title:"Rachmaninov: Symphony No. 2 in E minor Op. 27 · Vocalise Op. 34 No. 14 · Dance from 'Aleko'",description:"7243 5 66982 2 2 · EMI Great Recordings of the Century",format:"Single CD",catNo:"7243 5 66982 2 2",usedGBP:12.00,newGBP:null,notes:"EMI Great Recordings of the Century. Previn's celebrated LSO recording of the Second Symphony — one of the most successful ever made of this work, combining rich Romantic sweep with structural clarity. The Vocalise Op. 34 No. 14, Rachmaninov's most hauntingly beautiful melody, and the Dance from Aleko complete the disc. Reissued in EMI's prestigious Great Recordings of the Century series."},
  {id:372,label:"Harmonia Mundi USA (SACD)",composers:["Sergei Rachmaninov"],artist:"Estonian Philharmonic Chamber Choir / Paul Hillier",title:"Rachmaninov: Vespers Op. 37 · Complete All-Night Vigil",description:"HMU 807504 · Harmonia Mundi USA · SACD hybrid",format:"SACD",catNo:"HMU 807504",usedGBP:16.00,newGBP:null,notes:"Harmonia Mundi USA SACD. The Vespers (All-Night Vigil) Op. 37 (1915) is one of the supreme masterpieces of Russian choral music, composed in just two weeks. Rachmaninov considered the fifth movement ('Now lettest thou thy servant depart') impossible to perform because the bass soloist must sustain a low B-flat. The Estonian Philharmonic Chamber Choir, one of the world's finest choral ensembles, and Paul Hillier produce a recording of hushed, luminous beauty. SACD captures the choral acoustic with exceptional depth."},
  {id:373,label:"Brilliant Classics (3-disc)",composers:["Jean-Baptiste Rameau"],artist:"Pieter-Jan Belder (harpsichord)",title:"Rameau: Complete Works for Harpsichord",description:"93903 · Brilliant Classics · 3-disc set",format:"3-disc set",catNo:"93903",usedGBP:14.00,newGBP:null,notes:"Brilliant Classics. Jean-Baptiste Rameau (1683-1764) was the towering figure of French Baroque music — composer of some of the most brilliant and original keyboard music of the era. His harpsichord pieces range from intimate character pieces to large-scale suites of stunning virtuosity. Pieter-Jan Belder is a distinguished Dutch harpsichordist. Brilliant Classics offers excellent value in a 3-disc budget set."},
  {id:374,label:"Decca (Gramophone Awards Collection)",composers:["Jean-Baptiste Rameau"],artist:"Les Talens Lyriques / Christophe Rousset",title:"Rameau: Ouvertures",description:"476 2596 · Decca Gramophone Awards Collection · Gramophone Baroque Non-Vocal Award 1998",format:"Single CD",catNo:"476 2596",usedGBP:12.00,newGBP:null,notes:"Decca. Gramophone Baroque Non-Vocal Award 1998. Christophe Rousset and Les Talens Lyriques in orchestral overtures from Rameau's operas and opéras-ballets — magnificent theatrical music of extraordinary colour and invention. Rousset is one of the foremost Rameau specialists, conducting and playing harpsichord in these dazzling works. Gramophone: 'What a splendid idea to make a programme of overtures by Rameau — the composer of some of the most original and vital music in any late 18th century. Rousset and Les Talens Lyriques respond admirably.'"},
  {id:375,label:"Harmonia Mundi (Musique d'Abord)",composers:["Jean-Baptiste Rameau"],artist:"La Chapelle Royale / Philippe Herreweghe",title:"Rameau: Les Indes Galantes · Suites d'orchestre",description:"HMA 1951130 · Harmonia Mundi Musique d'Abord budget reissue · Radio France",format:"Single CD",catNo:"HMA 1951130",usedGBP:10.00,newGBP:null,notes:"Harmonia Mundi Musique d'Abord. Les Indes Galantes (1735) is Rameau's most spectacular opéra-ballet — a series of exotic tableaux set among the Turks, Incas, Persians and native Americans, with some of the most brilliantly theatrical orchestral writing of the 18th century. Herreweghe and La Chapelle Royale present the orchestral suites with their characteristic elegance and stylistic purity. A Radio France co-production."},
  {id:376,label:"Decca",composers:["Gioachino Rossini"],artist:"Cecilia Bartoli (mezzo-soprano) · Orchestra and Chorus of Teatro La Fenice / Ion Marin",title:"Rossini: Heroines · Operatic Arias",description:"436 075-2 · Decca · rec. Venice, 1992",format:"Single CD",catNo:"436 075-2",usedGBP:12.00,newGBP:null,notes:"Decca. Cecilia Bartoli's breakthrough Rossini recital — arias from La donna del lago, Semiramide, Le siège de Corinthe, La mort de Titus, Elisabetta Regina d'Inghilterra and others. Bartoli (born 1966) became one of the defining mezzo-sopranos of our era through her dedication to Rossini's florid mezzo roles. Her agility, tonal warmth and dramatic instinct are perfectly showcased here. Gioachino Rossini (1792-1868) retired from opera aged just 37, having composed 39 operas in 20 years."},
  {id:377,label:"Fonit Cetra (Edizione Critica)",composers:["Gioachino Rossini"],artist:"Claudio Desderi · Lella Cuberli · Luciana Serra · J. Patrick Raftery · Raül Giménez · Orchestra Giovanile Italiano / Salvatore Accardo",title:"Rossini: L'Occasione fa il Ladro",description:"RFCD 2001 · Fonit Cetra · Edizione Critica Rossini · rec. c.1988",format:"Single CD",catNo:"RFCD 2001",usedGBP:12.00,newGBP:null,notes:"Fonit Cetra. Part of the Edizione Critica series — the critical edition recordings of Rossini's complete operas produced in the 1980s using scholarly performing editions. L'Occasione fa il Ladro (Opportunity Makes a Thief, 1812) is one of Rossini's delightful early comic operas. A distinguished cast including Lella Cuberli and Luciana Serra, with Salvatore Accardo directing the Orchestra Giovanile Italiano. A valuable document of the Rossini renaissance."},
  {id:378,label:"Erato (2-disc)",composers:["Gioachino Rossini"],artist:"Cecilia Gasdia · Marjana Zimermann · Chris Merritt · Choeur Philharmonique de Prague · Orchestre Philharmonique de Monte-Carlo / Claudio Scimone",title:"Rossini: Ermione",description:"2292-45790-2 · Erato · 2-disc set · rec. 1987",format:"2-disc set",catNo:"2292-45790-2",usedGBP:14.00,newGBP:null,notes:"Erato. Rossini's Ermione (1819), one of the great rediscoveries of the Rossini renaissance, is an opera seria of extraordinary power based on Racine's Andromaque. Long neglected, it was revived at the Rossini Opera Festival in Pesaro and revealed as one of his most ambitious and dramatically intense works. Cecilia Gasdia and Chris Merritt are outstanding. Claudio Scimone, one of the key figures of the Rossini revival, conducts with authority."},
  {id:379,label:"Hyperion",composers:["Anton Rubinstein"],artist:"Leslie Howard (piano)",title:"Rubinstein: Piano Sonata No. 4 in A minor Op. 100 · Piano Sonata No. 2 in C minor Op. 20 · Vol. 2",description:"CDA66105 · Hyperion · Vol. 2 of 2 · rec. 24-25 October 1981 · 67 min",format:"Single CD",catNo:"CDA66105",usedGBP:12.00,newGBP:null,notes:"Hyperion. Vol. 2 of a 2-disc series — Sonatas Nos. 1 & 3 appear on Vol. 1 (CDA66017). Recorded 24-25 October 1981 — one of the very earliest Hyperion recordings. Rubinstein's Piano Sonata No. 4 in A minor Op. 100 is a substantial four-movement work of considerable Romantic ambition; the Sonata No. 2 in C minor Op. 20 is an earlier but equally compelling work. Leslie Howard has been a tireless advocate for neglected 19th-century piano repertoire, perhaps best known for his complete Liszt cycle for Hyperion. A delightful footnote: the cover illustration is a painting by Leonid Pasternak — father of Boris Pasternak, author of Doctor Zhivago — depicting Rubinstein playing for Count Tolstoy."},
  {id:380,label:"Hyperion (2-disc)",composers:["Camille Saint-Saëns"],artist:"Stephen Hough (piano) · City of Birmingham Symphony Orchestra / Sakari Oramo",title:"Saint-Saëns: The Complete Works for Piano and Orchestra",description:"CDA67331/2 · Hyperion · 2-disc set · The Romantic Piano Concerto Vol. 37",format:"2-disc set",catNo:"CDA67331/2",usedGBP:16.00,newGBP:null,notes:"Hyperion. Volume 37 of Hyperion's celebrated Romantic Piano Concerto series, containing all of Saint-Saëns's works for piano and orchestra — five concertos plus shorter pieces — in authoritative performances by Stephen Hough. Camille Saint-Saëns (1835-1921) was the most prodigiously gifted French composer of his generation, writing his first symphony at 15. His five piano concertos are brilliant, elegant works that deserve to be heard far more often. Gramophone Award winner."},
  {id:381,label:"Decca (Ovation)",composers:["Camille Saint-Saëns"],artist:"Peter Hurford (organ) · Pascal Rogé · Cristina Ortiz (pianos) · Orchestre Symphonique de Montréal / Charles Dutoit",title:"Saint-Saëns: Symphony No. 3 in C minor Op. 78 'Organ' · Carnaval des animaux",description:"430 720-2 · Decca Ovation · SEALED",format:"Single CD",catNo:"430 720-2",usedGBP:12.00,newGBP:12.00,sealed:true,notes:"Decca Ovation. UNOPENED. Two of Saint-Saëns's most popular works in distinguished performances. The Organ Symphony (1886), with its thunderous organ entry in the finale, is one of the great showpieces of the orchestral repertoire. The Carnaval des animaux (1886) was kept private by Saint-Saëns during his lifetime — he considered it too frivolous. Peter Hurford is the organist; Pascal Rogé and Cristina Ortiz are the two pianists in the Carnaval. Dutoit and the Montréal orchestra are on excellent form."},
  {id:382,label:"Deutsche Grammophon (Karajan Gold)",composers:["Camille Saint-Saëns"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Saint-Saëns: Symphony No. 3 in C minor Op. 78 'Organ'",description:"439 014-2 · DG Karajan Gold · Original-Image Bit-Processing",format:"Single CD",catNo:"439 014-2",usedGBP:10.00,newGBP:null,notes:"DG Karajan Gold with Original-Image Bit-Processing remastering. Karajan's Berlin Philharmonic recording of the Organ Symphony is one of the most spectacular in the catalogue — the Berlin Philharmonic brass and organ combined at full throttle is an overwhelming sonic experience. The Karajan Gold series applied DG's Original-Image Bit-Processing to produce the finest possible sound from the original tapes."},
  {id:383,label:"Deutsche Grammophon (20th Century Classics, 3-disc)",composers:["Arnold Schoenberg","Alban Berg","Anton Webern"],artist:"Berliner Philharmoniker / Herbert von Karajan",title:"Schoenberg · Berg · Webern: Orchestral Works",description:"427 424-2 · DG 20th Century Classics · 3-disc set",format:"3-disc set",catNo:"427 424-2",usedGBP:16.00,newGBP:null,notes:"DG 20th Century Classics. Karajan and the Berlin Philharmonic in the core orchestral works of the Second Viennese School — three composers who transformed Western music in the early 20th century. Schoenberg (1874-1951) invented twelve-tone music; Berg (1885-1935) created the most emotionally compelling works within that system; Webern (1883-1945) distilled music to its barest essentials. Karajan was one of the most authoritative interpreters of all three, bringing the BPO's incomparable sound to music that is still misunderstood by many."},
  {id:384,label:"CBS Masterworks",composers:["Franz Schubert"],artist:"Murray Perahia (piano)",title:"Schubert: Impromptus Op. 90 D.899 · Op. 142 D.935",description:"MK 37291 · CBS Masterworks · original CBS pressing",format:"Single CD",catNo:"MK 37291",usedGBP:10.00,newGBP:null,duplicate:true,duplicateGroup:"perahia-schubert-impromptus",notes:"CBS Masterworks. Original CBS pressing of Perahia's celebrated Schubert Impromptus recording. Perahia's Schubert is marked by his characteristic singing tone and natural phrasing — these are among the most admired accounts of the Impromptus in the catalogue. This MK 37291 pressing is the original CBS Masterworks edition; see CD 385 for the identical Sony Classical reissue."},
  {id:385,label:"Sony Classical",composers:["Franz Schubert"],artist:"Murray Perahia (piano)",title:"Schubert: Impromptus D.899 & D.935",description:"SK 37291 · Sony Classical · Sony reissue of CBS recording",format:"Single CD",catNo:"SK 37291",usedGBP:10.00,newGBP:null,duplicate:true,duplicateGroup:"perahia-schubert-impromptus",notes:"Sony Classical. Sony reissue of the identical Perahia Schubert Impromptus recording (see CD 384 for the original CBS MK 37291 pressing). When CBS Music rebranded as Sony Classical in the early 1990s, many catalogue numbers changed from MK to SK prefixes. The music and performances are identical; only the label and packaging differ."},
  {id:386,label:"Decca",composers:["Franz Schubert"],artist:"András Schiff (piano)",title:"Schubert: Piano Sonatas D.197, D.459 & D.664",description:"440 311-2 · Decca Digital",format:"Single CD",catNo:"440 311-2",usedGBP:12.00,newGBP:null,notes:"Decca. András Schiff's Schubert is universally admired — his recordings for Decca are among the most distinguished in the catalogue, combining deep familiarity with the Viennese tradition with an unsentimental rigour. These three earlier sonatas show Schubert developing his unique keyboard language: D.664 in A major is one of his most serene and perfect achievements. Schiff approaches Schubert as a natural successor to Bach and Mozart rather than a proto-Romantic."},
  {id:387,label:"Decca",composers:["Franz Schubert"],artist:"Peter Schreier (tenor) · András Schiff (piano)",title:"Schubert: Winterreise D.911",description:"436 122-2 · Decca",format:"Single CD",catNo:"436 122-2",usedGBP:12.00,newGBP:null,notes:"Decca. Peter Schreier and András Schiff in one of the most distinguished recordings of Schubert's greatest song cycle. Winterreise (Winter Journey, 1827) is 24 songs depicting a rejected lover's solitary winter wandering — music of harrowing psychological depth that Schubert composed in the last year of his life. Schreier's intelligent, deeply musical tenor and Schiff's extraordinarily sensitive piano playing make this a benchmark account."},
  {id:388,label:"Decca (8-disc)",composers:["Franz Schubert"],artist:"Mitsuko Uchida (piano)",title:"Mitsuko Uchida plays Schubert",description:"475 6282 · Decca · 8-disc set · recorded September 1996 – August 2001 · booklet notes by Misha Donat",format:"8-disc set",catNo:"475 6282",usedGBP:35.00,newGBP:null,notes:"Decca. The complete Uchida Schubert recordings for Decca, collected in an 8-disc box. Recorded between September 1996 and August 2001; booklet notes by Misha Donat. Uchida's Schubert is considered by many the finest currently available — her profound understanding of Schubert's unique sound world, her singing tone and her architectural sense make these recordings indispensable. The box brings together her recordings of the late piano sonatas (D845, D850, D894, D958, D959, D960), the Impromptus, Moments Musicaux and other works."},
  {id:389,label:"Erato",composers:["Franz Schubert"],artist:"Orchestre de l'Opéra de Lyon / John Eliot Gardiner",title:"Schubert: Symphonies Nos. 8 'Unfinished' D.759 & 9 'The Great' D.944",description:"ECD 75495 · Erato",format:"Single CD",catNo:"ECD 75495",usedGBP:12.00,newGBP:null,notes:"Erato. An early John Eliot Gardiner recording of the two greatest Schubert symphonies — before his celebrated period-instrument work with the Orchestre Révolutionnaire et Romantique. A document of Gardiner's development as a conductor and his long association with Schubert's orchestral music."},
  {id:390,label:"Philips",composers:["Franz Schubert"],artist:"Alfred Brendel (piano) · Cleveland Quartet",title:"Schubert: Piano Quintet in A major Op. 114 D.667 'The Trout'",description:"449 745-2 · Philips",format:"Single CD",catNo:"449 745-2",usedGBP:12.00,newGBP:null,notes:"Philips. Brendel and the Cleveland Quartet in Schubert's most beloved chamber work. The Trout Quintet (1819) takes its nickname from the fourth movement variations on Schubert's own song 'Die Forelle.' Scored for the unusual combination of piano, violin, viola, cello and double bass, it is one of the sunniest and most charming works in the chamber repertoire, composed when Schubert was just 22 during a happy summer excursion. Brendel brings characteristic intelligence and warmth."},
  {id:391,label:"Philips (6-disc box)",sealed:true,composers:["Franz Schubert"],artist:"Academy of St Martin-in-the-Fields / Sir Neville Marriner",title:"Schubert: The 10 Symphonies",description:"449 817-2 · Philips · 6-disc box set",format:"6-disc set",catNo:"470 886-2",usedGBP:28.00,newGBP:null,notes:"Philips. Marriner and the ASMF in the complete Schubert symphonies — all ten works from the First (1813, composed aged 16) to the Great C major (1825) and the B minor 'Unfinished' (1822). Marriner brings characteristic elegance, clarity and rhythmic vitality. A comprehensive survey of Schubert's complete symphonic output in a generous 6-disc budget box."},
  {id:392,label:"Virgin Classics",composers:["Franz Schubert"],artist:"Orchestra of the Age of Enlightenment / Sir Charles Mackerras",title:"Schubert: Symphony No. 9 in C major D.944 'The Great'",description:"VC 7 90708-2 · Virgin Classics · period instruments",format:"Single CD",catNo:"VC 7 90708-2",usedGBP:12.00,newGBP:null,notes:"Virgin Classics. Mackerras and the OAE in Schubert symphonies on period instruments. Sir Charles Mackerras (1925-2010) was a tireless advocate for historically informed performance; the OAE's lighter textures and period articulation bring freshness and transparency to Schubert's orchestral writing. An important addition to the period-instrument Schubert discography."},
  {id:393,label:"Mirare",composers:["Franz Schubert","Franz Liszt"],artist:"Brigitte Engerer (piano)",title:"Hymne an die Nacht / Hymne à la Nuit · Schubert · Schubert/Liszt",description:"MIR 043 · Mirare",format:"Single CD",catNo:"MIR 043",usedGBP:14.00,newGBP:null,notes:"Mirare. Brigitte Engerer (1952-2012) was a distinguished French pianist of Russian training, a pupil of Stanislav Neuhaus. Programme: Franz Schubert — 3e Impromptu en sol bémol majeur Op.90 D.899, Kuppelwieser Walzer, Mélodie hongroise en si mineur D.817; Franz Schubert/Franz Liszt — Transcriptions de Lieder: Der Doppelgänger, Die Stadt, Am Meer, Aufenthalt, Ständchen, Frühlingsglaube, Litanie, Der Müller und der Bach, Der Wanderer; Franz Schubert — Wanderer-Fantasie en ut majeur Op.15 D.760. Commentaires en français/English commentary inside."},
  {id:394,label:"Deutsche Grammophon",composers:["Franz Schubert"],artist:"Mischa Maisky (cello) · Daria Hovora (piano)",title:"Schubert: Songs without Words",description:"470 886-2 · DG Audio",format:"Single CD",catNo:"449 817-2",usedGBP:12.00,newGBP:null,notes:"DG Audio. Mischa Maisky and Daria Hovora in a cello-piano recital of Schubert transcriptions — Schubert songs arranged for cello and piano, where the instrument sings the vocal line. Maisky's deeply expressive cello tone is ideally suited to Schubert's long-breathed melodies. The title 'Songs without Words' echoes Mendelssohn's famous piano pieces, but here Schubert's actual songs are rendered without their words."},
  {id:395,label:"Teldec (2-disc)",composers:["Franz Schubert"],artist:"András Schiff (piano) · Yuuko Shiokawa (violin) · Miklós Perényi (cello)",title:"Schubert: Piano Trios Nos. 1 & 2 · Nocturne · Arpeggione Sonata",description:"0630 13151-2 · Teldec Classics · 2-disc set",format:"2-disc set",catNo:"0630 13151-2",usedGBP:14.00,newGBP:null,notes:"Teldec Classics. Schiff, Shiokawa and Perényi in Schubert's two great piano trios. The B-flat Trio D.898 is one of his most generous and lyrical works; the E-flat Trio D.929, written just a year before his death, has a darker, more searching character. The Nocturne D.897 and Arpeggione Sonata D.821 complete a distinguished disc. Three of the finest players of their generation in ideal Schubert repertoire."},
  {id:396,label:"EMI Classics for Pleasure",composers:["Franz Schubert"],artist:"Ian Partridge (tenor) · Jenifer Partridge (piano)",title:"Schubert: Die Schöne Müllerin Op. 25 D.795",description:"7243 5 68580 2 2 · EMI Classics for Pleasure",format:"Single CD",catNo:"7243 5 68580 2 2",usedGBP:10.00,newGBP:null,notes:"EMI Classics for Pleasure. Ian Partridge and his sister Jenifer Partridge in Schubert's first great song cycle — 20 songs tracing a young miller's journey, love and despair beside a stream. Die Schöne Müllerin (1823) was composed when Schubert was 26. Ian Partridge's pure, flexible tenor is ideal for this music. A beautifully intimate recording at budget price."},
  {id:397,label:"Nimbus Records (3-disc)",composers:["Franz Schubert"],artist:"Brandis Quartet",title:"Schubert: The Late Chamber Music for Strings",description:"NI 1770 · Nimbus Records · 3-disc set",format:"3-disc set",catNo:"NI 1770",usedGBP:16.00,newGBP:null,notes:"Nimbus Records. The Brandis Quartet in Schubert's late string chamber music — the String Quintet, the last three string quartets and related works. The String Quintet D.956, composed in the last months of Schubert's life, is widely regarded as the greatest chamber work in the repertoire. The Brandis Quartet bring characteristic Viennese warmth and deep familiarity with this music."},
  {id:398,label:"Deutsche Grammophon",composers:["Franz Schubert"],artist:"Wiener Philharmoniker / Carlos Kleiber",title:"Schubert: Symphonies Nos. 5 in B-flat major D.485 & 8 in B minor D.759 'Unfinished'",description:"400 078-2 · DG · very early CD pressing · rec. 1979",format:"Single CD",catNo:"400 078-2",usedGBP:14.00,newGBP:null,notes:"Deutsche Grammophon. One of the earliest DG CDs ever pressed — the 400-series dates from 1982-83. Carlos Kleiber's recording of the Fifth and Unfinished symphonies with the Vienna Philharmonic (recorded 1979) was already a legendary LP before appearing on CD. His conducting is famously electrifying: the Fifth is all dancing lightness; the Unfinished has brooding inevitability. Among the most treasured recordings in the collection."},
  {id:399,label:"Conifer Records",composers:["Franz Schubert"],artist:"The Schubert Ensemble",title:"Schubert: Piano Quintet in A major D.667 'The Trout' · Piano Trio No. 1 in B-flat major D.898",description:"CHRCD007 · Conifer Records",format:"Single CD",catNo:"CHRCD007",usedGBP:10.00,newGBP:null,notes:"Conifer Records. Recorded at Champs Hill, November 2003. The Schubert Ensemble is one of Britain's finest chamber groups, dedicated entirely to Schubert's piano chamber music. A different recording from the ASV Gold version (CD 403) — same ensemble, same programme, but separate sessions on different labels."},
  {id:400,label:"Naim",composers:["Franz Schubert","Joseph Haydn"],artist:"The Allegri String Quartet",title:"Schubert: Divertimento in C minor (completed Newbould) · Haydn: String Quartets",description:"naimcd012 · Naim Records",format:"Single CD",catNo:"naimcd012",usedGBP:14.00,newGBP:null,notes:"Naim Records. The Allegri String Quartet in a Schubert divertimento fragment completed by the Schubert scholar Brian Newbould, paired with Haydn string quartets. Naim Records, better known for their hi-fi equipment, made a number of distinguished audiophile recordings. The Allegri String Quartet was one of the great British ensembles, founded in 1953 and continuing for over 40 years."},
  {id:401,label:"EMI Classics",composers:["Franz Schubert"],artist:"Alban Berg Quartet · Heinrich Schiff (cello)",title:"Schubert: String Quintet in C major D.956",description:"CDC 7 47018 2 · EMI Classics · rec. 1982",format:"Single CD",catNo:"CDC 7 47018 2",usedGBP:12.00,newGBP:null,notes:"EMI Classics. The Alban Berg Quartet with cellist Heinrich Schiff in Schubert's supreme chamber masterpiece. The String Quintet in C major D.956, composed in the last weeks of Schubert's life (1828), is widely regarded as the greatest chamber work ever written — its slow movement especially is of devastating beauty and mystery. The Alban Berg Quartet were one of the supreme string quartets of the late 20th century."},
  {id:402,label:"ASV",composers:["Franz Schubert"],artist:"The Lindsays",title:"Schubert: String Quartets Nos. 14 'Death and the Maiden' D.810 · 13 'Rosamunde' D.804 · Quartettsatz D.703",description:"DCA 560 · ASV · later cover with 'The Lindsays' branding",format:"Single CD",catNo:"DCA 560",usedGBP:10.00,newGBP:null,duplicate:true,duplicateGroup:"lindsays-schubert-dca560",notes:"ASV. The Lindsays (later branding) in three of Schubert's most celebrated quartet works. This is the same ASV DCA 560 recording as CD 407 (earlier 'Lindsay String Quartet' cover). The Lindsays were one of Britain's finest string quartets, particularly noted for their Schubert. 'Death and the Maiden' (1824) is the most popular and dramatic of all Schubert's quartets; 'Rosamunde' is more lyrical but equally beautiful."},
  {id:403,label:"ASV Gold",composers:["Franz Schubert"],artist:"The Schubert Ensemble",title:"Schubert: Piano Quintet in A major D.667 'The Trout' · Piano Trio No. 1 in B-flat major D.898",description:"GLD 4000 · ASV Gold · released 2004",format:"Single CD",catNo:"GLD 4000",usedGBP:10.00,newGBP:null,notes:"ASV Gold. Released 2004. A separate recording from the Conifer version (CD 399). Personnel confirmed: Simon Blendis (violin), Jane Salmon (cello), William Howard (piano) with the Schubert Ensemble. Recording date and venue unconfirmed. The Schubert Ensemble were tireless advocates for the composer's piano chamber music across their long career, recording this programme twice for different labels."},
  {id:404,label:"EMI Classics",composers:["Franz Schubert"],artist:"Alban Berg Quartett",title:"Schubert: String Quartets No. 11 in E major D.353 'Rosamunde' · No. 14 in D minor D.810 'Death and the Maiden'",description:"50999 7 35870 2 6 · EMI Classics Masters reissue",format:"Single CD",catNo:"50999 7 35870 2 6",usedGBP:10.00,newGBP:null,notes:"EMI Classics Masters. The Alban Berg Quartett's celebrated EMI recordings of the two most popular Schubert quartets reissued in the Masters budget series. The Alban Berg Quartett had a uniquely close relationship with Schubert's music — their recordings are notable for their technical perfection, tonal beauty and deep expressiveness. These are among the most admired quartet recordings of the late 20th century."},
  {id:405,label:"Philips",composers:["Franz Schubert","W.A. Mozart"],artist:"Alfred Brendel (piano) · Thomas Zehetmair (violin) · Tabea Zimmermann (viola) · Richard Duven (cello) · Peter Riegelbauer (double bass)",title:"Schubert: Piano Quintet 'The Trout' D.667 · Mozart: Piano Quartet in G minor K.478",description:"466 001-2 · Philips Digital Classics",format:"Single CD",catNo:"466 001-2",usedGBP:12.00,newGBP:null,notes:"Philips. Brendel's second Trout recording for Philips — different personnel from the earlier Cleveland Quartet version (CD 390). Here he is joined by Zehetmair and Tabea Zimmermann, two of the finest instrumentalists of their generation. The Mozart Piano Quartet in G minor K.478 makes an ideal coupling. Both works show the piano quintet/quartet form at its most intimate and conversational."},
  {id:406,label:"Linn Records",composers:["Franz Schubert"],artist:"Fitzwilliam String Quartet",title:"Schubert: String Quartet in G major D.887 · Quartettsatz in C minor D.703",description:"CKD 673 · Linn Records",format:"Single CD",catNo:"CKD 673",usedGBP:14.00,newGBP:null,notes:"Linn Records. The Fitzwilliam String Quartet in two of Schubert's late quartet works. The String Quartet in G major D.887 (1826) is his most ambitious and expansive quartet, sometimes called his 'fifth symphony' for strings. The Quartettsatz (1820) is a single movement fragment of heart-stopping beauty. The Fitzwilliam String Quartet has been one of Cambridge's finest ensembles; Linn Records provides their characteristic audiophile sound quality."},
  {id:407,label:"ASV",composers:["Franz Schubert"],artist:"Lindsay String Quartet",title:"Schubert: String Quartet No. 14 in D minor D.810 'Death and the Maiden' · Quartettsatz in C minor D.703",description:"DCA 560 · ASV · earlier release with 'Lindsay String Quartet' branding",format:"Single CD",catNo:"DCA 560",usedGBP:8.00,newGBP:null,duplicate:true,duplicateGroup:"lindsays-schubert-dca560",notes:"ASV. Earlier pressing of DCA 560 under the original 'Lindsay String Quartet' name (later rebranded as 'The Lindsays' — see CD 402). Same recording, different cover and ensemble name. A duplicate worth keeping for the different cover artwork and as a document of the ensemble's name change. The Lindsay/Lindsays were among the most celebrated British string quartets of the late 20th century."},
  {id:408,label:"EMI Classics (2-disc)",composers:["Franz Schubert"],artist:"Belcea Quartet · Valentin Erben (cello)",title:"Schubert: String Quintet in C major D.956 · String Quartet in G major D.887 · String Quartet in D minor D.810 'Death and the Maiden'",description:"50999 9 67025 2 9 · EMI Classics · 2-disc set",format:"2-disc set",catNo:"50999 9 67025 2 9",usedGBP:14.00,newGBP:null,notes:"EMI Classics. The Belcea Quartet with cellist Valentin Erben in a comprehensive 2-disc Schubert programme covering three of his greatest chamber works. The Belcea Quartet, founded in 1994, quickly established themselves as one of the outstanding ensembles of their generation. An ambitious disc pairing the supreme string quintet with two of the late quartets."},
  {id:409,label:"Decca (Legendary Performances)",composers:["Franz Schubert","Robert Schumann","Claude Debussy"],artist:"Mstislav Rostropovich (cello) · Benjamin Britten (piano)",title:"Schubert: Arpeggione Sonata D.821 · Schumann: Fünf Stücke im Volkston Op. 102 · Debussy: Cello Sonata",description:"460 974-2 · Decca Legendary Performances · rec. 1961",format:"Single CD",catNo:"460 974-2",usedGBP:14.00,newGBP:null,notes:"Decca Legendary Performances. One of the most treasured recordings in the entire chamber music catalogue — Rostropovich and Britten in 1961. The partnership between the greatest cellist of the 20th century and one of its greatest composers is palpable in every bar. Britten's piano playing is as characterful and intelligent as anything he conducted or composed. The Arpeggione Sonata, written for an instrument that quickly became obsolete, is one of Schubert's most intimate and lyrical works. Gramophone: 'A document of supreme musicianship.'"},
  {id:410,label:"EMI Digital",composers:["Franz Schubert"],artist:"Hausmusik",title:"Schubert: Octet in F major D.803",description:"CDC 7 54118 2 · EMI Digital",format:"Single CD",catNo:"CDC 7 54118 2",usedGBP:12.00,newGBP:null,notes:"EMI Digital. Hausmusik in Schubert's magnificent Octet for clarinet, bassoon, horn, two violins, viola, cello and double bass — a large-scale six-movement work of great warmth and charm. Hausmusik, founded in 1984, were one of the pioneering period-instrument chamber ensembles. Their use of gut strings and period instruments brings a different colour and transparency to this Romantic work. The Octet was composed in 1824 as a deliberate homage to Beethoven's Septet."},
